<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="atBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1520"/>
      <stop offset="100%" stop-color="#2D2235"/>
    </linearGradient>
    <linearGradient id="atLight" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFF8DC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="atBox1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8923E"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="atBox2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0784C"/>
      <stop offset="100%" stop-color="#7A5A30"/>
    </linearGradient>
    <linearGradient id="atBox3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A46A"/>
      <stop offset="100%" stop-color="#9B8250"/>
    </linearGradient>
    <linearGradient id="atFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D2E20"/>
      <stop offset="100%" stop-color="#2A1E15"/>
    </linearGradient>
    <radialGradient id="atDust" cx="0.5" cy="0" r="0.9">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFF8DC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#atBg)"/>

  <!-- Floor -->
  <rect x="0" y="350" width="800" height="100" fill="url(#atFloor)"/>
  <!-- Floor boards -->
  <line x1="0" y1="360" x2="800" y2="360" stroke="#4A3628" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="350" x2="100" y2="450" stroke="#4A3628" stroke-width="0.3" opacity="0.3"/>
  <line x1="250" y1="350" x2="250" y2="450" stroke="#4A3628" stroke-width="0.3" opacity="0.3"/>
  <line x1="420" y1="350" x2="420" y2="450" stroke="#4A3628" stroke-width="0.3" opacity="0.3"/>
  <line x1="580" y1="350" x2="580" y2="450" stroke="#4A3628" stroke-width="0.3" opacity="0.3"/>
  <line x1="700" y1="350" x2="700" y2="450" stroke="#4A3628" stroke-width="0.3" opacity="0.3"/>

  <!-- Slanted roof lines -->
  <polygon points="0,120 400,10 800,120 800,0 0,0" fill="#221A28"/>
  <line x1="0" y1="120" x2="400" y2="10" stroke="#3D2E40" stroke-width="3"/>
  <line x1="400" y1="10" x2="800" y2="120" stroke="#3D2E40" stroke-width="3"/>
  <!-- Roof beams -->
  <line x1="200" y1="65" x2="200" y2="350" stroke="#4A3628" stroke-width="8" opacity="0.4"/>
  <line x1="600" y1="65" x2="600" y2="350" stroke="#4A3628" stroke-width="8" opacity="0.4"/>
  <!-- Cross beams -->
  <line x1="50" y1="100" x2="750" y2="100" stroke="#4A3628" stroke-width="5" opacity="0.3"/>

  <!-- Small window (light source) -->
  <rect x="360" y="35" width="80" height="55" rx="3" fill="#8B8070" stroke="#5C4A38" stroke-width="3"/>
  <rect x="365" y="40" width="70" height="45" fill="#C8B898" opacity="0.5"/>
  <line x1="400" y1="40" x2="400" y2="85" stroke="#5C4A38" stroke-width="2"/>
  <line x1="365" y1="62" x2="435" y2="62" stroke="#5C4A38" stroke-width="2"/>

  <!-- Light beam from window -->
  <polygon points="365,85 435,85 550,350 280,350" fill="url(#atLight)" opacity="0.35"/>
  <!-- Dust particles in light beam -->
  <circle cx="390" cy="120" r="1.2" fill="#FFF8DC" opacity="0.6"/>
  <circle cx="410" cy="150" r="0.8" fill="#FFF8DC" opacity="0.5"/>
  <circle cx="380" cy="180" r="1" fill="#FFF8DC" opacity="0.4"/>
  <circle cx="420" cy="200" r="1.5" fill="#FFF8DC" opacity="0.55"/>
  <circle cx="395" cy="230" r="0.7" fill="#FFF8DC" opacity="0.45"/>
  <circle cx="440" cy="160" r="1.1" fill="#FFF8DC" opacity="0.5"/>
  <circle cx="360" cy="250" r="1.3" fill="#FFF8DC" opacity="0.35"/>
  <circle cx="450" cy="220" r="0.9" fill="#FFF8DC" opacity="0.4"/>
  <circle cx="370" cy="300" r="1.4" fill="#FFF8DC" opacity="0.3"/>
  <circle cx="430" cy="280" r="1" fill="#FFF8DC" opacity="0.35"/>
  <circle cx="340" cy="320" r="1.6" fill="#FFF8DC" opacity="0.25"/>
  <circle cx="480" cy="260" r="0.8" fill="#FFF8DC" opacity="0.3"/>
  <circle cx="460" cy="310" r="1.2" fill="#FFF8DC" opacity="0.28"/>
  <circle cx="320" cy="270" r="0.9" fill="#FFF8DC" opacity="0.32"/>
  <circle cx="500" cy="300" r="1.1" fill="#FFF8DC" opacity="0.22"/>
  <circle cx="400" cy="170" r="0.6" fill="#FFF8DC" opacity="0.5"/>
  <circle cx="415" cy="260" r="1.3" fill="#FFF8DC" opacity="0.3"/>

  <!-- Ambient dust glow -->
  <ellipse cx="400" cy="200" rx="150" ry="160" fill="url(#atDust)"/>

  <!-- Stacked cardboard boxes (left group) -->
  <!-- Large bottom box -->
  <rect x="50" y="260" width="120" height="90" rx="3" fill="url(#atBox1)" stroke="#6B4E2E" stroke-width="2"/>
  <line x1="110" y1="260" x2="110" y2="350" stroke="#9B7A40" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="305" x2="170" y2="305" stroke="#9B7A40" stroke-width="1" opacity="0.5"/>
  <!-- Tape on box -->
  <rect x="95" y="260" width="30" height="12" fill="#C4A46A" opacity="0.6"/>

  <!-- Medium box on top -->
  <rect x="60" y="195" width="100" height="65" rx="3" fill="url(#atBox2)" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="110" y1="195" x2="110" y2="260" stroke="#8B6C42" stroke-width="1" opacity="0.5"/>
  <!-- Flaps slightly open -->
  <polygon points="60,195 75,185 110,195" fill="#8B6C42" stroke="#5C3D1E" stroke-width="1"/>
  <polygon points="110,195 145,185 160,195" fill="#9B7A50" stroke="#5C3D1E" stroke-width="1"/>

  <!-- Small box to the side -->
  <rect x="180" y="300" width="70" height="50" rx="2" fill="url(#atBox3)" stroke="#7A5A30" stroke-width="1.5"/>
  <line x1="215" y1="300" x2="215" y2="350" stroke="#8B7A50" stroke-width="0.8" opacity="0.5"/>

  <!-- Right side boxes -->
  <rect x="620" y="280" width="90" height="70" rx="3" fill="url(#atBox2)" stroke="#5C3D1E" stroke-width="2"/>
  <line x1="665" y1="280" x2="665" y2="350" stroke="#8B6C42" stroke-width="1" opacity="0.5"/>
  <rect x="640" y="230" width="60" height="50" rx="2" fill="url(#atBox1)" stroke="#6B4E2E" stroke-width="1.5"/>

  <!-- Old trunk -->
  <rect x="460" y="300" width="120" height="55" rx="4" fill="#5C3D1E" stroke="#3D2410" stroke-width="2"/>
  <rect x="460" y="295" width="120" height="12" rx="3" fill="#6B4E2E" stroke="#3D2410" stroke-width="1.5"/>
  <!-- Trunk hardware -->
  <rect x="510" y="310" width="20" height="15" rx="2" fill="#8B7040" stroke="#6B5020" stroke-width="1"/>
  <circle cx="520" cy="325" r="3" fill="#A0884C"/>
  <!-- Trunk straps -->
  <line x1="490" y1="295" x2="490" y2="355" stroke="#8B7040" stroke-width="2"/>
  <line x1="550" y1="295" x2="550" y2="355" stroke="#8B7040" stroke-width="2"/>

  <!-- Old chair -->
  <g transform="translate(720,260)">
    <!-- Chair back -->
    <rect x="0" y="0" width="8" height="90" fill="#5C3D1E" stroke="#3D2410" stroke-width="1"/>
    <rect x="50" y="0" width="8" height="90" fill="#5C3D1E" stroke="#3D2410" stroke-width="1"/>
    <rect x="5" y="5" width="48" height="40" rx="2" fill="#4A3020"/>
    <line x1="20" y1="5" x2="20" y2="45" stroke="#5C3D1E" stroke-width="1"/>
    <line x1="38" y1="5" x2="38" y2="45" stroke="#5C3D1E" stroke-width="1"/>
    <!-- Chair seat -->
    <rect x="-5" y="50" width="68" height="8" rx="2" fill="#6B4E2E"/>
    <!-- Chair legs -->
    <rect x="0" y="55" width="6" height="35" fill="#5C3D1E"/>
    <rect x="52" y="55" width="6" height="35" fill="#5C3D1E"/>
  </g>

  <!-- Cobweb top-left corner -->
  <g opacity="0.4" stroke="#D0D0D0" stroke-width="0.8" fill="none">
    <line x1="0" y1="120" x2="80" y2="120"/>
    <line x1="0" y1="120" x2="60" y2="160"/>
    <line x1="0" y1="120" x2="40" y2="190"/>
    <line x1="0" y1="120" x2="20" y2="200"/>
    <path d="M20,120 Q22,128 15,135 Q10,142 0,145"/>
    <path d="M40,120 Q44,135 30,150 Q20,165 0,170"/>
    <path d="M60,120 Q64,142 45,162 Q30,180 0,195"/>
    <path d="M80,120 Q78,150 55,175 Q35,198 0,215"/>
  </g>

  <!-- Cobweb top-right corner -->
  <g opacity="0.35" stroke="#D0D0D0" stroke-width="0.8" fill="none">
    <line x1="800" y1="120" x2="720" y2="120"/>
    <line x1="800" y1="120" x2="740" y2="155"/>
    <line x1="800" y1="120" x2="760" y2="185"/>
    <line x1="800" y1="120" x2="780" y2="200"/>
    <path d="M780,120 Q778,128 785,135 Q790,142 800,145"/>
    <path d="M760,120 Q756,135 770,150 Q780,165 800,170"/>
    <path d="M740,120 Q736,142 755,162 Q770,178 800,190"/>
    <path d="M720,120 Q722,148 745,172 Q765,195 800,210"/>
  </g>

  <!-- Spider on web (top-left) -->
  <g transform="translate(50,170)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="4" ry="5" fill="#1A1520"/>
    <ellipse cx="0" cy="-6" rx="3" ry="3.5" fill="#1A1520"/>
    <!-- Spider legs -->
    <line x1="-3" y1="-2" x2="-10" y2="-8" stroke="#1A1520" stroke-width="0.8"/>
    <line x1="-3" y1="0" x2="-11" y2="-3" stroke="#1A1520" stroke-width="0.8"/>
    <line x1="-3" y1="2" x2="-10" y2="5" stroke="#1A1520" stroke-width="0.8"/>
    <line x1="-3" y1="4" x2="-8" y2="10" stroke="#1A1520" stroke-width="0.8"/>
    <line x1="3" y1="-2" x2="10" y2="-8" stroke="#1A1520" stroke-width="0.8"/>
    <line x1="3" y1="0" x2="11" y2="-3" stroke="#1A1520" stroke-width="0.8"/>
    <line x1="3" y1="2" x2="10" y2="5" stroke="#1A1520" stroke-width="0.8"/>
    <line x1="3" y1="4" x2="8" y2="10" stroke="#1A1520" stroke-width="0.8"/>
    <!-- Spider eyes -->
    <circle cx="-1.5" cy="-7.5" r="0.8" fill="#FF4444" opacity="0.8"/>
    <circle cx="1.5" cy="-7.5" r="0.8" fill="#FF4444" opacity="0.8"/>
  </g>

  <!-- Hanging spider thread -->
  <line x1="50" y1="120" x2="50" y2="165" stroke="#D0D0D0" stroke-width="0.5" opacity="0.3"/>

  <!-- Label -->
  <rect x="280" y="410" width="240" height="35" rx="6" fill="#1A1520" opacity="0.9" stroke="#5C4A38" stroke-width="1"/>
  <text x="400" y="434" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#C8B898" letter-spacing="2">The Attic</text>
</svg>