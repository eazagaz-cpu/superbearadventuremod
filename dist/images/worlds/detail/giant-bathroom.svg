<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="btBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4F8"/>
      <stop offset="100%" stop-color="#B8D8E8"/>
    </linearGradient>
    <linearGradient id="btWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7EC8E3" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#4FA8D6"/>
      <stop offset="100%" stop-color="#2E86C1"/>
    </linearGradient>
    <linearGradient id="btTub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <linearGradient id="btFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4C4A8"/>
      <stop offset="100%" stop-color="#B8A888"/>
    </linearGradient>
    <radialGradient id="btSteam" cx="0.5" cy="1" r="0.8">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#btBg)"/>

  <!-- Tiled wall pattern -->
  <g opacity="0.25">
    <line x1="0" y1="0" x2="0" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="40" y1="0" x2="40" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="280" y1="0" x2="280" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="440" y1="0" x2="440" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="520" y1="0" x2="520" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="680" y1="0" x2="680" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="760" y1="0" x2="760" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="800" y2="40" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#A0C8D8" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#A0C8D8" stroke-width="0.5"/>
  </g>

  <!-- Floor -->
  <rect x="0" y="350" width="800" height="100" fill="url(#btFloor)"/>

  <!-- Enormous bathtub -->
  <path d="M100,350 Q100,180 150,170 L600,170 Q650,180 650,350" fill="url(#btTub)" stroke="#C0C0C0" stroke-width="3"/>
  <!-- Tub rim -->
  <rect x="90" y="165" width="570" height="18" rx="9" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="2"/>
  <!-- Tub feet -->
  <ellipse cx="130" cy="355" rx="15" ry="8" fill="#C0C0C0" stroke="#999" stroke-width="1.5"/>
  <ellipse cx="620" cy="355" rx="15" ry="8" fill="#C0C0C0" stroke="#999" stroke-width="1.5"/>

  <!-- Water inside tub -->
  <path d="M115,230 Q115,185 155,183 L595,183 Q635,185 635,230 L635,350 L115,350 Z" fill="url(#btWater)"/>
  <!-- Water surface shimmer -->
  <path d="M130,220 Q200,215 270,222 Q340,228 410,220 Q480,212 550,222 Q600,228 630,220" fill="none" stroke="#A8E0F0" stroke-width="2" opacity="0.6"/>
  <path d="M140,230 Q220,225 300,232 Q380,238 460,230 Q520,224 620,232" fill="none" stroke="#A8E0F0" stroke-width="1.5" opacity="0.4"/>

  <!-- Rubber duck -->
  <g transform="translate(420,195)">
    <!-- Duck body -->
    <ellipse cx="0" cy="15" rx="30" ry="22" fill="#FFD700"/>
    <ellipse cx="0" cy="15" rx="28" ry="20" fill="#FFE44D"/>
    <!-- Duck head -->
    <circle cx="-20" cy="-5" r="18" fill="#FFE44D"/>
    <circle cx="-20" cy="-5" r="16" fill="#FFD700" opacity="0.3"/>
    <!-- Duck eye -->
    <circle cx="-26" cy="-10" r="3.5" fill="#FFFFFF"/>
    <circle cx="-27" cy="-10" r="2" fill="#1A1A1A"/>
    <circle cx="-27.5" cy="-10.5" r="0.8" fill="#FFFFFF"/>
    <!-- Duck beak -->
    <ellipse cx="-38" cy="-2" rx="10" ry="5" fill="#FF8C00"/>
    <line x1="-45" y1="-2" x2="-30" y2="-2" stroke="#E07000" stroke-width="1"/>
    <!-- Duck wing -->
    <ellipse cx="8" cy="10" rx="14" ry="10" fill="#F0C800" transform="rotate(-10,8,10)"/>
    <!-- Duck tail -->
    <polygon points="28,5 38,0 30,12" fill="#FFD700"/>
  </g>

  <!-- Bubbles -->
  <circle cx="200" cy="200" r="12" fill="none" stroke="#E8F4FF" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="200" r="8" fill="#E8F8FF" opacity="0.15"/>
  <circle cx="250" cy="185" r="8" fill="none" stroke="#E8F4FF" stroke-width="1" opacity="0.6"/>
  <circle cx="320" cy="175" r="15" fill="none" stroke="#E8F4FF" stroke-width="1.5" opacity="0.7"/>
  <circle cx="320" cy="175" r="10" fill="#E8F8FF" opacity="0.12"/>
  <circle cx="500" cy="190" r="10" fill="none" stroke="#E8F4FF" stroke-width="1.2" opacity="0.65"/>
  <circle cx="550" cy="178" r="6" fill="none" stroke="#E8F4FF" stroke-width="1" opacity="0.5"/>
  <circle cx="180" cy="170" r="5" fill="none" stroke="#E8F4FF" stroke-width="0.8" opacity="0.5"/>
  <circle cx="580" cy="195" r="7" fill="none" stroke="#E8F4FF" stroke-width="1" opacity="0.55"/>
  <!-- Floating bubbles above water -->
  <circle cx="280" cy="140" r="9" fill="none" stroke="#E8F4FF" stroke-width="1.2" opacity="0.5"/>
  <circle cx="350" cy="120" r="6" fill="none" stroke="#E8F4FF" stroke-width="0.8" opacity="0.4"/>
  <circle cx="460" cy="145" r="11" fill="none" stroke="#E8F4FF" stroke-width="1.3" opacity="0.45"/>
  <circle cx="520" cy="130" r="5" fill="none" stroke="#E8F4FF" stroke-width="0.7" opacity="0.35"/>
  <circle cx="220" cy="150" r="7" fill="none" stroke="#E8F4FF" stroke-width="1" opacity="0.4"/>
  <circle cx="400" cy="110" r="4" fill="none" stroke="#E8F4FF" stroke-width="0.6" opacity="0.3"/>

  <!-- Faucet -->
  <g transform="translate(140,100)">
    <rect x="0" y="40" width="18" height="60" rx="4" fill="#C0C0C0" stroke="#999" stroke-width="1.5"/>
    <path d="M5,40 Q5,10 30,10 L60,10 Q70,10 70,20 L70,30" fill="none" stroke="#C0C0C0" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="70" cy="35" rx="8" ry="4" fill="#B0B0B0"/>
    <!-- Drip -->
    <ellipse cx="70" cy="48" rx="3" ry="5" fill="#7EC8E3" opacity="0.6"/>
    <!-- Faucet handles -->
    <circle cx="-5" cy="50" r="8" fill="#D0D0D0" stroke="#999" stroke-width="1"/>
    <text x="-5" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4FA8D6" font-weight="bold">C</text>
    <circle cx="23" cy="50" r="8" fill="#D0D0D0" stroke="#999" stroke-width="1"/>
    <text x="23" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E74C3C" font-weight="bold">H</text>
  </g>

  <!-- Steam/mist effect -->
  <ellipse cx="300" cy="100" rx="120" ry="50" fill="url(#btSteam)"/>
  <ellipse cx="450" cy="80" rx="100" ry="40" fill="url(#btSteam)"/>
  <ellipse cx="250" cy="70" rx="80" ry="35" fill="url(#btSteam)"/>
  <!-- Wispy steam lines -->
  <path d="M300,160 Q295,140 305,120 Q310,100 300,80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
  <path d="M380,155 Q375,130 385,110 Q390,90 380,70" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.18"/>
  <path d="M460,160 Q455,135 465,115 Q470,95 460,75" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.15"/>
  <path d="M530,158 Q525,135 535,118 Q540,100 530,85" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.12"/>

  <!-- Giant soap bar -->
  <g transform="translate(680,280)">
    <rect x="0" y="0" width="70" height="45" rx="12" fill="#A8E6CF" stroke="#7BC8A4" stroke-width="2"/>
    <rect x="8" y="8" width="54" height="29" rx="6" fill="#C2F0D7" opacity="0.5"/>
    <text x="35" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5BA88A" font-weight="bold">SOAP</text>
    <!-- Soap bubbles nearby -->
    <circle cx="75" cy="10" r="4" fill="none" stroke="#E8F4FF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="80" cy="-5" r="3" fill="none" stroke="#E8F4FF" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Label -->
  <rect x="235" y="410" width="330" height="35" rx="6" fill="#2E86C1" opacity="0.85"/>
  <text x="400" y="434" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#E8F8FF" letter-spacing="2">Giant Bathroom</text>
</svg>