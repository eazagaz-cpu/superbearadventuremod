<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4E342E"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFA726" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3E2723" stop-opacity="0"/>
    </radialGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect width="400" height="300" fill="url(#glow)"/>
  <!-- Cave ceiling -->
  <path d="M0,60 Q60,40 120,70 Q180,30 240,60 Q300,40 360,55 Q380,50 400,60 L400,0 L0,0Z" fill="#5D4037"/>
  <!-- Cave floor -->
  <path d="M0,260 Q80,240 160,255 Q240,235 320,250 Q360,240 400,260 L400,300 L0,300Z" fill="#5D4037"/>
  <!-- Stalactites -->
  <polygon points="80,60 88,100 72,100" fill="#6D4C41"/>
  <polygon points="200,50 206,85 194,85" fill="#6D4C41"/>
  <polygon points="310,55 316,90 304,90" fill="#6D4C41"/>
  <!-- Mine cart -->
  <g transform="translate(200, 210)" filter="url(#s)">
    <line x1="-120" y1="18" x2="120" y2="18" stroke="#795548" stroke-width="3"/>
    <line x1="-120" y1="23" x2="120" y2="23" stroke="#795548" stroke-width="3"/>
    <polygon points="-28,-8 -35,15 35,15 28,-8" fill="#757575"/>
    <polygon points="-28,-8 -35,15 35,15 28,-8" fill="none" stroke="#9E9E9E" stroke-width="1"/>
    <polygon points="-10,-5 -5,8 -15,8" fill="#4FC3F7"/>
    <polygon points="5,-2 10,8 0,8" fill="#66BB6A"/>
    <polygon points="15,-4 20,6 10,6" fill="#EF5350"/>
    <circle cx="-20" cy="18" r="5" fill="#616161" stroke="#9E9E9E" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="5" fill="#616161" stroke="#9E9E9E" stroke-width="1.5"/>
  </g>
  <!-- Gems -->
  <polygon points="70,150 78,165 62,165" fill="#4FC3F7" opacity="0.7" filter="url(#s)"/>
  <polygon points="330,130 338,145 322,145" fill="#E040FB" opacity="0.6" filter="url(#s)"/>
  <polygon points="150,245 156,255 144,255" fill="#FFD54F" opacity="0.7" filter="url(#s)"/>
  <!-- Lantern -->
  <g transform="translate(200, 140)" filter="url(#s)">
    <rect x="-5" y="-12" width="10" height="16" rx="2" fill="#FF8F00"/>
    <rect x="-4" y="-10" width="8" height="12" rx="1.5" fill="#FFD54F" opacity="0.5"/>
    <circle cx="0" cy="-2" r="20" fill="#FFA726" opacity="0.08"/>
  </g>
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#EFEBE9">Mole Mines</text>
</svg>