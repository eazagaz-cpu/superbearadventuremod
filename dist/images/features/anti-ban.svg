<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Security shield -->
  <g transform="translate(200, 130)" filter="url(#s)">
    <path d="M0,-75 L70,-48 L70,22 L0,75 L-70,22 L-70,-48Z" fill="#558B2F" stroke="#8BC34A" stroke-width="3"/>
    <path d="M0,-60 L55,-38 L55,17 L0,60 L-55,17 L-55,-38Z" fill="#4CAF50"/>
    <!-- Lock icon -->
    <g transform="translate(0, -10)">
      <rect x="-18" y="0" width="36" height="28" rx="4" fill="#1B5E20"/>
      <path d="M-10,0 L-10,-12 Q-10,-25 0,-25 Q10,-25 10,-12 L10,0" fill="none" stroke="#1B5E20" stroke-width="5" stroke-linecap="round"/>
      <circle cx="0" cy="12" r="5" fill="#8BC34A"/>
      <rect x="-2" y="15" width="4" height="8" rx="1" fill="#8BC34A"/>
    </g>
    <!-- Checkmark badge -->
    <g transform="translate(35, -35)">
      <circle cx="0" cy="0" r="18" fill="#8BC34A"/>
      <path d="M-8,0 L-3,5 L8,-5" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Protection rings -->
  <circle cx="200" cy="130" r="90" fill="none" stroke="#8BC34A" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="130" r="100" fill="none" stroke="#8BC34A" stroke-width="0.5" opacity="0.15"/>
  <text x="200" y="245" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#F1F8E9">Anti-Ban Protection</text>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="12" fill="#A5D6A7">Safe &amp; Secure Modding</text>
</svg>