<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Wardrobe/closet -->
  <g transform="translate(200, 130)" filter="url(#s)">
    <rect x="-70" y="-60" width="140" height="130" rx="6" fill="#558B2F"/>
    <rect x="-65" y="-55" width="60" height="120" rx="3" fill="#4CAF50" stroke="#66BB6A" stroke-width="1"/>
    <rect x="5" y="-55" width="60" height="120" rx="3" fill="#4CAF50" stroke="#66BB6A" stroke-width="1"/>
    <circle cx="-10" cy="5" r="4" fill="#FFD54F"/>
    <circle cx="10" cy="5" r="4" fill="#FFD54F"/>
  </g>
  <!-- Color palette circles -->
  <g transform="translate(200, 220)" filter="url(#s)">
    <circle cx="-60" cy="0" r="18" fill="#F44336"/>
    <circle cx="-20" cy="0" r="18" fill="#2196F3"/>
    <circle cx="20" cy="0" r="18" fill="#FFC107"/>
    <circle cx="60" cy="0" r="18" fill="#9C27B0"/>
  </g>
  <!-- Hanger icon above wardrobe -->
  <g transform="translate(200, 55)" opacity="0.4">
    <path d="M0,-10 L0,-5 Q0,0 -25,12 L25,12 Q0,0 0,-5" fill="none" stroke="#C5E1A5" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-12" r="3" fill="none" stroke="#C5E1A5" stroke-width="2"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#F1F8E9">All Skins Unlocked</text>
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="12" fill="#A5D6A7">Every Costume Available</text>
</svg>