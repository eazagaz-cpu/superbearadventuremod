<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Coins -->
  <g filter="url(#s)">
    <circle cx="160" cy="120" r="35" fill="url(#coin)" stroke="#FF8F00" stroke-width="2"/>
    <text x="160" y="130" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="30" fill="#E65100">$</text>
    <circle cx="240" cy="120" r="35" fill="url(#coin)" stroke="#FF8F00" stroke-width="2"/>
    <text x="240" y="130" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="30" fill="#E65100">$</text>
    <circle cx="200" cy="145" r="35" fill="url(#coin)" stroke="#FF8F00" stroke-width="2"/>
    <text x="200" y="155" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="30" fill="#E65100">$</text>
  </g>
  <!-- Infinity symbol -->
  <g transform="translate(200, 210)" filter="url(#s)">
    <path d="M-25,0 C-25,-18 -8,-18 0,0 C8,18 25,18 25,0 C25,-18 8,-18 0,0 C-8,18 -25,18 -25,0Z" fill="none" stroke="#8BC34A" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Sparkles -->
  <g fill="#FFC107" opacity="0.4">
    <polygon points="100,70 103,78 111,78 105,83 107,91 100,86 93,91 95,83 89,78 97,78"/>
    <polygon points="300,60 303,68 311,68 305,73 307,81 300,76 293,81 295,73 289,68 297,68"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#F1F8E9">Unlimited Coins</text>
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="12" fill="#A5D6A7">Infinite In-Game Currency</text>
</svg>