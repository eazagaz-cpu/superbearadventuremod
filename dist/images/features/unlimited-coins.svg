<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="coin-g" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="coin-face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCA28"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#BF360C" flood-opacity="0.15"/></filter>
    <radialGradient id="sparkle" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF9C4"/><stop offset="100%" stop-color="#FFF9C4" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)"/>
  <!-- Subtle pattern -->
  <g opacity="0.06">
    <circle cx="100" cy="100" r="60" fill="#FFB300"/><circle cx="300" cy="50" r="40" fill="#FFB300"/>
    <circle cx="600" cy="80" r="50" fill="#FFB300"/><circle cx="700" cy="200" r="70" fill="#FFB300"/>
    <circle cx="150" cy="400" r="45" fill="#FFB300"/><circle cx="650" cy="500" r="55" fill="#FFB300"/>
  </g>
  <!-- Large coin stack -->
  <g transform="translate(400, 260)" filter="url(#sh)">
    <!-- Bottom coins (stack) -->
    <ellipse cx="0" cy="80" rx="100" ry="25" fill="#E65100" opacity="0.3"/>
    <g><ellipse cx="0" cy="60" rx="85" ry="22" fill="#FF8F00"/><ellipse cx="0" cy="55" rx="85" ry="22" fill="url(#coin-g)"/><ellipse cx="0" cy="55" rx="70" ry="17" fill="url(#coin-face)"/></g>
    <g><ellipse cx="0" cy="35" rx="85" ry="22" fill="#FF8F00"/><ellipse cx="0" cy="30" rx="85" ry="22" fill="url(#coin-g)"/><ellipse cx="0" cy="30" rx="70" ry="17" fill="url(#coin-face)"/></g>
    <g><ellipse cx="0" cy="10" rx="85" ry="22" fill="#FF8F00"/><ellipse cx="0" cy="5" rx="85" ry="22" fill="url(#coin-g)"/><ellipse cx="0" cy="5" rx="70" ry="17" fill="url(#coin-face)"/></g>
    <g><ellipse cx="0" cy="-15" rx="85" ry="22" fill="#FF8F00"/><ellipse cx="0" cy="-20" rx="85" ry="22" fill="url(#coin-g)"/><ellipse cx="0" cy="-20" rx="70" ry="17" fill="url(#coin-face)"/><text x="0" y="-14" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="22" fill="#E65100" opacity="0.6">&#x2B22;</text></g>
  </g>
  <!-- Flying coins -->
  <g filter="url(#glow)" opacity="0.9">
    <circle cx="180" cy="150" r="32" fill="url(#coin-g)" stroke="#FF8F00" stroke-width="2"/><text x="180" y="159" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="24" fill="#E65100" opacity="0.7">&#x2B22;</text>
    <circle cx="620" cy="180" r="28" fill="url(#coin-g)" stroke="#FF8F00" stroke-width="2"/><text x="620" y="188" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="20" fill="#E65100" opacity="0.7">&#x2B22;</text>
    <circle cx="150" cy="350" r="24" fill="url(#coin-g)" stroke="#FF8F00" stroke-width="2"/>
    <circle cx="660" cy="380" r="30" fill="url(#coin-g)" stroke="#FF8F00" stroke-width="2"/>
  </g>
  <!-- Sparkle effects -->
  <g filter="url(#glow)">
    <circle cx="250" cy="120" r="15" fill="url(#sparkle)"/>
    <circle cx="550" cy="100" r="12" fill="url(#sparkle)"/>
    <circle cx="350" cy="400" r="18" fill="url(#sparkle)"/>
    <circle cx="500" cy="350" r="10" fill="url(#sparkle)"/>
  </g>
  <!-- Infinity counter display -->
  <g transform="translate(400, 480)">
    <rect x="-160" y="-30" width="320" height="60" rx="30" fill="#4E342E" opacity="0.9"/>
    <rect x="-155" y="-25" width="310" height="50" rx="25" fill="#3E2723"/>
    <circle cx="-120" cy="0" r="16" fill="url(#coin-g)"/>
    <text x="-120" y="6" text-anchor="middle" font-family="monospace" font-weight="900" font-size="14" fill="#E65100">$</text>
    <text x="10" y="8" text-anchor="middle" font-family="monospace" font-weight="900" font-size="26" fill="#FFD54F" letter-spacing="2">x999,999,999</text>
  </g>
</svg>