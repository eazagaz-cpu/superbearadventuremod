<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgMap" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="50%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="forestGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="desertGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9A825"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </linearGradient>
    <linearGradient id="lavaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <filter id="mapShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgMap)"/>
  <!-- Parchment overlay -->
  <rect width="800" height="450" fill="#f5e6c8" opacity="0.06"/>

  <!-- Title banner -->
  <rect x="280" y="8" width="240" height="32" rx="6" fill="#1B5E20" stroke="#8BC34A" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#C5E1A5" letter-spacing="3">WORLD MAP</text>

  <!-- Water areas -->
  <ellipse cx="400" cy="240" rx="360" ry="180" fill="url(#waterGrad)" opacity="0.15"/>
  <ellipse cx="680" cy="350" rx="80" ry="50" fill="url(#waterGrad)" opacity="0.2"/>
  <text x="680" y="355" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4FC3F7" opacity="0.6" font-style="italic">Crystal Lake</text>

  <!-- Forest Zone -->
  <path d="M80,100 Q120,70 200,80 Q260,75 280,110 Q300,140 280,180 Q260,210 200,220 Q140,225 100,200 Q60,170 60,140 Q55,115 80,100 Z" fill="url(#forestGrad)" opacity="0.8" stroke="#33691E" stroke-width="2" filter="url(#mapShadow)"/>
  <g opacity="0.6">
    <polygon points="130,130 125,150 135,150" fill="#2E7D32"/>
    <polygon points="130,125 122,148 138,148" fill="#388E3C"/>
    <polygon points="160,140 155,160 165,160" fill="#2E7D32"/>
    <polygon points="200,120 195,140 205,140" fill="#388E3C"/>
    <polygon points="180,160 175,180 185,180" fill="#2E7D32"/>
    <polygon points="220,150 215,170 225,170" fill="#388E3C"/>
    <polygon points="110,170 105,190 115,190" fill="#2E7D32"/>
  </g>
  <text x="170" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">Emerald Forest</text>

  <!-- Desert Zone -->
  <path d="M520,120 Q580,80 650,100 Q710,110 730,160 Q740,200 720,240 Q690,270 630,275 Q570,270 540,240 Q510,200 510,160 Q505,135 520,120 Z" fill="url(#desertGrad)" opacity="0.75" stroke="#E65100" stroke-width="2" filter="url(#mapShadow)"/>
  <path d="M560,180 Q590,165 620,180 Q650,165 680,180" fill="none" stroke="#FFB300" stroke-width="2" opacity="0.5"/>
  <path d="M570,200 Q600,185 630,200 Q660,185 690,200" fill="none" stroke="#FFB300" stroke-width="2" opacity="0.4"/>
  <polygon points="630,140 615,175 645,175" fill="#FFC107" stroke="#F57F17" stroke-width="1.5" opacity="0.7"/>
  <text x="625" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#FFE082">Sandy Dunes</text>

  <!-- Snow Zone -->
  <path d="M560,50 Q610,30 670,45 Q720,50 740,80 Q745,100 720,110 Q680,120 640,115 Q590,110 570,90 Q550,70 560,50 Z" fill="url(#snowGrad)" opacity="0.8" stroke="#78909C" stroke-width="2" filter="url(#mapShadow)"/>
  <g opacity="0.5" fill="#fff">
    <circle cx="610" cy="70" r="3"/><circle cx="640" cy="60" r="2"/><circle cx="680" cy="75" r="3"/>
    <circle cx="660" cy="90" r="2"/><circle cx="620" cy="95" r="2.5"/>
  </g>
  <polygon points="650,55 640,85 660,85" fill="#CFD8DC" stroke="#90A4AE" stroke-width="1" opacity="0.6"/>
  <polygon points="690,60 680,82 700,82" fill="#CFD8DC" stroke="#90A4AE" stroke-width="1" opacity="0.5"/>
  <text x="650" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#546E7A">Frostpeak</text>

  <!-- Lava Zone -->
  <path d="M300,300 Q340,270 400,280 Q460,270 490,300 Q510,330 490,360 Q460,390 400,395 Q340,390 310,360 Q285,335 300,300 Z" fill="url(#lavaGrad)" opacity="0.75" stroke="#B71C1C" stroke-width="2" filter="url(#mapShadow)"/>
  <path d="M350,320 L370,340 L360,360" fill="none" stroke="#FF6F00" stroke-width="2" opacity="0.7"/>
  <path d="M420,310 L430,335 L440,350" fill="none" stroke="#FF6F00" stroke-width="2" opacity="0.6"/>
  <polygon points="400,290 385,325 415,325" fill="#C62828" stroke="#FF5722" stroke-width="1" opacity="0.6"/>
  <ellipse cx="400" cy="292" rx="6" ry="3" fill="#FF6F00" opacity="0.8"/>
  <text x="400" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#FF8A80">Molten Crater</text>

  <!-- Meadow Zone -->
  <path d="M80,280 Q130,260 190,275 Q240,270 260,300 Q270,330 250,355 Q220,380 170,385 Q110,380 80,350 Q60,320 70,300 Q65,285 80,280 Z" fill="#558B2F" opacity="0.6" stroke="#33691E" stroke-width="2" filter="url(#mapShadow)"/>
  <g opacity="0.5">
    <circle cx="130" cy="310" r="4" fill="#E91E63"/><circle cx="170" cy="330" r="3" fill="#FF9800"/>
    <circle cx="200" cy="305" r="3.5" fill="#9C27B0"/><circle cx="150" cy="350" r="3" fill="#FF5722"/>
  </g>
  <text x="165" y="375" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#AED581">Bloom Meadow</text>

  <!-- Dotted path lines -->
  <g fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="6,4" opacity="0.4">
    <path d="M250,130 Q400,60 570,70"/>
    <path d="M220,210 Q280,260 320,300"/>
    <path d="M550,250 Q500,270 480,300"/>
    <path d="M700,110 Q710,140 700,160"/>
    <path d="M140,220 Q140,250 140,275"/>
    <path d="M250,340 Q280,350 310,350"/>
  </g>

  <!-- Location marker pins -->
  <g filter="url(#softGlow)">
    <g transform="translate(170, 145)">
      <path d="M0,-18 C-10,-18 -14,-8 -14,0 C-14,12 0,22 0,22 C0,22 14,12 14,0 C14,-8 10,-18 0,-18 Z" fill="#F44336"/>
      <circle cx="0" cy="-2" r="5" fill="#fff"/>
    </g>
    <g transform="translate(630, 165)">
      <path d="M0,-18 C-10,-18 -14,-8 -14,0 C-14,12 0,22 0,22 C0,22 14,12 14,0 C14,-8 10,-18 0,-18 Z" fill="#F44336"/>
      <circle cx="0" cy="-2" r="5" fill="#fff"/>
    </g>
    <g transform="translate(400, 320)">
      <path d="M0,-18 C-10,-18 -14,-8 -14,0 C-14,12 0,22 0,22 C0,22 14,12 14,0 C14,-8 10,-18 0,-18 Z" fill="#F44336"/>
      <circle cx="0" cy="-2" r="5" fill="#fff"/>
    </g>
    <g transform="translate(650, 65)">
      <path d="M0,-14 C-8,-14 -11,-6 -11,0 C-11,10 0,18 0,18 C0,18 11,10 11,0 C11,-6 8,-14 0,-14 Z" fill="#2196F3"/>
      <circle cx="0" cy="-1" r="4" fill="#fff"/>
    </g>
    <g transform="translate(165, 315)">
      <path d="M0,-14 C-8,-14 -11,-6 -11,0 C-11,10 0,18 0,18 C0,18 11,10 11,0 C11,-6 8,-14 0,-14 Z" fill="#FF9800"/>
      <circle cx="0" cy="-1" r="4" fill="#fff"/>
    </g>
  </g>

  <!-- Compass rose -->
  <g transform="translate(720, 400)" opacity="0.8">
    <circle cx="0" cy="0" r="30" fill="#1B5E20" stroke="#8BC34A" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#558B2F" stroke-width="0.5"/>
    <polygon points="0,-24 -5,-8 5,-8" fill="#C5E1A5"/>
    <polygon points="0,24 -5,8 5,8" fill="#558B2F"/>
    <polygon points="24,0 8,-5 8,5" fill="#689F38"/>
    <polygon points="-24,0 -8,-5 -8,5" fill="#689F38"/>
    <circle cx="0" cy="0" r="3" fill="#8BC34A"/>
    <text x="0" y="-30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#C5E1A5">N</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#689F38">S</text>
    <text x="35" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#689F38">E</text>
    <text x="-35" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#689F38">W</text>
  </g>

  <!-- Map border -->
  <rect x="10" y="10" width="780" height="430" rx="4" fill="none" stroke="#8BC34A" stroke-width="1.5" opacity="0.25"/>
  <rect x="15" y="15" width="770" height="420" rx="3" fill="none" stroke="#8BC34A" stroke-width="0.5" opacity="0.15"/>

  <!-- Legend -->
  <g transform="translate(30, 390)">
    <rect x="0" y="0" width="170" height="45" rx="6" fill="#1B5E20" opacity="0.7" stroke="#558B2F" stroke-width="1"/>
    <circle cx="18" cy="15" r="5" fill="#558B2F"/><text x="30" y="19" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#2E7D32">Forest</text>
    <circle cx="80" cy="15" r="5" fill="#F9A825"/><text x="92" y="19" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#FFE082">Desert</text>
    <circle cx="138" cy="15" r="5" fill="#E8EAF6"/><text x="150" y="19" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#CFD8DC">Snow</text>
    <circle cx="18" cy="33" r="5" fill="#D32F2F"/><text x="30" y="37" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#FF8A80">Lava</text>
    <circle cx="80" cy="33" r="5" fill="#558B2F" opacity="0.6"/><text x="92" y="37" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#AED581">Meadow</text>
  </g>
</svg>