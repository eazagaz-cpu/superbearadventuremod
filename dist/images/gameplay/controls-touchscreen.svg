    <text x="215" y="131" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="9" fill="#fff" opacity="0.6">HP</text>
  </g>
  <g opacity="0.75">
    <circle cx="220" cy="148" r="7" fill="#FFD600"/>
    <text x="232" y="152" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="12" fill="#fff" opacity="0.7">x 42</text>
  </g>
  <g opacity="0.35">
    <circle cx="296" cy="324" r="32" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="510" cy="345" r="34" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
