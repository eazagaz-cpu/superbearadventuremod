<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>
  <rect x="20" y="20" width="760" height="410" fill="none" stroke="#4CAF50" stroke-width="1" stroke-opacity="0.3" rx="8"/>
  <text x="400" y="42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="22" fill="#E8F5E9" letter-spacing="1">TOUCHSCREEN CONTROLS</text>
  <rect x="175" y="60" width="450" height="380" rx="36" ry="36" fill="#263238" filter="url(#shadow)"/>
  <rect x="183" y="68" width="434" height="364" rx="30" ry="30" fill="#37474F"/>
  <rect x="198" y="100" width="404" height="300" rx="6" fill="url(#screen)"/>
  <rect x="198" y="100" width="404" height="300" rx="6" fill="#2E7D32" opacity="0.4"/>
  <rect x="198" y="340" width="404" height="60" fill="#558B2F" opacity="0.3"/>
  <polygon points="280,280 300,340 260,340" fill="#2E7D32" opacity="0.4"/>
  <polygon points="500,290 520,340 480,340" fill="#2E7D32" opacity="0.4"/>
  <ellipse cx="350" cy="140" rx="40" ry="15" fill="#fff" opacity="0.5"/>
  <ellipse cx="500" cy="130" rx="35" ry="12" fill="#fff" opacity="0.4"/>
  <rect x="365" y="72" width="70" height="18" rx="9" fill="#1a1a1a"/>
  <circle cx="400" cy="81" r="5" fill="#333"/>
  <rect x="340" y="420" width="120" height="5" rx="3" fill="#555"/>
  <g opacity="0.85">
    <circle cx="290" cy="330" r="55" fill="#000" opacity="0.25"/>
    <circle cx="290" cy="330" r="52" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <polygon points="290,285 280,300 300,300" fill="#fff" opacity="0.4"/>
    <polygon points="290,375 280,360 300,360" fill="#fff" opacity="0.4"/>
    <polygon points="245,330 260,320 260,340" fill="#fff" opacity="0.4"/>
    <polygon points="335,330 320,320 320,340" fill="#fff" opacity="0.4"/>
    <circle cx="296" cy="324" r="22" fill="#fff" opacity="0.6" filter="url(#innerShadow)"/>
    <circle cx="296" cy="324" r="18" fill="#fff" opacity="0.4"/>
    <text x="290" y="400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="11" fill="#fff" opacity="0.7">MOVE</text>
  </g>
  <g opacity="0.85">
    <circle cx="510" cy="345" r="26" fill="url(#btnGrad)" filter="url(#innerShadow)"/>
    <circle cx="510" cy="345" r="23" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <text x="510" y="352" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="20" fill="#fff">A</text>
    <text x="510" y="383" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="9" fill="#fff" opacity="0.7">JUMP</text>
    <circle cx="555" cy="310" r="22" fill="#E53935" filter="url(#innerShadow)"/>
    <circle cx="555" cy="310" r="19" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <text x="555" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="17" fill="#fff">B</text>
    <text x="555" y="342" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="9" fill="#fff" opacity="0.7">ATTACK</text>
  </g>
  <g opacity="0.7">
    <rect x="560" y="110" width="30" height="22" rx="5" fill="#000" opacity="0.3"/>
    <rect x="570" y="115" width="4" height="12" rx="1" fill="#fff" opacity="0.7"/>
    <rect x="578" y="115" width="4" height="12" rx="1" fill="#fff" opacity="0.7"/>
  </g>
  <g opacity="0.75">
    <rect x="210" y="110" width="100" height="10" rx="5" fill="#000" opacity="0.3"/>
