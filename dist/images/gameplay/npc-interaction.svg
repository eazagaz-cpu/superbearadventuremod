<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="60%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="bearFur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="npcBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#5E35B1"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="warmGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="300" fill="url(#skyGrad)"/>
  <!-- Ground -->
  <rect y="280" width="800" height="170" fill="url(#groundGrad)"/>
  <path d="M0,285 Q200,275 400,285 Q600,295 800,282" fill="none" stroke="#689F38" stroke-width="2" opacity="0.4"/>

  <!-- Clouds -->
  <g opacity="0.6" fill="#fff">
    <ellipse cx="150" cy="70" rx="50" ry="20"/>
    <ellipse cx="180" cy="65" rx="35" ry="18"/>
    <ellipse cx="120" cy="68" rx="30" ry="15"/>
    <ellipse cx="600" cy="90" rx="45" ry="18"/>
    <ellipse cx="630" cy="85" rx="35" ry="16"/>
    <ellipse cx="570" cy="88" rx="30" ry="14"/>
    <ellipse cx="400" cy="50" rx="40" ry="15"/>
    <ellipse cx="430" cy="47" rx="30" ry="13"/>
  </g>

  <!-- Sun -->
  <circle cx="700" cy="60" r="35" fill="#FFF176" opacity="0.8" filter="url(#warmGlow)"/>
  <circle cx="700" cy="60" r="25" fill="#FFEE58"/>

  <!-- Background trees -->
  <g opacity="0.35">
    <polygon points="50,280 35,230 20,280" fill="#2E7D32"/>
    <polygon points="50,260 30,200 10,260" fill="#388E3C"/>
    <rect x="33" y="260" width="8" height="25" fill="#5D4037"/>
    <polygon points="750,280 735,225 720,280" fill="#2E7D32"/>
    <polygon points="750,255 730,195 710,255" fill="#388E3C"/>
    <rect x="733" y="255" width="8" height="28" fill="#5D4037"/>
    <polygon points="100,285 85,245 70,285" fill="#2E7D32"/>
    <polygon points="680,285 665,240 650,285" fill="#388E3C"/>
  </g>

  <!-- Ground details -->
  <g opacity="0.3">
    <ellipse cx="200" cy="380" rx="30" ry="5" fill="#689F38"/>
    <ellipse cx="500" cy="400" rx="25" ry="4" fill="#558B2F"/>
    <ellipse cx="650" cy="370" rx="20" ry="4" fill="#689F38"/>
    <circle cx="180" cy="340" r="3" fill="#E91E63" opacity="0.5"/>
    <circle cx="550" cy="360" r="3" fill="#FF9800" opacity="0.5"/>
    <circle cx="620" cy="330" r="2.5" fill="#E91E63" opacity="0.4"/>
  </g>

  <!-- Warm glow between characters -->
  <ellipse cx="400" cy="330" rx="120" ry="60" fill="#FFF176" opacity="0.06"/>

  <!-- BEAR CHARACTER -->
  <g transform="translate(300, 260)" filter="url(#softShadow)">
    <ellipse cx="0" cy="95" rx="35" ry="8" fill="#1B5E20" opacity="0.3"/>
    <!-- Body -->
    <ellipse cx="0" cy="45" rx="32" ry="40" fill="url(#bearFur)"/>
    <ellipse cx="0" cy="50" rx="20" ry="25" fill="#A1887F"/>
    <!-- Head -->
    <circle cx="0" cy="-5" r="28" fill="url(#bearFur)"/>
    <!-- Ears -->
    <circle cx="-20" cy="-28" r="10" fill="#8D6E63"/>
    <circle cx="-20" cy="-28" r="6" fill="#BCAAA4"/>
    <circle cx="20" cy="-28" r="10" fill="#8D6E63"/>
    <circle cx="20" cy="-28" r="6" fill="#BCAAA4"/>
    <!-- Face -->
    <ellipse cx="0" cy="2" rx="14" ry="10" fill="#BCAAA4"/>
    <circle cx="-10" cy="-8" r="4" fill="#fff"/>
    <circle cx="-9" cy="-7" r="2.5" fill="#3E2723"/>
    <circle cx="-8" cy="-8" r="1" fill="#fff"/>
    <circle cx="10" cy="-8" r="4" fill="#fff"/>
    <circle cx="11" cy="-7" r="2.5" fill="#3E2723"/>
    <circle cx="12" cy="-8" r="1" fill="#fff"/>
    <ellipse cx="0" cy="0" rx="5" ry="3.5" fill="#3E2723"/>
    <ellipse cx="-1" cy="-1" rx="2" ry="1" fill="#5D4037" opacity="0.5"/>
    <path d="M-6,5 Q0,12 6,5" fill="none" stroke="#3E2723" stroke-width="1.5"/>
    <!-- Arms -->
    <path d="M28,35 Q45,25 48,15" fill="none" stroke="#8D6E63" stroke-width="10" stroke-linecap="round"/>
    <circle cx="48" cy="15" r="6" fill="#6D4C41"/>
    <path d="M-28,35 Q-40,45 -35,55" fill="none" stroke="#8D6E63" stroke-width="10" stroke-linecap="round"/>
    <!-- Legs -->
    <ellipse cx="-14" cy="82" rx="12" ry="8" fill="#6D4C41"/>
    <ellipse cx="14" cy="82" rx="12" ry="8" fill="#6D4C41"/>
    <!-- Waving sparkle -->
    <g transform="translate(55, 8)" opacity="0.7">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFF176" stroke-width="1.5"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFF176" stroke-width="1.5"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#FFF176" stroke-width="1"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#FFF176" stroke-width="1"/>
    </g>
  </g>

  <!-- NPC CHARACTER -->
  <g transform="translate(500, 255)" filter="url(#softShadow)">
    <ellipse cx="0" cy="100" rx="30" ry="7" fill="#1B5E20" opacity="0.3"/>
    <!-- Body (robe) -->
    <path d="M-25,20 Q-30,60 -28,90 L28,90 Q30,60 25,20 Z" fill="url(#npcBody)"/>
    <line x1="0" y1="25" x2="0" y2="88" stroke="#9575CD" stroke-width="1.5" opacity="0.5"/>
    <path d="M-20,45 L20,45" stroke="#B39DDB" stroke-width="1" opacity="0.4"/>
    <path d="M-22,65 L22,65" stroke="#B39DDB" stroke-width="1" opacity="0.3"/>
    <!-- Belt -->
    <rect x="-26" y="42" width="52" height="6" rx="2" fill="#FFC107"/>
    <circle cx="0" cy="45" r="4" fill="#FFD54F" stroke="#F57F17" stroke-width="1"/>
    <!-- Head -->
    <circle cx="0" cy="-5" r="22" fill="#FFCC80"/>
    <!-- Hat -->
    <path d="M-24,-15 Q0,-70 24,-15 Z" fill="#5E35B1"/>
    <ellipse cx="0" cy="-14" rx="28" ry="6" fill="#7E57C2"/>
    <circle cx="0" cy="-58" r="5" fill="#FFC107"/>
    <polygon points="0,-58 2,-52 8,-52 3,-48 5,-42 0,-46 -5,-42 -3,-48 -8,-52 -2,-52" fill="#FFD54F" transform="scale(0.6) translate(0,-25)"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-8" r="3" fill="#fff"/>
    <circle cx="-7" cy="-7" r="2" fill="#311B92"/>
    <circle cx="8" cy="-8" r="3" fill="#fff"/>
    <circle cx="9" cy="-7" r="2" fill="#311B92"/>
    <!-- Eyebrows -->
    <path d="M-12,-13 Q-8,-16 -4,-13" fill="none" stroke="#5D4037" stroke-width="1.5"/>
    <path d="M4,-13 Q8,-16 12,-13" fill="none" stroke="#5D4037" stroke-width="1.5"/>
    <!-- Nose -->
    <path d="M0,-4 L-2,2 L2,2 Z" fill="#FFB74D" opacity="0.6"/>
    <!-- Beard -->
    <path d="M-12,5 Q-8,8 0,20 Q8,8 12,5" fill="#E0E0E0" opacity="0.8"/>
    <path d="M0,12 Q0,22 0,28" fill="none" stroke="#BDBDBD" stroke-width="1"/>
    <!-- Staff -->
    <line x1="32" y1="-30" x2="32" y2="90" stroke="#8D6E63" stroke-width="5" stroke-linecap="round"/>
    <circle cx="32" cy="-32" r="8" fill="#7E57C2" stroke="#FFC107" stroke-width="2"/>
    <circle cx="32" cy="-32" r="4" fill="#CE93D8" opacity="0.8"/>
    <!-- Arms -->
    <path d="M22,30 Q30,25 32,15" fill="none" stroke="#7E57C2" stroke-width="8" stroke-linecap="round"/>
    <path d="M-22,30 Q-35,25 -40,35" fill="none" stroke="#7E57C2" stroke-width="8" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="-10" cy="92" rx="10" ry="6" fill="#4527A0"/>
    <ellipse cx="10" cy="92" rx="10" ry="6" fill="#4527A0"/>
  </g>

  <!-- Quest marker (!) above NPC -->
  <g transform="translate(500, 155)">
    <circle cx="0" cy="0" r="16" fill="#FFC107" stroke="#F57F17" stroke-width="2" filter="url(#softShadow)">
      <animate attributeName="cy" values="0;-4;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#3E2723">!</text>
  </g>

  <!-- Dialogue bubble -->
  <g transform="translate(400, 110)" filter="url(#softShadow)">
    <rect x="-85" y="-35" width="170" height="55" rx="20" fill="url(#bubbleGrad)" stroke="#E0E0E0" stroke-width="1.5"/>
    <polygon points="30,20 40,40 15,18" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
    <polygon points="30,18 40,38 16,18" fill="#F5F5F5"/>
    <!-- Animated dots -->
    <circle cx="-20" cy="0" r="6" fill="#7E57C2" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="#7E57C2" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="0" r="6" fill="#7E57C2" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Interaction prompt -->
  <g transform="translate(400, 420)">
    <rect x="-70" y="-14" width="140" height="28" rx="14" fill="#1B5E20" stroke="#8BC34A" stroke-width="1.5" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#C5E1A5" letter-spacing="1">PRESS E TO TALK</text>
  </g>

  <!-- Sparkle particles -->
  <g opacity="0.4">
    <circle cx="350" cy="200" r="2" fill="#FFF176">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="180" r="1.5" fill="#FFF176">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="230" r="2" fill="#CE93D8">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="250" r="1.5" fill="#CE93D8">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>