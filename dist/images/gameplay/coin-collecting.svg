    <circle cx="240" cy="260" r="2.5" fill="#FFF9C4" opacity="0.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="240" r="1.8" fill="#FFF" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.3s" repeatCount="indefinite"/></circle>
