    <ellipse cx="-4" cy="-4" rx="14" ry="15" fill="url(#coinShine)" opacity="0.3"/>
    <text y="5" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#E65100" opacity="0.4">$</text>
