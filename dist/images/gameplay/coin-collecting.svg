    <rect width="190" height="55" rx="12" fill="none" stroke="#FFD54F" stroke-width="2" opacity="0.6"/>
    <circle cx="35" cy="27.5" r="16" fill="url(#coinGold)" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="35" cy="27.5" r="12" fill="none" stroke="#FFE082" stroke-width="1" opacity="0.5"/>
    <text x="35" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#E65100" opacity="0.5">$</text>
    <text x="60" y="22" font-family="Arial,sans-serif" font-size="11" fill="#FFE082" opacity="0.8">COINS</text>
    <text x="60" y="42" font-family="Arial,sans-serif" font-weight="bold" font-size="22" fill="#FFD54F">12,847</text>
