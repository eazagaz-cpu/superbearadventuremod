    <line x1="200" y1="0" x2="800" y2="250" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="100" x2="700" y2="450" stroke="#FFF" stroke-width="1"/>
    <line x1="0" y1="200" x2="500" y2="450" stroke="#FFF" stroke-width="1"/>
  </g>
  <path d="M0 380 Q100 370 200 375 Q300 365 400 372 Q500 368 600 374 Q700 366 800 370 L800 450 L0 450Z" fill="#1B5E20" opacity="0.5"/>
