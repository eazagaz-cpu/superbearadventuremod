<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgSpeed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="50%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="timerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="goldMedal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="silverMedal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
    <linearGradient id="bronzeMedal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#558B2F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8BC34A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#558B2F" stop-opacity="0"/>
    </linearGradient>
    <filter id="timerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgSpeed)"/>

  <!-- Speed lines -->
  <g opacity="0.12" stroke="#8BC34A" stroke-width="2">
    <line x1="0" y1="50" x2="250" y2="50"/>
    <line x1="0" y1="90" x2="180" y2="90"/>
    <line x1="0" y1="130" x2="300" y2="130"/>
    <line x1="0" y1="200" x2="150" y2="200"/>
    <line x1="0" y1="330" x2="200" y2="330"/>
    <line x1="0" y1="380" x2="280" y2="380"/>
    <line x1="0" y1="420" x2="160" y2="420"/>
    <line x1="550" y1="60" x2="800" y2="60"/>
    <line x1="600" y1="110" x2="800" y2="110"/>
    <line x1="500" y1="160" x2="800" y2="160"/>
    <line x1="620" y1="340" x2="800" y2="340"/>
    <line x1="580" y1="390" x2="800" y2="390"/>
    <line x1="650" y1="430" x2="800" y2="430"/>
  </g>
  <!-- Speed arrows -->
  <g opacity="0.08" fill="#8BC34A">
    <polygon points="50,225 10,220 10,230"/>
    <polygon points="80,260 30,255 30,265"/>
    <polygon points="60,295 20,290 20,300"/>
    <polygon points="750,225 790,220 790,230"/>
    <polygon points="720,260 770,255 770,265"/>
    <polygon points="740,295 790,290 790,300"/>
  </g>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#C5E1A5" letter-spacing="4" opacity="0.8">SPEEDRUN MODE</text>

  <!-- Main timer display -->
  <g transform="translate(400, 155)" filter="url(#dropShadow)">
    <rect x="-240" y="-60" width="480" height="120" rx="12" fill="url(#timerBg)" stroke="#333" stroke-width="2"/>
    <rect x="-234" y="-54" width="468" height="108" rx="9" fill="none" stroke="#444" stroke-width="1"/>
    <rect x="-230" y="-56" width="460" height="3" rx="1.5" fill="url(#greenGlow)"/>
    <rect x="-230" y="52" width="460" height="3" rx="1.5" fill="url(#greenGlow)"/>
    <!-- Timer digits -->
    <g filter="url(#neonGlow)">
      <text x="0" y="22" text-anchor="middle" font-family="'Courier New', monospace" font-size="80" font-weight="bold" fill="#8BC34A" letter-spacing="6">02:34.56</text>
    </g>
    <!-- Labels -->
    <text x="-140" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#689F38" letter-spacing="2">MIN</text>
    <text x="10" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#689F38" letter-spacing="2">SEC</text>
    <text x="145" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#689F38" letter-spacing="2">MS</text>
    <!-- Colon indicators -->
    <circle cx="-60" cy="-8" r="4" fill="#8BC34A" opacity="0.8"/>
    <circle cx="-60" cy="12" r="4" fill="#8BC34A" opacity="0.8"/>
    <!-- Best badge -->
    <rect x="170" y="-45" width="55" height="20" rx="4" fill="#558B2F"/>
    <text x="197" y="-30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#C5E1A5">BEST</text>
  </g>

  <!-- Stopwatch icon -->
  <g transform="translate(85, 155)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#8BC34A" stroke-width="3" opacity="0.7"/>
    <circle cx="0" cy="0" r="30" fill="#1B5E20" stroke="#558B2F" stroke-width="1.5" opacity="0.8"/>
    <g stroke="#689F38" stroke-width="1.5" opacity="0.6">
      <line x1="0" y1="-26" x2="0" y2="-22"/><line x1="0" y1="22" x2="0" y2="26"/>
      <line x1="-26" y1="0" x2="-22" y2="0"/><line x1="22" y1="0" x2="26" y2="0"/>
      <line x1="-18" y1="-18" x2="-15" y2="-15"/><line x1="18" y1="-18" x2="15" y2="-15"/>
      <line x1="-18" y1="18" x2="-15" y2="15"/><line x1="18" y1="18" x2="15" y2="15"/>
    </g>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#C5E1A5" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="14" y2="8" stroke="#8BC34A" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#8BC34A"/>
    <rect x="-4" y="-40" width="8" height="8" rx="2" fill="#689F38"/>
    <rect x="30" y="-5" width="8" height="10" rx="2" fill="#689F38"/>
  </g>

  <!-- Racing flag -->
  <g transform="translate(715, 140)">
    <line x1="0" y1="-40" x2="0" y2="50" stroke="#A5D6A7" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(2, -38)">
      <rect x="0" y="0" width="45" height="30" rx="2" fill="#fff"/>
      <rect x="0" y="0" width="9" height="10" fill="#1B5E20"/>
      <rect x="18" y="0" width="9" height="10" fill="#1B5E20"/>
      <rect x="36" y="0" width="9" height="10" fill="#1B5E20"/>
      <rect x="9" y="10" width="9" height="10" fill="#1B5E20"/>
      <rect x="27" y="10" width="9" height="10" fill="#1B5E20"/>
      <rect x="0" y="20" width="9" height="10" fill="#1B5E20"/>
      <rect x="18" y="20" width="9" height="10" fill="#1B5E20"/>
      <rect x="36" y="20" width="9" height="10" fill="#1B5E20"/>
    </g>
    <ellipse cx="0" cy="50" rx="8" ry="3" fill="#689F38" opacity="0.5"/>
  </g>

  <!-- Leaderboard panel -->
  <g transform="translate(400, 340)" filter="url(#dropShadow)">
    <rect x="-250" y="-40" width="500" height="125" rx="10" fill="#0D0D0D" stroke="#333" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="-22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#689F38" letter-spacing="3">LEADERBOARD</text>
    <line x1="-220" y1="-14" x2="220" y2="-14" stroke="#333" stroke-width="1"/>

    <!-- 1st Place -->
    <g transform="translate(-200, 10)">
      <circle cx="18" cy="8" r="12" fill="url(#goldMedal)" stroke="#F57F17" stroke-width="1.5"/>
      <text x="18" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#5D4037">1</text>
      <path d="M10,18 L8,28 L18,23 L28,28 L26,18" fill="#FFC107" opacity="0.6"/>
      <text x="45" y="13" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#FFD54F">SpeedyBear</text>
      <text x="320" y="13" font-family="'Courier New', monospace" font-size="14" fill="#8BC34A">01:58.23</text>
      <rect x="370" y="0" width="45" height="18" rx="4" fill="#558B2F" opacity="0.6"/>
      <text x="392" y="14" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#C5E1A5" font-weight="bold">WR</text>
    </g>

    <!-- 2nd Place -->
    <g transform="translate(-200, 38)">
      <circle cx="18" cy="8" r="12" fill="url(#silverMedal)" stroke="#757575" stroke-width="1.5"/>
      <text x="18" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#424242">2</text>
      <text x="45" y="13" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#E0E0E0">RunMaster</text>
      <text x="320" y="13" font-family="'Courier New', monospace" font-size="14" fill="#2E7D32">02:12.45</text>
    </g>

    <!-- 3rd Place -->
    <g transform="translate(-200, 64)">
      <circle cx="18" cy="8" r="12" fill="url(#bronzeMedal)" stroke="#8D6E63" stroke-width="1.5"/>
      <text x="18" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#3E2723">3</text>
      <text x="45" y="13" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#FFAB91">DashKing</text>
      <text x="320" y="13" font-family="'Courier New', monospace" font-size="14" fill="#2E7D32">02:34.56</text>
      <rect x="370" y="0" width="35" height="18" rx="4" fill="#8BC34A" opacity="0.7"/>
      <text x="387" y="13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1B5E20" font-weight="bold">YOU</text>
    </g>
  </g>

  <!-- Speed arrows in corners -->
  <g opacity="0.2" fill="#8BC34A">
    <polygon points="30,70 10,80 30,90"/>
    <polygon points="50,70 30,80 50,90"/>
    <polygon points="70,70 50,80 70,90"/>
    <polygon points="770,70 750,80 770,90"/>
    <polygon points="750,70 730,80 750,90"/>
    <polygon points="730,70 710,80 730,90"/>
  </g>

  <!-- Corner brackets -->
  <path d="M15,15 L15,45 M15,15 L45,15" stroke="#8BC34A" stroke-width="2" opacity="0.25"/>
  <path d="M785,15 L785,45 M785,15 L755,15" stroke="#8BC34A" stroke-width="2" opacity="0.25"/>
  <path d="M15,435 L15,405 M15,435 L45,435" stroke="#8BC34A" stroke-width="2" opacity="0.25"/>
  <path d="M785,435 L785,405 M785,435 L755,435" stroke="#8BC34A" stroke-width="2" opacity="0.25"/>
</svg>