<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="50" y="50" width="700" height="350" rx="16" fill="#2E7D32" opacity="0.3"/>
  <!-- Monitor -->
  <g transform="translate(400, 180)" filter="url(#s)">
    <rect x="-140" y="-100" width="280" height="180" rx="12" fill="#263238"/>
    <rect x="-125" y="-88" width="250" height="150" rx="4" fill="#558B2F"/>
    <!-- Game screen content -->
    <rect x="-110" y="-75" width="220" height="120" fill="#33691E"/>
    <!-- Tiny bear on screen -->
    <circle cx="0" cy="-20" r="18" fill="#8D6E63"/>
    <circle cx="-8" cy="-28" r="6" fill="#795548"/>
    <circle cx="8" cy="-28" r="6" fill="#795548"/>
    <circle cx="-5" cy="-22" r="3" fill="#fff"/>
    <circle cx="5" cy="-22" r="3" fill="#fff"/>
    <!-- Trees on screen -->
    <polygon points="-80,-40 -70,10 -90,10" fill="#4CAF50"/>
    <polygon points="80,-50 90,10 70,10" fill="#4CAF50"/>
    <!-- Monitor stand -->
    <rect x="-25" y="82" width="50" height="20" fill="#37474F"/>
    <rect x="-50" y="100" width="100" height="8" rx="4" fill="#455A64"/>
  </g>
  <!-- Controller -->
  <g transform="translate(580, 320)" filter="url(#s)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#455A64"/>
    <circle cx="-25" cy="0" r="10" fill="#616161" stroke="#757575" stroke-width="1"/>
    <circle cx="25" cy="-8" r="5" fill="#8BC34A"/>
    <circle cx="33" cy="0" r="5" fill="#EF5350"/>
    <circle cx="25" cy="8" r="5" fill="#42A5F5"/>
    <circle cx="17" cy="0" r="5" fill="#FFC107"/>
  </g>
  <!-- Text -->
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#F1F8E9">Play on PC Guide</text>
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Emulator Setup &amp; Configuration</text>
</svg>