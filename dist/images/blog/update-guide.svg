<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Circular arrows -->
  <g transform="translate(400, 190)" filter="url(#s)">
    <path d="M0,-80 A80,80 0 1,1 -69,-40" fill="none" stroke="#8BC34A" stroke-width="12" stroke-linecap="round"/>
    <polygon points="-69,-40 -85,-55 -55,-55" fill="#8BC34A"/>
    <path d="M0,80 A80,80 0 1,1 69,40" fill="none" stroke="#C5E1A5" stroke-width="12" stroke-linecap="round"/>
    <polygon points="69,40 85,55 55,55" fill="#C5E1A5"/>
    <!-- Version text in center -->
    <text x="0" y="-5" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="20" fill="#F1F8E9">v11.0</text>
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Latest</text>
  </g>
  <!-- Version badges -->
  <g filter="url(#s)">
    <rect x="120" y="130" width="100" height="35" rx="17" fill="#558B2F" opacity="0.6"/>
    <text x="170" y="153" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="14" fill="#C5E1A5">v10.5</text>
    <rect x="580" y="130" width="100" height="35" rx="17" fill="#558B2F" opacity="0.6"/>
    <text x="630" y="153" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="14" fill="#C5E1A5">v10.0</text>
    <rect x="120" y="250" width="100" height="35" rx="17" fill="#558B2F" opacity="0.4"/>
    <text x="170" y="273" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="14" fill="#A5D6A7">v9.5</text>
    <rect x="580" y="250" width="100" height="35" rx="17" fill="#558B2F" opacity="0.4"/>
    <text x="630" y="273" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="14" fill="#A5D6A7">v9.0</text>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#F1F8E9">How to Update</text>
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Step-by-Step Update Guide</text>
</svg>