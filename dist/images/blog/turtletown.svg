<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <!-- Ground -->
  <ellipse cx="400" cy="450" rx="500" ry="150" fill="url(#bg)"/>
  <!-- Hills -->
  <ellipse cx="200" cy="350" rx="200" ry="80" fill="#4CAF50"/>
  <ellipse cx="600" cy="360" rx="180" ry="70" fill="#43A047"/>
  <!-- Trees -->
  <g filter="url(#s)">
    <rect x="147" y="220" width="10" height="50" fill="#795548"/>
    <polygon points="152,170 185,250 119,250" fill="#388E3C"/>
    <polygon points="152,195 175,240 129,240" fill="#43A047"/>
    <rect x="577" y="230" width="10" height="45" fill="#795548"/>
    <polygon points="582,185 610,255 554,255" fill="#388E3C"/>
  </g>
  <!-- Village houses -->
  <g filter="url(#s)">
    <rect x="300" y="270" width="60" height="50" rx="4" fill="#8D6E63"/>
    <polygon points="300,270 330,240 360,270" fill="#D32F2F"/>
    <rect x="320" y="295" width="18" height="25" fill="#5D4037"/>
    <rect x="420" y="280" width="50" height="40" rx="4" fill="#A1887F"/>
    <polygon points="420,280 445,255 470,280" fill="#E53935"/>
    <rect x="438" y="298" width="14" height="22" fill="#5D4037"/>
  </g>
  <!-- Turtle 1 -->
  <g transform="translate(350, 340)" filter="url(#s)">
    <ellipse cx="0" cy="5" rx="30" ry="20" fill="#2E7D32"/>
    <ellipse cx="0" cy="0" rx="25" ry="16" fill="#4CAF50"/>
    <!-- Shell pattern -->
    <path d="M-12,-8 L0,10 L12,-8" fill="none" stroke="#2E7D32" stroke-width="2"/>
    <circle cx="-25" cy="10" r="6" fill="#388E3C"/>
    <circle cx="25" cy="10" r="6" fill="#388E3C"/>
    <circle cx="-30" cy="5" r="5" fill="#4CAF50"/>
    <circle cx="-28" cy="3" r="1.5" fill="#1B5E20"/>
  </g>
  <!-- Turtle 2 -->
  <g transform="translate(520, 350)" filter="url(#s)">
    <ellipse cx="0" cy="5" rx="25" ry="16" fill="#2E7D32"/>
    <ellipse cx="0" cy="0" rx="20" ry="13" fill="#66BB6A"/>
    <circle cx="20" cy="5" r="5" fill="#388E3C"/>
    <circle cx="22" cy="3" r="1.5" fill="#1B5E20"/>
  </g>
  <!-- Sun -->
  <circle cx="680" cy="60" r="40" fill="#FFD54F" opacity="0.9"/>
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="150" cy="70" rx="50" ry="20" fill="white"/>
    <ellipse cx="180" cy="60" rx="40" ry="18" fill="white"/>
    <ellipse cx="500" cy="50" rx="45" ry="18" fill="white"/>
    <ellipse cx="525" cy="42" rx="35" ry="15" fill="white"/>
  </g>
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#1B5E20">Turtletown Walkthrough</text>
</svg>