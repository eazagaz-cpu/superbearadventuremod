<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Question marks background -->
  <g font-family="sans-serif" font-weight="700" fill="#4CAF50" opacity="0.15">
    <text x="80" y="100" font-size="60">?</text>
    <text x="200" y="350" font-size="40">?</text>
    <text x="680" y="120" font-size="50">?</text>
    <text x="600" y="380" font-size="45">?</text>
    <text x="350" y="80" font-size="35">?</text>
  </g>
  <!-- Magnifying glass -->
  <g transform="translate(400, 180)" filter="url(#s)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#C5E1A5" stroke-width="8"/>
    <circle cx="0" cy="0" r="60" fill="#2E7D32" opacity="0.3"/>
    <line x1="50" y1="50" x2="100" y2="100" stroke="#C5E1A5" stroke-width="10" stroke-linecap="round"/>
    <!-- Shine on glass -->
    <path d="M-30,-40 Q-15,-50 -5,-38" fill="none" stroke="white" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  </g>
  <!-- Hidden eggs -->
  <g filter="url(#s)">
    <!-- Egg 1 -->
    <g transform="translate(200, 200)">
      <ellipse cx="0" cy="0" rx="22" ry="28" fill="#F44336"/>
      <path d="M-15,-10 Q0,-20 15,-10" fill="none" stroke="#FFD54F" stroke-width="3"/>
      <path d="M-18,5 Q0,-5 18,5" fill="none" stroke="#FFD54F" stroke-width="3"/>
      <circle cx="0" cy="12" r="4" fill="#FFD54F"/>
    </g>
    <!-- Egg 2 -->
    <g transform="translate(580, 170)">
      <ellipse cx="0" cy="0" rx="20" ry="26" fill="#4CAF50"/>
      <rect x="-15" y="-5" width="30" height="4" rx="2" fill="#FFC107"/>
      <rect x="-15" y="5" width="30" height="4" rx="2" fill="#FFC107"/>
      <circle cx="-8" cy="-15" r="3" fill="white" opacity="0.5"/>
    </g>
    <!-- Egg 3 (partially hidden) -->
    <g transform="translate(320, 300)">
      <ellipse cx="0" cy="0" rx="18" ry="24" fill="#2196F3" opacity="0.6"/>
      <path d="M-12,0 Q0,-12 12,0" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
      <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" opacity="0.5">?</text>
    </g>
    <!-- Egg 4 -->
    <g transform="translate(520, 280)">
      <ellipse cx="0" cy="0" rx="19" ry="25" fill="#9C27B0"/>
      <polygon points="0,-12 -10,0 0,12 10,0" fill="#E1BEE7" opacity="0.5"/>
    </g>
  </g>
  <!-- Sparkles near found eggs -->
  <g fill="#FFC107" opacity="0.6">
    <polygon points="230,175 233,182 240,182 234,187 236,194 230,190 224,194 226,187 220,182 227,182" transform="scale(0.7)"/>
    <polygon points="820,230 823,237 830,237 824,242 826,249 820,245 814,249 816,242 810,237 817,237" transform="scale(0.7)"/>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#4A148C">Easter Eggs &amp; Secrets</text>
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#7B1FA2">Find Every Hidden Secret</text>
</svg>