<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Floor -->
  <rect x="0" y="340" width="800" height="110" fill="url(#wood)"/>
  <line x1="0" y1="345" x2="800" y2="345" stroke="#795548" stroke-width="1" opacity="0.5"/>
  <!-- Giant table leg -->
  <rect x="60" y="50" width="60" height="300" fill="#6D4C41" filter="url(#s)"/>
  <rect x="650" y="50" width="60" height="300" fill="#6D4C41" filter="url(#s)"/>
  <!-- Giant table top (extending beyond view) -->
  <rect x="0" y="30" width="800" height="40" fill="#8D6E63" filter="url(#s)"/>
  <!-- Giant cup on table edge -->
  <g transform="translate(200, 0)" filter="url(#s)">
    <rect x="-35" y="-20" width="70" height="55" rx="4" fill="#E0E0E0"/>
    <rect x="35" y="-5" width="20" height="30" rx="10" fill="none" stroke="#BDBDBD" stroke-width="5"/>
    <ellipse cx="0" cy="-20" rx="35" ry="8" fill="#EEEEEE"/>
    <ellipse cx="0" cy="-15" rx="28" ry="6" fill="#795548"/>
  </g>
  <!-- Giant book -->
  <g transform="translate(550, 45)" filter="url(#s)">
    <rect x="-60" y="-20" width="120" height="30" rx="2" fill="#C62828"/>
    <rect x="-55" y="-18" width="110" height="26" rx="1" fill="#D32F2F"/>
    <line x1="-55" y1="8" x2="55" y2="8" stroke="#EF5350" stroke-width="1"/>
  </g>
  <!-- Tiny bear character -->
  <g transform="translate(400, 315)" filter="url(#s)">
    <circle cx="0" cy="-12" r="10" fill="#8D6E63"/>
    <circle cx="-7" cy="-18" r="4" fill="#795548"/>
    <circle cx="7" cy="-18" r="4" fill="#795548"/>
    <circle cx="-3" cy="-13" r="2" fill="#fff"/>
    <circle cx="3" cy="-13" r="2" fill="#fff"/>
    <circle cx="-3" cy="-13" r="1" fill="#333"/>
    <circle cx="3" cy="-13" r="1" fill="#333"/>
    <ellipse cx="0" cy="5" rx="8" ry="12" fill="#795548"/>
    <!-- Exclamation mark above bear -->
    <text x="0" y="-35" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="20" fill="#FFC107">!</text>
  </g>
  <!-- Giant pencil on floor -->
  <g transform="translate(600, 350) rotate(-15)" filter="url(#s)">
    <rect x="-80" y="-8" width="160" height="16" rx="2" fill="#FFC107"/>
    <polygon points="80,-8 100,0 80,8" fill="#FFE082"/>
    <polygon points="95,-3 100,0 95,3" fill="#333"/>
    <rect x="-80" y="-8" width="20" height="16" rx="2" fill="#E0E0E0"/>
  </g>
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#F1F8E9">Giant House Guide</text>
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#BCAAA4">Explore the Oversized World</text>
</svg>