<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- WiFi crossed out -->
  <text x="160" y="200" font-family="Arial,sans-serif" font-size="80" text-anchor="middle" fill="#607d8b" opacity="0.4">📶</text>
  <line x1="80" y1="140" x2="240" y2="260" stroke="#ef5350" stroke-width="8" stroke-linecap="round"/>
  <text x="160" y="300" font-family="Arial,sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ef5350">No Connection</text>
  <!-- Arrow -->
  <text x="270" y="215" font-family="Arial,sans-serif" font-size="36" fill="#78909c">→</text>
  <!-- Checkmark -->
  <circle cx="370" cy="195" r="50" fill="#1b5e20" stroke="#4caf50" stroke-width="3"/>
  <text x="370" y="210" font-family="Arial,sans-serif" font-size="40" text-anchor="middle" fill="#4caf50">✓</text>
  <text x="370" y="285" font-family="Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#4caf50">Still Works!</text>
  <!-- Right panel -->
  <rect x="460" y="80" width="310" height="290" rx="10" fill="#1c2a30" opacity="0.85"/>
  <text x="615" y="120" font-family="Arial,sans-serif" font-size="20" font-weight="900" text-anchor="middle" fill="#fff">Offline Mode</text>
  <rect x="475" y="132" width="280" height="1.5" fill="#4caf50" opacity="0.3"/>
  <text x="480" y="158" font-family="Arial,sans-serif" font-size="13" fill="#c8e6c9">✓ Solo play — all 6 worlds</text>
  <text x="480" y="182" font-family="Arial,sans-serif" font-size="13" fill="#c8e6c9">✓ All missions and bosses</text>
  <text x="480" y="206" font-family="Arial,sans-serif" font-size="13" fill="#c8e6c9">✓ Coins and collectibles</text>
  <text x="480" y="230" font-family="Arial,sans-serif" font-size="13" fill="#c8e6c9">✓ Mod menu features</text>
  <rect x="475" y="248" width="280" height="1.5" fill="#ef5350" opacity="0.3"/>
  <text x="480" y="272" font-family="Arial,sans-serif" font-size="13" fill="#ffcdd2">✗ Multiplayer co-op (needs internet)</text>
  <text x="480" y="295" font-family="Arial,sans-serif" font-size="13" fill="#ffcdd2">✗ Leaderboards (online only)</text>
  <text x="615" y="340" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="#78909c">superbearadventuremod.io</text>
</svg>
