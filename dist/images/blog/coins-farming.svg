<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Coin stack -->
  <g transform="translate(400, 200)" filter="url(#s)">
    <!-- Stack of coins -->
    <ellipse cx="0" cy="80" rx="60" ry="15" fill="#FF8F00"/>
    <rect x="-60" y="70" width="120" height="12" fill="#FFA000"/>
    <ellipse cx="0" cy="70" rx="60" ry="15" fill="url(#coin)"/>

    <ellipse cx="0" cy="55" rx="60" ry="15" fill="#FF8F00"/>
    <rect x="-60" y="45" width="120" height="12" fill="#FFA000"/>
    <ellipse cx="0" cy="45" rx="60" ry="15" fill="url(#coin)"/>

    <ellipse cx="0" cy="30" rx="60" ry="15" fill="#FF8F00"/>
    <rect x="-60" y="20" width="120" height="12" fill="#FFA000"/>
    <ellipse cx="0" cy="20" rx="60" ry="15" fill="url(#coin)"/>

    <ellipse cx="0" cy="5" rx="60" ry="15" fill="#FF8F00"/>
    <rect x="-60" y="-5" width="120" height="12" fill="#FFA000"/>
    <ellipse cx="0" cy="-5" rx="60" ry="15" fill="url(#coin)"/>

    <ellipse cx="0" cy="-20" rx="60" ry="15" fill="#FF8F00"/>
    <rect x="-60" y="-30" width="120" height="12" fill="#FFA000"/>
    <ellipse cx="0" cy="-30" rx="60" ry="15" fill="url(#coin)"/>
    <!-- $ symbol on top coin -->
    <text x="0" y="-24" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#E65100">$</text>
  </g>
  <!-- Flying coins -->
  <g filter="url(#s)">
    <g transform="translate(200, 120)">
      <ellipse cx="0" cy="0" rx="25" ry="25" fill="url(#coin)" stroke="#FF8F00" stroke-width="2"/>
      <text x="0" y="7" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#E65100">$</text>
    </g>
    <g transform="translate(600, 100)">
      <ellipse cx="0" cy="0" rx="22" ry="22" fill="url(#coin)" stroke="#FF8F00" stroke-width="2"/>
      <text x="0" y="7" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="16" fill="#E65100">$</text>
    </g>
    <g transform="translate(150, 280)">
      <ellipse cx="0" cy="0" rx="18" ry="18" fill="url(#coin)" stroke="#FF8F00" stroke-width="2"/>
      <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="#E65100">$</text>
    </g>
    <g transform="translate(650, 250)">
      <ellipse cx="0" cy="0" rx="20" ry="20" fill="url(#coin)" stroke="#FF8F00" stroke-width="2"/>
      <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="15" fill="#E65100">$</text>
    </g>
  </g>
  <!-- Sparkles -->
  <g fill="#FFF9C4" opacity="0.6">
    <polygon points="300,80 303,88 311,88 305,93 307,101 300,96 293,101 295,93 289,88 297,88"/>
    <polygon points="520,150 523,158 531,158 525,163 527,171 520,166 513,171 515,163 509,158 517,158"/>
  </g>
  <!-- Arrow up showing growth -->
  <g transform="translate(550, 180)" opacity="0.4">
    <polygon points="0,-30 15,-10 5,-10 5,20 -5,20 -5,-10 -15,-10" fill="#FFF9C4"/>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#FFF8E1">Coins Farming Guide</text>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#FFE0B2">Best Methods to Earn Fast</text>
</svg>