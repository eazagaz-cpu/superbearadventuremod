<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Spotlight -->
  <ellipse cx="400" cy="350" rx="350" ry="30" fill="#4CAF50" opacity="0.15"/>
  <!-- Character silhouettes -->
  <g filter="url(#s)">
    <!-- Character 1 - Bear (center, largest) -->
    <g transform="translate(400, 210)">
      <circle cx="0" cy="-30" r="45" fill="#8D6E63"/>
      <circle cx="-30" cy="-60" r="16" fill="#795548"/>
      <circle cx="30" cy="-60" r="16" fill="#795548"/>
      <circle cx="-30" cy="-60" r="9" fill="#BCAAA4"/>
      <circle cx="30" cy="-60" r="9" fill="#BCAAA4"/>
      <circle cx="-12" cy="-35" r="7" fill="white"/>
      <circle cx="12" cy="-35" r="7" fill="white"/>
      <circle cx="-10" cy="-33" r="4" fill="#333"/>
      <circle cx="14" cy="-33" r="4" fill="#333"/>
      <ellipse cx="0" cy="-15" rx="10" ry="7" fill="#5D4037"/>
      <path d="M-10,-5 Q0,5 10,-5" fill="none" stroke="#5D4037" stroke-width="2"/>
      <ellipse cx="0" cy="50" rx="40" ry="55" fill="#795548"/>
      <ellipse cx="0" cy="55" rx="25" ry="35" fill="#BCAAA4"/>
    </g>
    <!-- Character 2 - Turtle (left) -->
    <g transform="translate(200, 260)">
      <ellipse cx="0" cy="10" rx="35" ry="22" fill="#2E7D32"/>
      <ellipse cx="0" cy="5" rx="28" ry="18" fill="#4CAF50"/>
      <path d="M-14,-8 L0,12 L14,-8" fill="none" stroke="#2E7D32" stroke-width="2"/>
      <circle cx="-30" cy="8" r="8" fill="#388E3C"/>
      <circle cx="30" cy="8" r="8" fill="#388E3C"/>
      <circle cx="-35" cy="5" r="6" fill="#4CAF50"/>
      <circle cx="-33" cy="3" r="2" fill="#1B5E20"/>
      <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A5D6A7">Turtle</text>
    </g>
    <!-- Character 3 - Bee (right) -->
    <g transform="translate(600, 240)">
      <ellipse cx="0" cy="0" rx="25" ry="16" fill="#FFC107"/>
      <rect x="-12" y="-16" width="5" height="32" rx="2" fill="#333" opacity="0.6"/>
      <rect x="5" y="-16" width="5" height="32" rx="2" fill="#333" opacity="0.6"/>
      <ellipse cx="-12" cy="-18" rx="14" ry="8" fill="white" opacity="0.4" transform="rotate(-15)"/>
      <ellipse cx="12" cy="-18" rx="14" ry="8" fill="white" opacity="0.4" transform="rotate(15)"/>
      <circle cx="25" cy="-3" r="3" fill="#333"/>
      <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A5D6A7">Bee</text>
    </g>
    <!-- Character 4 - Mole (far left) -->
    <g transform="translate(100, 280)">
      <ellipse cx="0" cy="0" rx="22" ry="18" fill="#5D4037"/>
      <circle cx="0" cy="-8" r="14" fill="#6D4C41"/>
      <circle cx="-6" cy="-10" r="3" fill="#333"/>
      <circle cx="6" cy="-10" r="3" fill="#333"/>
      <ellipse cx="0" cy="-3" rx="6" ry="4" fill="#8D6E63"/>
      <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A5D6A7">Mole</text>
    </g>
    <!-- Character 5 - Snake (far right) -->
    <g transform="translate(700, 280)">
      <path d="M-20,10 Q-10,-10 0,0 Q10,10 20,-5 Q25,-10 20,-15" fill="none" stroke="#4CAF50" stroke-width="8" stroke-linecap="round"/>
      <circle cx="20" cy="-15" r="6" fill="#66BB6A"/>
      <circle cx="18" cy="-17" r="2" fill="#333"/>
      <circle cx="22" cy="-17" r="2" fill="#333"/>
      <text x="0" y="35" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A5D6A7">Snake</text>
    </g>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#F1F8E9">All Characters Guide</text>
  <text x="400" y="418" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Every NPC &amp; Creature</text>
</svg>