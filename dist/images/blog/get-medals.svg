<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg-gm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <linearGradient id="gold-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="silver-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="50%" stop-color="#BDBDBD"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
    <linearGradient id="bronze-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="50%" stop-color="#E64A19"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <filter id="s-gm"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/></filter>
    <filter id="gold-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Light warm background -->
  <rect width="800" height="450" fill="url(#bg-gm)"/>

  <!-- Subtle confetti -->
  <g opacity="0.15">
    <rect x="120" y="60" width="8" height="14" rx="2" fill="#F44336" transform="rotate(25,124,67)"/>
    <rect x="200" y="40" width="6" height="12" rx="2" fill="#2196F3" transform="rotate(-15,203,46)"/>
    <rect x="580" y="55" width="8" height="14" rx="2" fill="#4CAF50" transform="rotate(35,584,62)"/>
    <rect x="680" y="70" width="6" height="12" rx="2" fill="#FF9800" transform="rotate(-25,683,76)"/>
    <rect x="300" y="30" width="7" height="12" rx="2" fill="#9C27B0" transform="rotate(40,303,36)"/>
    <rect x="500" y="45" width="8" height="14" rx="2" fill="#E91E63" transform="rotate(-30,504,52)"/>
    <circle cx="160" cy="90" r="4" fill="#FFC107"/>
    <circle cx="640" cy="85" r="4" fill="#4CAF50"/>
    <circle cx="450" cy="35" r="3" fill="#2196F3"/>
  </g>

  <!-- Podium -->
  <g transform="translate(400, 320)" filter="url(#s-gm)">
    <!-- 2nd place (left) -->
    <rect x="-180" y="-30" width="110" height="60" rx="4" fill="#E0E0E0"/>
    <rect x="-180" y="-30" width="110" height="60" rx="4" fill="none" stroke="#BDBDBD" stroke-width="2"/>
    <text x="-125" y="5" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="22" fill="#757575">2</text>

    <!-- 1st place (center, tallest) -->
    <rect x="-60" y="-70" width="120" height="100" rx="4" fill="#FFD54F"/>
    <rect x="-60" y="-70" width="120" height="100" rx="4" fill="none" stroke="#FFB300" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#FF8F00">1</text>

    <!-- 3rd place (right) -->
    <rect x="70" y="-15" width="110" height="45" rx="4" fill="#FFAB91"/>
    <rect x="70" y="-15" width="110" height="45" rx="4" fill="none" stroke="#E64A19" stroke-width="2"/>
    <text x="125" y="15" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="20" fill="#BF360C">3</text>
  </g>

  <!-- Gold medal (center, largest) -->
  <g transform="translate(400, 135)" filter="url(#gold-glow)">
    <!-- Ribbon -->
    <polygon points="-22,-10 -35,50 -5,35" fill="#F44336"/>
    <polygon points="22,-10 35,50 5,35" fill="#C62828"/>
    <!-- Medal -->
    <circle cx="0" cy="0" r="55" fill="url(#gold-m)" stroke="#FF8F00" stroke-width="3"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#FFE082" stroke-width="2"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#FFC107" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Star -->
    <polygon points="0,-25 8,-8 26,-8 12,4 16,22 0,13 -16,22 -12,4 -26,-8 -8,-8" fill="#FFE082"/>
    <!-- Shine effect -->
    <ellipse cx="-15" cy="-15" rx="10" ry="6" fill="white" opacity="0.3" transform="rotate(-30)"/>
  </g>

  <!-- Silver medal (left) -->
  <g transform="translate(220, 180)" filter="url(#s-gm)">
    <polygon points="-16,-8 -26,40 0,28" fill="#1565C0"/>
    <polygon points="16,-8 26,40 0,28" fill="#0D47A1"/>
    <circle cx="0" cy="0" r="42" fill="url(#silver-m)" stroke="#9E9E9E" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#E0E0E0" stroke-width="1.5"/>
    <polygon points="0,-18 6,-6 18,-6 9,3 12,16 0,10 -12,16 -9,3 -18,-6 -6,-6" fill="#E0E0E0"/>
    <ellipse cx="-10" cy="-10" rx="8" ry="5" fill="white" opacity="0.25" transform="rotate(-30)"/>
  </g>

  <!-- Bronze medal (right) -->
  <g transform="translate(580, 195)" filter="url(#s-gm)">
    <polygon points="-14,-6 -22,35 0,24" fill="#4CAF50"/>
    <polygon points="14,-6 22,35 0,24" fill="#388E3C"/>
    <circle cx="0" cy="0" r="36" fill="url(#bronze-m)" stroke="#BF360C" stroke-width="2"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FFAB91" stroke-width="1.5"/>
    <polygon points="0,-15 5,-5 15,-5 8,2 10,13 0,8 -10,13 -8,2 -15,-5 -5,-5" fill="#FFAB91"/>
    <ellipse cx="-8" cy="-8" rx="7" ry="4" fill="white" opacity="0.2" transform="rotate(-30)"/>
  </g>

  <!-- Trophy sparkles -->
  <g fill="#FFD54F" opacity="0.5">
    <polygon points="340,80 342,86 348,86 343,90 345,96 340,92 335,96 337,90 332,86 338,86"/>
    <polygon points="470,75 472,81 478,81 473,85 475,91 470,87 465,91 467,85 462,81 468,81"/>
    <polygon points="310,140 312,145 317,145 313,148 314,153 310,150 306,153 307,148 303,145 308,145"/>
    <polygon points="500,130 502,135 507,135 503,138 504,143 500,140 496,143 497,138 493,135 498,135"/>
  </g>

  <!-- Title area -->
  <rect x="150" y="372" width="500" height="65" rx="12" fill="white" opacity="0.8"/>
  <text x="400" y="402" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#E65100">How to Get All Medals</text>
  <text x="400" y="425" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#FF8F00">Complete Achievement &amp; Trophy Guide</text>
</svg>