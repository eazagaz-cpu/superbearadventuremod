<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Timeline line -->
  <line x1="150" y1="200" x2="650" y2="200" stroke="#8BC34A" stroke-width="4" opacity="0.5"/>
  <!-- Timeline dots and labels -->
  <g filter="url(#s)">
    <circle cx="150" cy="200" r="18" fill="#4CAF50" opacity="0.5"/>
    <text x="150" y="205" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="11" fill="#fff">v7</text>
    <text x="150" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A5D6A7">2022</text>

    <circle cx="275" cy="200" r="18" fill="#4CAF50" opacity="0.6"/>
    <text x="275" y="205" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="11" fill="#fff">v8</text>
    <text x="275" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A5D6A7">2023</text>

    <circle cx="400" cy="200" r="18" fill="#4CAF50" opacity="0.7"/>
    <text x="400" y="205" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="11" fill="#fff">v9</text>
    <text x="400" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A5D6A7">2024</text>

    <circle cx="525" cy="200" r="18" fill="#4CAF50" opacity="0.85"/>
    <text x="525" y="205" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="11" fill="#fff">v10</text>
    <text x="525" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A5D6A7">2025</text>

    <circle cx="650" cy="200" r="22" fill="#8BC34A"/>
    <text x="650" y="205" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="11" fill="#1B5E20">v11</text>
    <text x="650" y="245" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="12" fill="#8BC34A">Latest</text>
  </g>
  <!-- Archive icon -->
  <g transform="translate(400, 110)" filter="url(#s)">
    <rect x="-30" y="-25" width="60" height="50" rx="4" fill="#558B2F" stroke="#8BC34A" stroke-width="2"/>
    <rect x="-12" y="-8" width="24" height="12" rx="3" fill="none" stroke="#C5E1A5" stroke-width="2"/>
    <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#8BC34A" stroke-width="2"/>
  </g>
  <text x="400" y="330" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#F1F8E9">Old Versions Archive</text>
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Download Previous APK Versions</text>
</svg>