<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <linearGradient id="chest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Treasure chest -->
  <g transform="translate(400, 230)" filter="url(#s)">
    <!-- Chest body -->
    <rect x="-90" y="0" width="180" height="80" rx="4" fill="url(#chest)"/>
    <rect x="-90" y="0" width="180" height="80" rx="4" fill="none" stroke="#A1887F" stroke-width="2"/>
    <!-- Metal bands -->
    <rect x="-90" y="20" width="180" height="8" fill="#FFC107" opacity="0.6"/>
    <rect x="-90" y="55" width="180" height="8" fill="#FFC107" opacity="0.6"/>
    <!-- Chest lid (open) -->
    <path d="M-90,0 Q0,-60 90,0" fill="#795548" stroke="#A1887F" stroke-width="2"/>
    <path d="M-80,0 Q0,-50 80,0" fill="#6D4C41"/>
    <!-- Lock -->
    <rect x="-12" y="-5" width="24" height="16" rx="3" fill="#FFC107"/>
    <circle cx="0" cy="2" r="4" fill="#E65100"/>
  </g>
  <!-- Overflowing coins -->
  <g filter="url(#s)">
    <!-- Coins in chest -->
    <circle cx="360" cy="215" r="14" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="385" cy="208" r="14" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="410" cy="212" r="14" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="435" cy="206" r="14" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="375" cy="195" r="14" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="420" cy="195" r="14" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <!-- Flying coins -->
    <circle cx="280" cy="160" r="16" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="280" y="166" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="#E65100">$</text>
    <circle cx="520" cy="150" r="16" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="520" y="156" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="#E65100">$</text>
    <circle cx="340" cy="130" r="13" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="460" cy="125" r="13" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="400" cy="110" r="15" fill="url(#coin)" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="400" y="116" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="#E65100">$</text>
    <circle cx="220" cy="200" r="12" fill="url(#coin)" stroke="#FF8F00" stroke-width="1"/>
    <circle cx="580" cy="190" r="12" fill="url(#coin)" stroke="#FF8F00" stroke-width="1"/>
    <circle cx="200" cy="270" r="11" fill="url(#coin)" stroke="#FF8F00" stroke-width="1"/>
    <circle cx="600" cy="260" r="11" fill="url(#coin)" stroke="#FF8F00" stroke-width="1"/>
  </g>
  <!-- Infinity symbol -->
  <g transform="translate(400, 80)" filter="url(#s)">
    <path d="M-30,0 C-30,-20 -10,-20 0,0 C10,20 30,20 30,0 C30,-20 10,-20 0,0 C-10,20 -30,20 -30,0Z" fill="none" stroke="#FFF9C4" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Sparkles -->
  <g fill="#FFF9C4" opacity="0.5">
    <polygon points="160,100 163,108 171,108 165,113 167,121 160,116 153,121 155,113 149,108 157,108"/>
    <polygon points="640,90 643,98 651,98 645,103 647,111 640,106 633,111 635,103 629,98 637,98"/>
    <polygon points="300,70 302,75 307,75 303,78 304,83 300,80 296,83 297,78 293,75 298,75"/>
    <polygon points="500,65 502,70 507,70 503,73 504,78 500,75 496,78 497,73 493,70 498,70"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#FFF8E1">Unlimited Money Mod</text>
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#FFE0B2">Get Infinite Coins &amp; Resources</text>
</svg>