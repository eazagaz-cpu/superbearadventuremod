<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#0f0520"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b388ff"/>
      <stop offset="40%" style="stop-color:#9c27b0"/>
      <stop offset="100%" style="stop-color:#6a1b9a"/>
    </linearGradient>
    <linearGradient id="coinShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1bee7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ce93d8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ce93d8;stop-opacity:0"/>
    </radialGradient>
    <filter id="coinGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="800" y2="450" stroke="#b388ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="800" y2="300" stroke="#b388ff" stroke-width="1"/>
    <line x1="400" y1="0" x2="800" y2="200" stroke="#b388ff" stroke-width="1"/>
    <line x1="0" y1="150" x2="600" y2="450" stroke="#b388ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="300" y2="450" stroke="#b388ff" stroke-width="1"/>
  </g>

  <!-- Ambient glow spots -->
  <circle cx="200" cy="220" r="120" fill="url(#glow)" opacity="0.4"/>
  <circle cx="550" cy="200" r="140" fill="url(#glow)" opacity="0.3"/>
  <circle cx="400" cy="300" r="100" fill="url(#glow)" opacity="0.25"/>

  <!-- Large coin back-left -->
  <g filter="url(#coinGlow)" transform="translate(120, 180)">
    <ellipse cx="0" cy="0" rx="52" ry="56" fill="#7b1fa2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="48" ry="52" fill="url(#coinGrad)"/>
    <ellipse cx="0" cy="0" rx="40" ry="44" fill="none" stroke="#d1c4e9" stroke-width="2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="32" ry="36" fill="none" stroke="#e1bee7" stroke-width="1" opacity="0.3"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#e1bee7">P</text>
    <ellipse cx="-15" cy="-18" rx="12" ry="8" fill="url(#coinShine)" transform="rotate(-20)"/>
  </g>

  <!-- Large coin center -->
  <g filter="url(#coinGlow)" transform="translate(370, 200)">
    <ellipse cx="0" cy="0" rx="62" ry="66" fill="#7b1fa2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="58" ry="62" fill="url(#coinGrad)"/>
    <ellipse cx="0" cy="0" rx="48" ry="52" fill="none" stroke="#d1c4e9" stroke-width="2.5" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="38" ry="42" fill="none" stroke="#e1bee7" stroke-width="1.5" opacity="0.3"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#e1bee7">P</text>
    <ellipse cx="-18" cy="-22" rx="16" ry="10" fill="url(#coinShine)" transform="rotate(-20)"/>
  </g>

  <!-- Coin right -->
  <g filter="url(#coinGlow)" transform="translate(580, 170)">
    <ellipse cx="0" cy="0" rx="45" ry="48" fill="#7b1fa2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="42" ry="45" fill="url(#coinGrad)"/>
    <ellipse cx="0" cy="0" rx="34" ry="37" fill="none" stroke="#d1c4e9" stroke-width="2" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="26" ry="29" fill="none" stroke="#e1bee7" stroke-width="1" opacity="0.3"/>
    <text x="0" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#e1bee7">P</text>
    <ellipse cx="-12" cy="-15" rx="10" ry="7" fill="url(#coinShine)" transform="rotate(-20)"/>
  </g>

  <!-- Small coin top -->
  <g filter="url(#coinGlow)" transform="translate(280, 110)">
    <ellipse cx="0" cy="0" rx="28" ry="30" fill="#7b1fa2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="25" ry="27" fill="url(#coinGrad)"/>
    <ellipse cx="0" cy="0" rx="20" ry="22" fill="none" stroke="#d1c4e9" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#e1bee7">P</text>
    <ellipse cx="-8" cy="-9" rx="7" ry="5" fill="url(#coinShine)" transform="rotate(-20)"/>
  </g>

  <!-- Small coin far right -->
  <g filter="url(#coinGlow)" transform="translate(690, 250)">
    <ellipse cx="0" cy="0" rx="30" ry="32" fill="#7b1fa2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="27" ry="29" fill="url(#coinGrad)"/>
    <ellipse cx="0" cy="0" rx="22" ry="24" fill="none" stroke="#d1c4e9" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#e1bee7">P</text>
    <ellipse cx="-8" cy="-10" rx="7" ry="5" fill="url(#coinShine)" transform="rotate(-20)"/>
  </g>

  <!-- Tiny coin bottom-left -->
  <g filter="url(#coinGlow)" transform="translate(160, 320)">
    <ellipse cx="0" cy="0" rx="20" ry="22" fill="#7b1fa2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="18" ry="20" fill="url(#coinGrad)"/>
    <ellipse cx="0" cy="0" rx="14" ry="16" fill="none" stroke="#d1c4e9" stroke-width="1" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#e1bee7">P</text>
  </g>

  <!-- Tiny coin top-right -->
  <g filter="url(#coinGlow)" transform="translate(500, 100)">
    <ellipse cx="0" cy="0" rx="18" ry="20" fill="#7b1fa2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="16" ry="18" fill="url(#coinGrad)"/>
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="none" stroke="#d1c4e9" stroke-width="1" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#e1bee7">P</text>
  </g>

  <!-- Edge coin (partial) left -->
  <g filter="url(#coinGlow)" transform="translate(30, 250)">
    <ellipse cx="0" cy="0" rx="35" ry="38" fill="url(#coinGrad)" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="28" ry="31" fill="none" stroke="#d1c4e9" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Medium coin bottom-center -->
  <g filter="url(#coinGlow)" transform="translate(460, 310)">
    <ellipse cx="0" cy="0" rx="35" ry="38" fill="#7b1fa2" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="32" ry="35" fill="url(#coinGrad)"/>
    <ellipse cx="0" cy="0" rx="26" ry="29" fill="none" stroke="#d1c4e9" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#e1bee7">P</text>
    <ellipse cx="-10" cy="-12" rx="8" ry="6" fill="url(#coinShine)" transform="rotate(-20)"/>
  </g>

  <!-- Sparkle stars -->
  <g filter="url(#sparkleGlow)">
    <polygon points="250,160 253,168 262,168 255,173 258,182 250,176 242,182 245,173 238,168 247,168" fill="#e1bee7" opacity="0.9"/>
    <polygon points="450,130 452,136 458,136 453,140 455,146 450,142 445,146 447,140 442,136 448,136" fill="#e1bee7" opacity="0.8"/>
    <polygon points="330,260 333,268 342,268 335,273 338,282 330,276 322,282 325,273 318,268 327,268" fill="#ce93d8" opacity="0.7"/>
    <polygon points="620,200 622,206 628,206 623,210 625,216 620,212 615,216 617,210 612,206 618,206" fill="#e1bee7" opacity="0.85"/>
    <polygon points="510,270 512,276 518,276 513,280 515,286 510,282 505,286 507,280 502,276 508,276" fill="#ce93d8" opacity="0.6"/>
    <polygon points="180,140 182,146 188,146 183,150 185,156 180,152 175,156 177,150 172,146 178,146" fill="#e1bee7" opacity="0.75"/>
    <polygon points="680,150 682,156 688,156 683,160 685,166 680,162 675,166 677,160 672,156 678,156" fill="#d1c4e9" opacity="0.65"/>
    <polygon points="100,300 102,306 108,306 103,310 105,316 100,312 95,316 97,310 92,306 98,306" fill="#ce93d8" opacity="0.5"/>
  </g>

  <!-- Small floating dots -->
  <circle cx="350" cy="80" r="2" fill="#e1bee7" opacity="0.6"/>
  <circle cx="600" cy="120" r="1.5" fill="#e1bee7" opacity="0.5"/>
  <circle cx="150" cy="100" r="2" fill="#d1c4e9" opacity="0.4"/>
  <circle cx="720" cy="300" r="2" fill="#e1bee7" opacity="0.5"/>
  <circle cx="80" cy="200" r="1.5" fill="#ce93d8" opacity="0.4"/>
  <circle cx="550" cy="340" r="2" fill="#d1c4e9" opacity="0.5"/>

  <!-- Green accent line -->
  <rect x="0" y="440" width="800" height="10" fill="#558B2F" opacity="0.7"/>

  <!-- Title label -->
  <g transform="translate(400, 405)">
    <rect x="-110" y="-22" width="220" height="40" rx="20" fill="#4a148c" opacity="0.85"/>
    <rect x="-110" y="-22" width="220" height="40" rx="20" fill="none" stroke="#b388ff" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#e1bee7" letter-spacing="3">PURPLE COINS</text>
  </g>

  <!-- Corner decorative elements -->
  <path d="M0,0 L60,0 L0,60 Z" fill="#558B2F" opacity="0.15"/>
  <path d="M800,0 L740,0 L800,60 Z" fill="#558B2F" opacity="0.15"/>
  <path d="M0,450 L60,450 L0,390 Z" fill="#9c27b0" opacity="0.1"/>
  <path d="M800,450 L740,450 L800,390 Z" fill="#9c27b0" opacity="0.1"/>
</svg>