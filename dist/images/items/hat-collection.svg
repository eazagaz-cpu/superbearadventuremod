<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2e1b"/>
      <stop offset="50%" style="stop-color:#263826"/>
      <stop offset="100%" style="stop-color:#0f1a0f"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4a2d;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1a2e1a;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="hatGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Subtle pattern -->
  <g opacity="0.03" fill="#558B2F">
    <circle cx="100" cy="100" r="120"/>
    <circle cx="400" cy="50" r="100"/>
    <circle cx="700" cy="100" r="120"/>
    <circle cx="200" cy="400" r="100"/>
    <circle cx="600" cy="400" r="100"/>
  </g>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#a5d6a7" letter-spacing="2">HAT COLLECTION</text>
  <line x1="250" y1="62" x2="550" y2="62" stroke="#558B2F" stroke-width="2" opacity="0.5"/>

  <!-- Grid: 3 columns x 2 rows -->
  <!-- Row 1 -->
  <!-- Card 1: Top Hat -->
  <g filter="url(#cardShadow)" transform="translate(72, 80)">
    <rect width="200" height="155" rx="10" fill="url(#cardGrad)"/>
    <rect width="200" height="155" rx="10" fill="none" stroke="#558B2F" stroke-width="1.5" opacity="0.5"/>
    <!-- Top Hat -->
    <g transform="translate(100, 70)" filter="url(#hatGlow)">
      <rect x="-22" y="-50" width="44" height="50" rx="3" fill="#212121"/>
      <rect x="-22" y="-50" width="44" height="50" rx="3" fill="none" stroke="#424242" stroke-width="1"/>
      <!-- Hat band -->
      <rect x="-24" y="-12" width="48" height="8" fill="#b71c1c"/>
      <!-- Brim -->
      <ellipse cx="0" cy="0" rx="38" ry="10" fill="#212121" stroke="#424242" stroke-width="1"/>
      <!-- Shine -->
      <rect x="-18" y="-45" width="8" height="30" rx="4" fill="#424242" opacity="0.4"/>
    </g>
    <text x="100" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#a5d6a7">Top Hat</text>
  </g>

  <!-- Card 2: Baseball Cap -->
  <g filter="url(#cardShadow)" transform="translate(300, 80)">
    <rect width="200" height="155" rx="10" fill="url(#cardGrad)"/>
    <rect width="200" height="155" rx="10" fill="none" stroke="#558B2F" stroke-width="1.5" opacity="0.5"/>
    <!-- Baseball Cap -->
    <g transform="translate(100, 72)" filter="url(#hatGlow)">
      <!-- Cap dome -->
      <path d="M-30,5 Q-30,-30 0,-35 Q30,-30 30,5 Z" fill="#1565C0"/>
      <path d="M-30,5 Q-30,-30 0,-35 Q30,-30 30,5 Z" fill="none" stroke="#1976D2" stroke-width="1"/>
      <!-- Bill/visor -->
      <path d="M-30,5 Q-30,12 -45,14 Q-40,5 -30,5" fill="#0D47A1"/>
      <path d="M-30,5 L30,5" stroke="#1976D2" stroke-width="1.5"/>
      <!-- Button on top -->
      <circle cx="0" cy="-35" r="4" fill="#0D47A1"/>
      <!-- Panel lines -->
      <line x1="0" y1="-35" x2="-15" y2="5" stroke="#1976D2" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="-35" x2="15" y2="5" stroke="#1976D2" stroke-width="0.5" opacity="0.5"/>
      <!-- Logo placeholder -->
      <text x="2" y="-8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#fff" opacity="0.7">B</text>
    </g>
    <text x="100" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#a5d6a7">Baseball Cap</text>
  </g>

  <!-- Card 3: Crown -->
  <g filter="url(#cardShadow)" transform="translate(528, 80)">
    <rect width="200" height="155" rx="10" fill="url(#cardGrad)"/>
    <rect width="200" height="155" rx="10" fill="none" stroke="#558B2F" stroke-width="1.5" opacity="0.5"/>
    <!-- Crown -->
    <g transform="translate(100, 72)" filter="url(#hatGlow)">
      <!-- Crown base -->
      <rect x="-35" y="0" width="70" height="18" rx="3" fill="#FFB300"/>
      <rect x="-35" y="0" width="70" height="18" rx="3" fill="none" stroke="#FFC107" stroke-width="1"/>
      <!-- Crown points -->
      <polygon points="-35,0 -28,-22 -18,0" fill="#FFB300" stroke="#FFC107" stroke-width="0.5"/>
      <polygon points="-12,0 -4,-28 5,0" fill="#FFB300" stroke="#FFC107" stroke-width="0.5"/>
      <polygon points="18,0 28,-22 35,0" fill="#FFB300" stroke="#FFC107" stroke-width="0.5"/>
      <!-- Gems on points -->
      <circle cx="-28" cy="-14" r="3.5" fill="#e53935"/>
      <circle cx="-4" cy="-20" r="4" fill="#42a5f5"/>
      <circle cx="28" cy="-14" r="3.5" fill="#66bb6a"/>
      <!-- Band gems -->
      <circle cx="-18" cy="9" r="3" fill="#e53935"/>
      <circle cx="0" cy="9" r="3.5" fill="#42a5f5"/>
      <circle cx="18" cy="9" r="3" fill="#66bb6a"/>
      <!-- Shine line -->
      <line x1="-30" y1="5" x2="30" y2="5" stroke="#fff9c4" stroke-width="0.5" opacity="0.4"/>
    </g>
    <text x="100" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#a5d6a7">Crown</text>
  </g>

  <!-- Row 2 -->
  <!-- Card 4: Wizard Hat -->
  <g filter="url(#cardShadow)" transform="translate(72, 255)">
    <rect width="200" height="155" rx="10" fill="url(#cardGrad)"/>
    <rect width="200" height="155" rx="10" fill="none" stroke="#558B2F" stroke-width="1.5" opacity="0.5"/>
    <!-- Wizard Hat -->
    <g transform="translate(100, 75)" filter="url(#hatGlow)">
      <!-- Hat cone -->
      <polygon points="0,-55 -35,10 35,10" fill="#4A148C"/>
      <polygon points="0,-55 -35,10 35,10" fill="none" stroke="#7B1FA2" stroke-width="1"/>
      <!-- Brim -->
      <ellipse cx="0" cy="10" rx="42" ry="10" fill="#4A148C" stroke="#7B1FA2" stroke-width="1"/>
      <!-- Hat band -->
      <path d="M-32,2 Q0,-5 32,2" fill="none" stroke="#FFB300" stroke-width="3"/>
      <!-- Stars on hat -->
      <polygon points="10,-30 11.5,-26 16,-26 12.5,-23 13.5,-19 10,-21.5 6.5,-19 7.5,-23 4,-26 8.5,-26" fill="#ffd54f" opacity="0.8"/>
      <polygon points="-12,-15 -10.5,-11 -7,-11 -10,-9 -9,-5 -12,-7.5 -15,-5 -14,-9 -17,-11 -13.5,-11" fill="#ffd54f" opacity="0.6"/>
      <!-- Tip sparkle -->
      <circle cx="0" cy="-55" r="3" fill="#ffd54f" opacity="0.8"/>
    </g>
    <text x="100" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#a5d6a7">Wizard Hat</text>
  </g>

  <!-- Card 5: Pirate Hat -->
  <g filter="url(#cardShadow)" transform="translate(300, 255)">
    <rect width="200" height="155" rx="10" fill="url(#cardGrad)"/>
    <rect width="200" height="155" rx="10" fill="none" stroke="#558B2F" stroke-width="1.5" opacity="0.5"/>
    <!-- Pirate Hat -->
    <g transform="translate(100, 72)" filter="url(#hatGlow)">
      <!-- Hat body (tricorn shape) -->
      <path d="M-40,8 Q-45,-15 -20,-25 Q0,-35 20,-25 Q45,-15 40,8 Z" fill="#212121"/>
      <path d="M-40,8 Q-45,-15 -20,-25 Q0,-35 20,-25 Q45,-15 40,8 Z" fill="none" stroke="#424242" stroke-width="1"/>
      <!-- Folded brim -->
      <path d="M-40,8 Q-15,18 0,5 Q15,18 40,8 Q25,15 0,12 Q-25,15 -40,8" fill="#2E2E2E" stroke="#424242" stroke-width="0.5"/>
      <!-- Skull and crossbones -->
      <circle cx="0" cy="-12" r="7" fill="#e0e0e0"/>
      <ellipse cx="-3" cy="-14" rx="2" ry="2.5" fill="#212121"/>
      <ellipse cx="3" cy="-14" rx="2" ry="2.5" fill="#212121"/>
      <line x1="-2" y1="-9" x2="2" y2="-9" stroke="#212121" stroke-width="1"/>
      <!-- Crossbones -->
      <line x1="-12" y1="-5" x2="12" y2="-18" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
      <line x1="-12" y1="-18" x2="12" y2="-5" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
      <!-- Feather -->
      <path d="M20,-25 Q30,-40 25,-50" fill="none" stroke="#e53935" stroke-width="2"/>
      <path d="M20,-25 Q35,-35 28,-48" fill="#e53935" opacity="0.4"/>
    </g>
    <text x="100" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#a5d6a7">Pirate Hat</text>
  </g>

  <!-- Card 6: Chef Hat -->
  <g filter="url(#cardShadow)" transform="translate(528, 255)">
    <rect width="200" height="155" rx="10" fill="url(#cardGrad)"/>
    <rect width="200" height="155" rx="10" fill="none" stroke="#558B2F" stroke-width="1.5" opacity="0.5"/>
    <!-- Chef Hat (Toque) -->
    <g transform="translate(100, 72)" filter="url(#hatGlow)">
      <!-- Hat puffs (top) -->
      <circle cx="-12" cy="-35" r="14" fill="#fafafa"/>
      <circle cx="12" cy="-35" r="14" fill="#fafafa"/>
      <circle cx="0" cy="-42" r="14" fill="#fafafa"/>
      <circle cx="-18" cy="-25" r="12" fill="#f5f5f5"/>
      <circle cx="18" cy="-25" r="12" fill="#f5f5f5"/>
      <circle cx="0" cy="-28" r="14" fill="#fafafa"/>
      <!-- Hat band/base -->
      <rect x="-25" y="-12" width="50" height="22" rx="2" fill="#f5f5f5"/>
      <rect x="-25" y="-12" width="50" height="22" rx="2" fill="none" stroke="#e0e0e0" stroke-width="1"/>
      <!-- Band line -->
      <line x1="-25" y1="-8" x2="25" y2="-8" stroke="#bdbdbd" stroke-width="1"/>
      <!-- Subtle pleats -->
      <line x1="-10" y1="-12" x2="-10" y2="10" stroke="#e0e0e0" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="-12" x2="0" y2="10" stroke="#e0e0e0" stroke-width="0.5" opacity="0.5"/>
      <line x1="10" y1="-12" x2="10" y2="10" stroke="#e0e0e0" stroke-width="0.5" opacity="0.5"/>
    </g>
    <text x="100" y="138" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#a5d6a7">Chef Hat</text>
  </g>

  <!-- Green accent line -->
  <rect x="0" y="440" width="800" height="10" fill="#558B2F" opacity="0.7"/>

  <!-- Decorative corner dots -->
  <circle cx="30" cy="30" r="4" fill="#558B2F" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#558B2F" opacity="0.3"/>
  <circle cx="30" cy="430" r="4" fill="#558B2F" opacity="0.3"/>
  <circle cx="770" cy="430" r="4" fill="#558B2F" opacity="0.3"/>
</svg>