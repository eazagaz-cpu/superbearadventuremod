<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="toggleOn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#7CB342"/>
    </linearGradient>
    <linearGradient id="toggleOff" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#455A64"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="panelClip">
      <rect x="220" y="30" width="360" height="390" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Background game scene (blurred/dim) -->
  <rect x="0" y="0" width="800" height="300" fill="#1a3a2a" opacity="0.3"/>
  <polygon points="0,300 200,200 400,280 600,180 800,260 800,450 0,450" fill="#2E7D32" opacity="0.15"/>
  <circle cx="650" cy="120" r="40" fill="#FFD600" opacity="0.08"/>

  <!-- Dark overlay to simulate game being paused -->
  <rect width="800" height="450" fill="#000" opacity="0.4"/>

  <!-- Mod menu panel -->
  <g filter="url(#shadow)">
    <rect x="220" y="30" width="360" height="390" rx="16" fill="url(#panelBg)"/>
    <rect x="220" y="30" width="360" height="390" rx="16" fill="none" stroke="#333" stroke-width="1"/>

    <!-- Header bar -->
    <rect x="220" y="30" width="360" height="50" rx="16" fill="url(#headerGrad)" clip-path="url(#panelClip)"/>
    <rect x="220" y="64" width="360" height="16" fill="url(#headerGrad)"/>

    <!-- Header content -->
    <text x="244" y="62" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#fff" font-weight="bold">MOD MENU</text>
    <text x="244" y="74" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#42A5F5">Super Bear Adventure v1.11.1</text>

    <!-- Close button -->
    <circle cx="556" cy="56" r="14" fill="#33691E"/>
    <line x1="550" y1="50" x2="562" y2="62" stroke="#C5E1A5" stroke-width="2" stroke-linecap="round"/>
    <line x1="562" y1="50" x2="550" y2="62" stroke="#C5E1A5" stroke-width="2" stroke-linecap="round"/>

    <!-- Divider -->
    <line x1="236" y1="88" x2="564" y2="88" stroke="#2a2a3e" stroke-width="1"/>

    <!-- Toggle 1: Unlimited Coins - ON -->
    <g>
      <rect x="236" y="96" width="328" height="44" rx="8" fill="#1e2d1e" opacity="0.5"/>
      <circle cx="260" cy="118" r="12" fill="#FFD600" opacity="0.2"/>
      <text x="260" y="123" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#FFD600">$</text>
      <text x="282" y="114" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#fff" font-weight="bold">Unlimited Coins</text>
      <text x="282" y="128" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#7CB342">Active - Infinite currency</text>
      <rect x="510" y="108" width="44" height="22" rx="11" fill="url(#toggleOn)" filter="url(#glow)"/>
      <circle cx="543" cy="119" r="8" fill="#fff"/>
      <text x="530" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#7CB342" font-weight="bold">ON</text>
    </g>

    <!-- Toggle 2: God Mode - OFF -->
    <g>
      <rect x="236" y="148" width="328" height="44" rx="8" fill="#1a1a2e" opacity="0.5"/>
      <circle cx="260" cy="170" r="12" fill="#546E7A" opacity="0.2"/>
      <path d="M260,161 L252,166 L252,173 Q252,179 260,181 Q268,179 268,173 L268,166 Z" fill="none" stroke="#78909C" stroke-width="1.5"/>
      <text x="282" y="166" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#aaa">God Mode</text>
      <text x="282" y="180" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#666">Disabled - Take normal damage</text>
      <rect x="510" y="160" width="44" height="22" rx="11" fill="url(#toggleOff)"/>
      <circle cx="521" cy="171" r="8" fill="#90A4AE"/>
      <text x="530" y="194" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666">OFF</text>
    </g>

    <!-- Toggle 3: Speed Hack - ON -->
    <g>
      <rect x="236" y="200" width="328" height="44" rx="8" fill="#1e2d1e" opacity="0.5"/>
      <circle cx="260" cy="222" r="12" fill="#558B2F" opacity="0.2"/>
      <path d="M254,222 L260,216 L260,220 L268,220 L268,224 L260,224 L260,228 Z" fill="#7CB342"/>
      <text x="282" y="218" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#fff" font-weight="bold">Speed Hack</text>
      <text x="282" y="232" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#7CB342">Active - 2x movement speed</text>
      <rect x="510" y="212" width="44" height="22" rx="11" fill="url(#toggleOn)" filter="url(#glow)"/>
      <circle cx="543" cy="223" r="8" fill="#fff"/>
      <text x="530" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#7CB342" font-weight="bold">ON</text>
    </g>

    <!-- Toggle 4: No Ads - ON -->
    <g>
      <rect x="236" y="252" width="328" height="44" rx="8" fill="#1e2d1e" opacity="0.5"/>
      <circle cx="260" cy="274" r="12" fill="#558B2F" opacity="0.2"/>
      <rect x="252" y="268" width="16" height="12" rx="2" fill="none" stroke="#7CB342" stroke-width="1.5"/>
      <line x1="250" y1="282" x2="270" y2="264" stroke="#ef5350" stroke-width="2" stroke-linecap="round"/>
      <text x="282" y="270" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#fff" font-weight="bold">No Ads</text>
      <text x="282" y="284" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#7CB342">Active - Ad-free experience</text>
      <rect x="510" y="264" width="44" height="22" rx="11" fill="url(#toggleOn)" filter="url(#glow)"/>
      <circle cx="543" cy="275" r="8" fill="#fff"/>
      <text x="530" y="298" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#7CB342" font-weight="bold">ON</text>
    </g>

    <!-- Divider -->
    <line x1="236" y1="306" x2="564" y2="306" stroke="#2a2a3e" stroke-width="1"/>

    <!-- Slider: Speed Multiplier -->
    <g>
      <text x="244" y="326" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#42A5F5" font-weight="bold">Speed Multiplier</text>
      <text x="540" y="326" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7CB342" font-weight="bold">2.0x</text>
      <rect x="244" y="336" width="310" height="6" rx="3" fill="#2a2a3e"/>
      <rect x="244" y="336" width="186" height="6" rx="3" fill="url(#toggleOn)"/>
      <circle cx="430" cy="339" r="10" fill="#7CB342" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
      <text x="244" y="358" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666">1x</text>
      <text x="369" y="358" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666">2.5x</text>
      <text x="554" y="358" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666">5x</text>
    </g>

    <!-- Slider: Jump Height -->
    <g>
      <text x="244" y="380" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#42A5F5" font-weight="bold">Jump Height</text>
      <text x="540" y="380" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7CB342" font-weight="bold">1.5x</text>
      <rect x="244" y="390" width="310" height="6" rx="3" fill="#2a2a3e"/>
      <rect x="244" y="390" width="124" height="6" rx="3" fill="url(#toggleOn)"/>
      <circle cx="368" cy="393" r="10" fill="#7CB342" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
      <text x="244" y="412" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666">1x</text>
      <text x="369" y="412" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666">2x</text>
      <text x="554" y="412" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666">3x</text>
    </g>
  </g>

  <!-- Left side decorative - feature count -->
  <g>
    <rect x="40" y="140" width="150" height="60" rx="10" fill="#1B5E20" opacity="0.8" filter="url(#shadow)"/>
    <text x="115" y="166" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#7CB342" font-weight="bold">15+</text>
    <text x="115" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1565C0">Mod Features</text>
  </g>

  <!-- Right side decorative - status -->
  <g>
    <rect x="610" y="140" width="150" height="60" rx="10" fill="#1B5E20" opacity="0.8" filter="url(#shadow)"/>
    <circle cx="640" cy="163" r="6" fill="#7CB342" filter="url(#glow)"/>
    <text x="652" y="167" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#fff" font-weight="bold">Active</text>
    <text x="685" y="185" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1565C0">3 of 4 enabled</text>
  </g>

  <!-- Left decorative bear paw -->
  <g transform="translate(90,300)" opacity="0.15">
    <circle cx="0" cy="0" r="20" fill="#42A5F5"/>
    <circle cx="-12" cy="-18" r="8" fill="#42A5F5"/>
    <circle cx="0" cy="-22" r="8" fill="#42A5F5"/>
    <circle cx="12" cy="-18" r="8" fill="#42A5F5"/>
  </g>

  <!-- Right decorative bear paw -->
  <g transform="translate(710,300)" opacity="0.15">
    <circle cx="0" cy="0" r="20" fill="#42A5F5"/>
    <circle cx="-12" cy="-18" r="8" fill="#42A5F5"/>
    <circle cx="0" cy="-22" r="8" fill="#42A5F5"/>
    <circle cx="12" cy="-18" r="8" fill="#42A5F5"/>
  </g>

  <!-- Bottom title -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#42A5F5" font-weight="bold" letter-spacing="1">Mod Menu Interface</text>
</svg>