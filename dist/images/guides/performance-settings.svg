<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222236"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="fpsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="sliderTrack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="ramGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#8BC34A"/>
    </linearGradient>
    <linearGradient id="tempGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
    <filter id="panelShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle hex grid -->
  <g opacity="0.03">
    <circle cx="50" cy="50" r="20" fill="none" stroke="#558B2F" stroke-width="0.5"/>
    <circle cx="90" cy="50" r="20" fill="none" stroke="#558B2F" stroke-width="0.5"/>
    <circle cx="70" cy="85" r="20" fill="none" stroke="#558B2F" stroke-width="0.5"/>
    <circle cx="710" cy="370" r="20" fill="none" stroke="#558B2F" stroke-width="0.5"/>
    <circle cx="750" cy="370" r="20" fill="none" stroke="#558B2F" stroke-width="0.5"/>
    <circle cx="730" cy="405" r="20" fill="none" stroke="#558B2F" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#E8F5E9" letter-spacing="1">PERFORMANCE SETTINGS</text>
  <text x="400" y="53" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#78909C">Optimize Your Gaming Experience</text>

  <!-- Main panel -->
  <g filter="panelShadow">
    <rect x="40" y="68" width="440" height="360" rx="12" fill="url(#panelGrad)" stroke="#2a2a3e" stroke-width="1.5"/>
  </g>

  <!-- Panel header -->
  <rect x="40" y="68" width="440" height="40" rx="12" fill="#558B2F" opacity="0.15"/>
  <rect x="40" y="96" width="440" height="12" fill="url(#panelGrad)"/>
  <!-- Settings gear icon -->
  <g transform="translate(65, 88)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#A5D6A7" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#1565C0"/>
    <line x1="0" y1="-11" x2="0" y2="-8" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="0" y2="11" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="-8" y2="0" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="11" y2="0" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="-7.5" y1="-7.5" x2="-5.5" y2="-5.5" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="5.5" y1="5.5" x2="7.5" y2="7.5" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="7.5" y1="-7.5" x2="5.5" y2="-5.5" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5.5" y1="5.5" x2="-7.5" y2="7.5" stroke="#A5D6A7" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="85" y="93" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#C8E6C9">Graphics &amp; Performance</text>

  <!-- SETTING 1: Quality Slider -->
  <g transform="translate(65, 130)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#E0E0E0">Graphics Quality</text>
    <!-- Slider track -->
    <rect x="0" y="14" width="390" height="6" rx="3" fill="#2a2a3e"/>
    <rect x="0" y="14" width="390" height="6" rx="3" fill="url(#sliderTrack)" opacity="0.4"/>
    <!-- Slider fill -->
    <rect x="0" y="14" width="260" height="6" rx="3" fill="url(#sliderTrack)"/>
    <!-- Slider thumb -->
    <circle cx="260" cy="17" r="10" fill="#558B2F" stroke="#8BC34A" stroke-width="2"/>
    <!-- Labels -->
    <text x="0" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#EF5350" font-weight="600">Low</text>
    <text x="185" y="42" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFC107" font-weight="600">Medium</text>
    <text x="390" y="42" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#66BB6A" font-weight="600">High</text>
    <!-- Current selection indicator -->
    <rect x="233" y="32" width="54" height="16" rx="4" fill="#558B2F" opacity="0.2"/>
    <text x="260" y="44" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#1565C0" font-weight="700">HIGH</text>
  </g>

  <!-- SETTING 2: RAM Usage -->
  <g transform="translate(65, 195)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#E0E0E0">RAM Usage</text>
    <text x="390" y="0" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#81C784">2.1 GB / 4 GB</text>
    <!-- RAM bar background -->
    <rect x="0" y="12" width="390" height="18" rx="4" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <!-- RAM bar fill -->
    <rect x="2" y="14" width="201" height="14" rx="3" fill="url(#ramGrad)"/>
    <!-- RAM segments -->
    <line x1="98" y1="14" x2="98" y2="28" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="196" y1="14" x2="196" y2="28" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="294" y1="14" x2="294" y2="28" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <!-- Percentage -->
    <text x="100" y="27" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#fff">52%</text>
  </g>

  <!-- SETTING 3: Battery Saver Toggle -->
  <g transform="translate(65, 252)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#E0E0E0">Battery Saver Mode</text>
    <text x="0" y="16" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#666">Reduces effects and limits background processes</text>
    <!-- Toggle switch (ON) -->
    <rect x="330" y="-10" width="50" height="26" rx="13" fill="#558B2F"/>
    <circle cx="367" cy="3" r="10" fill="#fff"/>
    <!-- Battery icon -->
    <rect x="296" y="-7" width="22" height="14" rx="3" fill="none" stroke="#A5D6A7" stroke-width="1.5"/>
    <rect x="318" y="-2" width="3" height="4" rx="1" fill="#1565C0"/>
    <rect x="299" y="-4" width="12" height="8" rx="1.5" fill="#66BB6A"/>
    <!-- Lightning bolt on battery -->
    <polygon points="306,-2 303,2 305,2 304,5 307,1 305,1" fill="#fff"/>
  </g>

  <!-- SETTING 4: Resolution Dropdown -->
  <g transform="translate(65, 305)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#E0E0E0">Resolution</text>
    <!-- Dropdown -->
    <rect x="200" y="-14" width="190" height="30" rx="6" fill="#1a1a2e" stroke="#3a3a4e" stroke-width="1"/>
    <text x="215" y="5" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#C8E6C9">1920 x 1080 (FHD)</text>
    <!-- Dropdown arrow -->
    <polyline points="370,-3 375,3 380,-3" fill="none" stroke="#78909C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- SETTING 5: Frame Rate Limit -->
  <g transform="translate(65, 350)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#E0E0E0">Frame Rate Limit</text>
    <!-- FPS options -->
    <rect x="200" y="-14" width="50" height="28" rx="5" fill="#1a1a2e" stroke="#3a3a4e" stroke-width="1"/>
    <text x="225" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666">30</text>
    <rect x="255" y="-14" width="50" height="28" rx="5" fill="#558B2F" stroke="#8BC34A" stroke-width="1.5"/>
    <text x="280" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">60</text>
    <rect x="310" y="-14" width="50" height="28" rx="5" fill="#1a1a2e" stroke="#3a3a4e" stroke-width="1"/>
    <text x="335" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666">120</text>
    <rect x="365" y="-14" width="25" height="28" rx="5" fill="#1a1a2e" stroke="#3a3a4e" stroke-width="1"/>
    <text x="377.5" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#666">Max</text>
  </g>

  <!-- Apply button -->
  <g transform="translate(65, 395)">
    <rect x="120" y="0" width="180" height="36" rx="8" fill="#558B2F" stroke="#8BC34A" stroke-width="1"/>
    <text x="210" y="23" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">Apply Settings</text>
  </g>

  <!-- RIGHT SIDE: FPS Counter and Temperature -->

  <!-- FPS Counter circle -->
  <g transform="translate(620, 160)" filter="glow">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="#2a2a3e" stroke-width="6"/>
    <!-- Progress arc (showing 60 out of max ~120 = 180 degrees) -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="url(#fpsGrad)" stroke-width="6" stroke-dasharray="226 226" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90)"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="60" fill="#1a1a2e" stroke="#222236" stroke-width="1"/>
    <!-- FPS number -->
    <text x="0" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="900" fill="#66BB6A">60</text>
    <text x="0" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#1565C0">FPS</text>
    <!-- Status label -->
    <rect x="-30" y="24" width="60" height="18" rx="4" fill="#558B2F" opacity="0.3"/>
    <text x="0" y="38" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#C8E6C9">SMOOTH</text>
  </g>

  <!-- Temperature gauge -->
  <g transform="translate(620, 330)">
    <!-- Label -->
    <text x="0" y="-45" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#E0E0E0">Device Temperature</text>

    <!-- Thermometer body -->
    <rect x="-60" y="-30" width="120" height="20" rx="10" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <!-- Temperature fill (green zone - cool) -->
    <rect x="-58" y="-28" width="55" height="16" rx="8" fill="url(#tempGrad)"/>

    <!-- Temperature markers -->
    <line x1="-40" y1="-12" x2="-40" y2="-6" stroke="#444" stroke-width="1"/>
    <line x1="0" y1="-12" x2="0" y2="-6" stroke="#444" stroke-width="1"/>
    <line x1="40" y1="-12" x2="40" y2="-6" stroke="#444" stroke-width="1"/>

    <text x="-50" y="8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#66BB6A">Cool</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#FFC107">Warm</text>
    <text x="50" y="8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#EF5350">Hot</text>

    <!-- Current temp value -->
    <text x="0" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#66BB6A">38°C</text>
    <text x="0" y="44" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#78909C">Normal Range</text>
  </g>

  <!-- Stats badges -->
  <g transform="translate(530, 415)">
    <rect x="0" y="0" width="70" height="22" rx="4" fill="#558B2F" opacity="0.15"/>
    <text x="35" y="15" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#1565C0">GPU 45%</text>
    <rect x="78" y="0" width="70" height="22" rx="4" fill="#558B2F" opacity="0.15"/>
    <text x="113" y="15" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#1565C0">CPU 32%</text>
    <rect x="156" y="0" width="70" height="22" rx="4" fill="#558B2F" opacity="0.15"/>
    <text x="191" y="15" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="#1565C0">VRAM 1.8G</text>
  </g>
</svg>