<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="iphoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="laptopScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#7CB342"/>
    </linearGradient>
    <linearGradient id="cable" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bbb"/>
      <stop offset="50%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#bbb"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="150" cy="100" r="180" fill="#2E7D32" opacity="0.15"/>
  <circle cx="650" cy="350" r="150" fill="#1B5E20" opacity="0.2"/>

  <!-- Subtle grid -->
  <line x1="0" y1="112" x2="800" y2="112" stroke="#2E7D32" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="#2E7D32" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="337" x2="800" y2="337" stroke="#2E7D32" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#2E7D32" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#2E7D32" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#2E7D32" stroke-width="0.5" opacity="0.15"/>

  <!-- Laptop -->
  <g filter="url(#shadow)">
    <rect x="460" y="80" width="290" height="195" rx="10" fill="#333"/>
    <rect x="470" y="90" width="270" height="175" rx="4" fill="url(#laptopScreen)"/>

    <!-- Laptop screen content -->
    <rect x="470" y="90" width="270" height="24" fill="#0f0f1a"/>
    <circle cx="484" cy="102" r="4" fill="#ff5f57"/>
    <circle cx="496" cy="102" r="4" fill="#febc2e"/>
    <circle cx="508" cy="102" r="4" fill="#28c840"/>
    <text x="540" y="106" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#888">AltServer</text>

    <rect x="500" y="130" width="210" height="40" rx="6" fill="#1e293b"/>
    <text x="605" y="147" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7CB342" font-weight="bold">AltServer Running</text>
    <circle cx="518" cy="155" r="4" fill="#7CB342"/>
    <text x="530" y="158" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#558B2F">Connected</text>

    <rect x="500" y="180" width="210" height="22" rx="4" fill="#1a2332"/>
    <rect x="508" y="186" width="10" height="10" rx="2" fill="#558B2F"/>
    <text x="524" y="195" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#aaa">SuperBearAdventure.ipa</text>

    <rect x="500" y="208" width="210" height="22" rx="4" fill="#1a2332"/>
    <rect x="508" y="214" width="10" height="10" rx="2" fill="#444"/>
    <text x="524" y="223" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#888">Install to device...</text>

    <rect x="500" y="240" width="210" height="6" rx="3" fill="#1a2332"/>
    <rect x="500" y="240" width="150" height="6" rx="3" fill="url(#accent)"/>

    <!-- Laptop base -->
    <path d="M440,275 L460,275 L460,285 Q460,295 470,295 L740,295 Q750,295 750,285 L750,275 L770,275 L770,290 Q770,305 755,305 L455,305 Q440,305 440,290 Z" fill="#444"/>
    <rect x="570" y="278" width="70" height="5" rx="2.5" fill="#555"/>
  </g>

  <!-- Connection cable / WiFi -->
  <path d="M340,240 C380,240 420,250 460,220" fill="none" stroke="url(#cable)" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- WiFi symbol -->
  <g transform="translate(395,210)">
    <path d="M-12,8 Q0,-4 12,8" fill="none" stroke="#7CB342" stroke-width="2" opacity="0.5"/>
    <path d="M-8,5 Q0,0 8,5" fill="none" stroke="#7CB342" stroke-width="2" opacity="0.7"/>
    <path d="M-4,2 Q0,-1 4,2" fill="none" stroke="#7CB342" stroke-width="2" opacity="0.9"/>
    <circle cx="0" cy="4" r="2" fill="#7CB342"/>
  </g>

  <!-- iPhone -->
  <g filter="url(#shadow)">
    <rect x="200" y="65" width="140" height="290" rx="22" fill="#1a1a1a"/>
    <rect x="200" y="65" width="140" height="290" rx="22" fill="none" stroke="#333" stroke-width="1.5"/>
    <rect x="210" y="82" width="120" height="256" rx="14" fill="url(#iphoneScreen)"/>

    <!-- Notch -->
    <rect x="248" y="65" width="44" height="20" rx="10" fill="#1a1a1a"/>
    <text x="224" y="98" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333" font-weight="bold">9:41</text>

    <!-- AltStore header -->
    <rect x="224" y="110" width="92" height="30" rx="8" fill="#558B2F"/>
    <text x="270" y="129" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">AltStore</text>

    <!-- App list -->
    <rect x="220" y="152" width="100" height="36" rx="6" fill="#fff"/>
    <rect x="228" y="160" width="20" height="20" rx="5" fill="#8D6E63"/>
    <text x="233" y="174" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#fff" font-weight="bold">SBA</text>
    <text x="254" y="170" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333" font-weight="bold">Super Bear</text>
    <text x="254" y="181" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#7CB342">INSTALLED</text>

    <rect x="220" y="194" width="100" height="36" rx="6" fill="#fff"/>
    <rect x="228" y="202" width="20" height="20" rx="5" fill="#7CB342"/>
    <text x="234" y="215" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#fff" font-weight="bold">MOD</text>
    <text x="254" y="212" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#333" font-weight="bold">Mod Menu</text>
    <text x="254" y="223" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#999">v2.1.0</text>

    <!-- Bottom nav -->
    <rect x="210" y="310" width="120" height="28" rx="6" fill="#fff"/>
    <text x="235" y="328" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#558B2F" font-weight="bold">My Apps</text>
    <text x="290" y="328" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#999">Browse</text>

    <rect x="248" y="342" width="44" height="4" rx="2" fill="#333"/>
  </g>

  <!-- Apple logo (simplified) -->
  <g transform="translate(98,160)" opacity="0.2">
    <path d="M25,45 C25,35 15,25 15,15 C15,5 22,0 28,0 C32,0 35,3 38,3 C41,3 44,0 49,0 C54,0 60,4 60,12 C54,12 48,18 48,26 C48,35 54,40 56,42 C54,47 48,58 42,58 C38,58 37,55 32,55 C27,55 25,58 22,58 C16,58 10,47 10,37 C10,27 16,22 22,22 C26,22 28,25 32,25 C36,25 37,22 42,22" fill="#42A5F5" stroke="none"/>
  </g>

  <!-- Flow arrow -->
  <g filter="url(#glow)">
    <circle cx="400" cy="250" r="16" fill="#558B2F" opacity="0.9"/>
    <polygon points="394,244 410,250 394,256" fill="#fff"/>
    <text x="400" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#42A5F5">Sideload</text>
  </g>

  <!-- Step labels -->
  <g>
    <rect x="38" y="260" width="130" height="55" rx="8" fill="#1B5E20" opacity="0.8"/>
    <circle cx="56" cy="278" r="10" fill="#558B2F"/>
    <text x="56" y="282" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">1</text>
    <text x="72" y="282" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#42A5F5" font-weight="bold">Download</text>
    <text x="52" y="300" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1565C0">AltServer on PC</text>
  </g>

  <g>
    <rect x="38" y="325" width="130" height="55" rx="8" fill="#1B5E20" opacity="0.8"/>
    <circle cx="56" cy="343" r="10" fill="#558B2F"/>
    <text x="56" y="347" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">2</text>
    <text x="72" y="347" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#42A5F5" font-weight="bold">Connect</text>
    <text x="52" y="365" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1565C0">iPhone via USB/WiFi</text>
  </g>

  <g>
    <rect x="490" y="325" width="140" height="55" rx="8" fill="#1B5E20" opacity="0.8"/>
    <circle cx="508" cy="343" r="10" fill="#558B2F"/>
    <text x="508" y="347" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">3</text>
    <text x="524" y="347" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#42A5F5" font-weight="bold">Install IPA</text>
    <text x="504" y="365" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1565C0">Sideload the mod APK</text>
  </g>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#fff" font-weight="bold" letter-spacing="0.5">iOS Installation via AltStore</text>
  <text x="400" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1565C0">Sideload Super Bear Adventure Mod on iPhone</text>

  <text x="400" y="435" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#42A5F5" font-weight="bold" letter-spacing="1">AltStore Sideloading Guide</text>
</svg>