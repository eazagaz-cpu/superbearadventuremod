<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="50%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <radialGradient id="silver" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="30%" stop-color="#E0E0E0"/>
      <stop offset="60%" stop-color="#C0C0C0"/>
      <stop offset="85%" stop-color="#9E9E9E"/>
      <stop offset="100%" stop-color="#757575"/>
    </radialGradient>
    <radialGradient id="silverRim" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#BDBDBD"/>
      <stop offset="95%" stop-color="#9E9E9E"/>
      <stop offset="100%" stop-color="#757575"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="28%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="reflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="45%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
