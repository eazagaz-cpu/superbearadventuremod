<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1205"/>
      <stop offset="50%" style="stop-color:#2e1f08"/>
      <stop offset="100%" style="stop-color:#0f0a02"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="30%" style="stop-color:#ffb300"/>
      <stop offset="70%" style="stop-color:#ff8f00"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffe082;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb300"/>
      <stop offset="100%" style="stop-color:#bf360c"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb300;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:0"/>
    </radialGradient>
    <filter id="coinGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gleam">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Warm ambient glow -->
  <circle cx="350" cy="250" r="200" fill="url(#warmGlow)" opacity="0.5"/>
  <circle cx="550" cy="180" r="150" fill="url(#warmGlow)" opacity="0.3"/>

  <!-- Treasure chest base -->
  <g transform="translate(350, 280)">
    <rect x="-90" y="-20" width="180" height="70" rx="5" fill="#5D4037"/>
    <rect x="-90" y="-20" width="180" height="70" rx="5" fill="none" stroke="#8D6E63" stroke-width="2"/>
    <path d="M-90,-20 Q-90,-65 0,-70 Q90,-65 90,-20" fill="#6D4C41" stroke="#8D6E63" stroke-width="2"/>
    <rect x="-90" y="-5" width="180" height="6" fill="#FFB300" opacity="0.7"/>
    <rect x="-90" y="25" width="180" height="6" fill="#FFB300" opacity="0.7"/>
    <rect x="-10" y="5" width="20" height="18" rx="3" fill="#FFB300"/>
    <circle cx="0" cy="14" r="4" fill="#5D4037"/>
  </g>

  <!-- Stack 1: left pile -->
  <g filter="url(#coinGlow)">
    <ellipse cx="260" cy="310" rx="28" ry="8" fill="url(#goldEdge)"/>
    <ellipse cx="260" cy="306" rx="28" ry="8" fill="url(#goldGrad)"/>
    <ellipse cx="260" cy="302" rx="28" ry="8" fill="url(#goldEdge)"/>
    <ellipse cx="260" cy="298" rx="28" ry="8" fill="url(#goldGrad)"/>
    <ellipse cx="260" cy="294" rx="28" ry="8" fill="url(#goldEdge)"/>
    <ellipse cx="260" cy="290" rx="28" ry="8" fill="url(#goldGrad)"/>
    <ellipse cx="-4" cy="-3" rx="8" ry="3" fill="url(#goldShine)" transform="translate(250,290) rotate(-15)"/>
  </g>

  <!-- Stack 2: right pile -->
  <g filter="url(#coinGlow)">
    <ellipse cx="470" cy="315" rx="26" ry="7" fill="url(#goldEdge)"/>
    <ellipse cx="470" cy="311" rx="26" ry="7" fill="url(#goldGrad)"/>
    <ellipse cx="470" cy="307" rx="26" ry="7" fill="url(#goldEdge)"/>
    <ellipse cx="470" cy="303" rx="26" ry="7" fill="url(#goldGrad)"/>
    <ellipse cx="-4" cy="-3" rx="7" ry="3" fill="url(#goldShine)" transform="translate(462,303) rotate(-15)"/>
  </g>

  <!-- Coin 1 - large front -->
  <g filter="url(#coinGlow)" transform="translate(180, 260)">
    <ellipse cx="0" cy="0" rx="38" ry="40" fill="#e65100" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="35" ry="37" fill="url(#goldGrad)"/>
    <ellipse cx="0" cy="0" rx="28" ry="30" fill="none" stroke="#fff9c4" stroke-width="2" opacity="0.4"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#5D4037" opacity="0.6">$</text>
    <ellipse cx="-10" cy="-13" rx="10" ry="6" fill="url(#goldShine)" transform="rotate(-20)"/>
  </g>

  <!-- Coin 2 - top -->
  <g filter="url(#coinGlow)" transform="translate(400, 150)">
    <ellipse cx="0" cy="0" rx="42" ry="44" fill="#e65100" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="38" ry="40" fill="url(#goldGrad)"/>
    <ellipse cx="0" cy="0" rx="30" ry="32" fill="none" stroke="#fff9c4" stroke-width="2" opacity="0.4"/>
    <text x="0" y="9" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#5D4037" opacity="0.6">$</text>
    <ellipse cx="-12" cy="-14" rx="11" ry="7" fill="url(#goldShine)" transform="rotate(-20)"/>
  </g>

  <!-- Coin 3 - right -->
  <g filter="url(#coinGlow)" transform="translate(580, 210)">
    <ellipse cx="0" cy="0" rx="32" ry="34" fill="#e65100" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="29" ry="31" fill="url(#goldGrad)"/>
    <ellipse cx="0" cy="0" rx="23" ry="25" fill="none" stroke="#fff9c4" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#5D4037" opacity="0.6">$</text>
    <ellipse cx="-9" cy="-11" rx="8" ry="5" fill="url(#goldShine)" transform="rotate(-20)"/>
  </g>

  <!-- Coin 4 - far right -->
  <g filter="url(#coinGlow)" transform="translate(680, 280)">
    <ellipse cx="0" cy="0" rx="25" ry="27" fill="#e65100" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="22" ry="24" fill="url(#goldGrad)"/>
    <ellipse cx="0" cy="0" rx="17" ry="19" fill="none" stroke="#fff9c4" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#5D4037" opacity="0.6">$</text>
  </g>

  <!-- Coin 5 - small top left -->
  <g filter="url(#coinGlow)" transform="translate(120, 150)">
    <ellipse cx="0" cy="0" rx="20" ry="22" fill="#e65100" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="18" ry="20" fill="url(#goldGrad)"/>
    <ellipse cx="0" cy="0" rx="14" ry="16" fill="none" stroke="#fff9c4" stroke-width="1" opacity="0.4"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#5D4037" opacity="0.6">$</text>
  </g>

  <!-- Coin 6 - tilted edge view -->
  <g filter="url(#coinGlow)" transform="translate(530, 320)">
    <ellipse cx="0" cy="0" rx="30" ry="12" fill="url(#goldGrad)" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#fff9c4" stroke-width="1.5" opacity="0.4" transform="rotate(-25)"/>
  </g>

  <!-- Coin 7 - tiny background -->
  <g filter="url(#coinGlow)" transform="translate(300, 100)">
    <ellipse cx="0" cy="0" rx="14" ry="15" fill="url(#goldGrad)" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="10" ry="11" fill="none" stroke="#fff9c4" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Coin 8 - bottom scattered -->
  <g filter="url(#coinGlow)" transform="translate(350, 340)">
    <ellipse cx="0" cy="0" rx="22" ry="24" fill="url(#goldGrad)"/>
    <ellipse cx="0" cy="0" rx="17" ry="19" fill="none" stroke="#fff9c4" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#5D4037" opacity="0.6">$</text>
  </g>

  <!-- Gleam effects -->
  <g opacity="0.8">
    <circle cx="170" cy="245" r="4" fill="#fff9c4" filter="url(#gleam)"/>
    <circle cx="390" cy="135" r="5" fill="#fff9c4" filter="url(#gleam)"/>
    <circle cx="570" cy="195" r="3" fill="#fff9c4" filter="url(#gleam)"/>
    <circle cx="250" cy="280" r="3" fill="#fff9c4" filter="url(#gleam)"/>
    <circle cx="460" cy="295" r="3" fill="#fff9c4" filter="url(#gleam)"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="220" cy="180" r="2" fill="#ffd54f" opacity="0.6"/>
  <circle cx="500" cy="130" r="2" fill="#ffd54f" opacity="0.5"/>
  <circle cx="650" cy="170" r="1.5" fill="#ffe082" opacity="0.5"/>
  <circle cx="100" cy="280" r="2" fill="#ffd54f" opacity="0.4"/>
  <circle cx="720" cy="220" r="1.5" fill="#ffe082" opacity="0.4"/>

  <!-- Green accent line -->
  <rect x="0" y="440" width="800" height="10" fill="#558B2F" opacity="0.7"/>

  <!-- Title label -->
  <g transform="translate(400, 405)">
    <rect x="-100" y="-22" width="200" height="40" rx="20" fill="#4E342E" opacity="0.85"/>
    <rect x="-100" y="-22" width="200" height="40" rx="20" fill="none" stroke="#FFB300" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#FFD54F" letter-spacing="3">GOLD COINS</text>
  </g>

  <!-- Corner accents -->
  <path d="M0,0 L60,0 L0,60 Z" fill="#558B2F" opacity="0.15"/>
  <path d="M800,0 L740,0 L800,60 Z" fill="#558B2F" opacity="0.15"/>
  <path d="M0,450 L60,450 L0,390 Z" fill="#FFB300" opacity="0.08"/>
  <path d="M800,450 L740,450 L800,390 Z" fill="#FFB300" opacity="0.08"/>
</svg>