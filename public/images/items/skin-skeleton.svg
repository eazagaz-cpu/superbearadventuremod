<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="boneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="50%" style="stop-color:#bdbdbd"/>
      <stop offset="100%" style="stop-color:#9e9e9e"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#558B2F"/>
      <stop offset="100%" style="stop-color:#33691E"/>
    </linearGradient>
    <radialGradient id="spookyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#558B2F;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#558B2F;stop-opacity:0"/>
    </radialGradient>
    <filter id="greenAura">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Subtle dark texture lines -->
  <g opacity="0.06" stroke="#558B2F" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>

  <!-- Gothic border -->
  <rect x="15" y="15" width="770" height="420" rx="5" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="410" rx="3" fill="none" stroke="#444" stroke-width="1"/>
  <!-- Corner flourishes -->
  <g stroke="#558B2F" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M20,50 Q20,20 50,20"/>
    <path d="M20,60 Q20,20 60,20"/>
    <path d="M750,20 Q780,20 780,50"/>
    <path d="M740,20 Q780,20 780,60"/>
    <path d="M20,400 Q20,430 50,430"/>
    <path d="M20,390 Q20,430 60,430"/>
    <path d="M750,430 Q780,430 780,400"/>
    <path d="M740,430 Q780,430 780,390"/>
  </g>

  <!-- Spooky ambient glow -->
  <circle cx="400" cy="200" r="180" fill="url(#spookyGlow)"/>

  <!-- Bear silhouette with skeleton pattern -->
  <g transform="translate(400, 210)" filter="url(#greenAura)">
    <!-- Bear body outline -->
    <ellipse cx="0" cy="30" rx="75" ry="85" fill="#1a1a1a" stroke="#558B2F" stroke-width="2" opacity="0.8"/>
    <!-- Bear head -->
    <circle cx="0" cy="-65" r="55" fill="#1a1a1a" stroke="#558B2F" stroke-width="2" opacity="0.8"/>
    <!-- Ears -->
    <circle cx="-40" cy="-105" r="18" fill="#1a1a1a" stroke="#558B2F" stroke-width="2" opacity="0.8"/>
    <circle cx="40" cy="-105" r="18" fill="#1a1a1a" stroke="#558B2F" stroke-width="2" opacity="0.8"/>
    <!-- Arms -->
    <ellipse cx="-80" cy="10" rx="22" ry="50" fill="#1a1a1a" stroke="#558B2F" stroke-width="2" opacity="0.8" transform="rotate(15, -80, 10)"/>
    <ellipse cx="80" cy="10" rx="22" ry="50" fill="#1a1a1a" stroke="#558B2F" stroke-width="2" opacity="0.8" transform="rotate(-15, 80, 10)"/>
    <!-- Legs -->
    <ellipse cx="-35" cy="105" rx="25" ry="30" fill="#1a1a1a" stroke="#558B2F" stroke-width="2" opacity="0.8"/>
    <ellipse cx="35" cy="105" rx="25" ry="30" fill="#1a1a1a" stroke="#558B2F" stroke-width="2" opacity="0.8"/>

    <!-- SKELETON FEATURES -->
    <!-- Eye sockets -->
    <ellipse cx="-18" cy="-72" rx="14" ry="16" fill="#0a0a0a" stroke="url(#boneGrad)" stroke-width="2.5"/>
    <ellipse cx="18" cy="-72" rx="14" ry="16" fill="#0a0a0a" stroke="url(#boneGrad)" stroke-width="2.5"/>
    <!-- Eye glow -->
    <circle cx="-18" cy="-72" r="5" fill="#558B2F" opacity="0.8" filter="url(#subtleGlow)"/>
    <circle cx="18" cy="-72" r="5" fill="#558B2F" opacity="0.8" filter="url(#subtleGlow)"/>
    <!-- Nose hole -->
    <path d="M-5,-56 L0,-50 L5,-56" fill="none" stroke="url(#boneGrad)" stroke-width="2"/>
    <!-- Teeth/jaw -->
    <g stroke="url(#boneGrad)" stroke-width="1.5" fill="none">
      <line x1="-18" y1="-42" x2="-18" y2="-36"/>
      <line x1="-12" y1="-42" x2="-12" y2="-37"/>
      <line x1="-6" y1="-42" x2="-6" y2="-38"/>
      <line x1="0" y1="-42" x2="0" y2="-38"/>
      <line x1="6" y1="-42" x2="6" y2="-38"/>
      <line x1="12" y1="-42" x2="12" y2="-37"/>
      <line x1="18" y1="-42" x2="18" y2="-36"/>
    </g>
    <line x1="-22" y1="-42" x2="22" y2="-42" stroke="url(#boneGrad)" stroke-width="2"/>

    <!-- Ribcage -->
    <g stroke="url(#boneGrad)" stroke-width="2" fill="none" opacity="0.8">
      <line x1="0" y1="-15" x2="0" y2="70" stroke-width="2.5"/>
      <path d="M0,0 Q-35,5 -45,15"/>
      <path d="M0,0 Q35,5 45,15"/>
      <path d="M0,15 Q-32,20 -42,30"/>
      <path d="M0,15 Q32,20 42,30"/>
      <path d="M0,30 Q-28,35 -38,42"/>
      <path d="M0,30 Q28,35 38,42"/>
      <path d="M0,45 Q-22,48 -32,54"/>
      <path d="M0,45 Q22,48 32,54"/>
    </g>
    <!-- Pelvis -->
    <path d="M-25,65 Q0,80 25,65" fill="none" stroke="url(#boneGrad)" stroke-width="2" opacity="0.7"/>
    <!-- Arm bones -->
    <g stroke="url(#boneGrad)" stroke-width="2" opacity="0.7">
      <line x1="-55" y1="-10" x2="-80" y2="40"/>
      <line x1="55" y1="-10" x2="80" y2="40"/>
    </g>
    <!-- Leg bones -->
    <g stroke="url(#boneGrad)" stroke-width="2" opacity="0.7">
      <line x1="-20" y1="70" x2="-35" y2="95"/>
      <line x1="20" y1="70" x2="35" y2="95"/>
    </g>
  </g>

  <!-- Floating bone decorations -->
  <g fill="url(#boneGrad)" opacity="0.3">
    <g transform="translate(100, 150) rotate(-30)">
      <rect x="-20" y="-4" width="40" height="8" rx="4"/>
      <circle cx="-20" cy="-5" r="6"/>
      <circle cx="-20" cy="5" r="6"/>
      <circle cx="20" cy="-5" r="6"/>
      <circle cx="20" cy="5" r="6"/>
    </g>
    <g transform="translate(680, 200) rotate(20)">
      <rect x="-18" y="-3.5" width="36" height="7" rx="3.5"/>
      <circle cx="-18" cy="-4.5" r="5.5"/>
      <circle cx="-18" cy="4.5" r="5.5"/>
      <circle cx="18" cy="-4.5" r="5.5"/>
      <circle cx="18" cy="4.5" r="5.5"/>
    </g>
    <g transform="translate(250, 80) rotate(45)">
      <rect x="-12" y="-2.5" width="24" height="5" rx="2.5"/>
      <circle cx="-12" cy="-3" r="4"/>
      <circle cx="-12" cy="3" r="4"/>
      <circle cx="12" cy="-3" r="4"/>
      <circle cx="12" cy="3" r="4"/>
    </g>
    <g transform="translate(620, 340) rotate(-15)">
      <rect x="-14" y="-3" width="28" height="6" rx="3"/>
      <circle cx="-14" cy="-4" r="4.5"/>
      <circle cx="-14" cy="4" r="4.5"/>
      <circle cx="14" cy="-4" r="4.5"/>
      <circle cx="14" cy="4" r="4.5"/>
    </g>
  </g>

  <!-- Small skull decorations -->
  <g opacity="0.2" fill="#9e9e9e">
    <g transform="translate(130, 350)">
      <circle cx="0" cy="0" r="12"/>
      <ellipse cx="-4" cy="-2" rx="3" ry="4" fill="#1a1a1a"/>
      <ellipse cx="4" cy="-2" rx="3" ry="4" fill="#1a1a1a"/>
      <rect x="-5" y="5" width="2" height="4" rx="1"/>
      <rect x="-1" y="5" width="2" height="4" rx="1"/>
      <rect x="3" y="5" width="2" height="4" rx="1"/>
    </g>
    <g transform="translate(650, 100)">
      <circle cx="0" cy="0" r="10"/>
      <ellipse cx="-3" cy="-2" rx="2.5" ry="3" fill="#1a1a1a"/>
      <ellipse cx="3" cy="-2" rx="2.5" ry="3" fill="#1a1a1a"/>
      <rect x="-4" y="4" width="2" height="3" rx="1"/>
      <rect x="-1" y="4" width="2" height="3" rx="1"/>
      <rect x="2" y="4" width="2" height="3" rx="1"/>
    </g>
  </g>

  <!-- Green accent line -->
  <rect x="0" y="440" width="800" height="10" fill="#558B2F" opacity="0.7"/>

  <!-- Title label -->
  <g transform="translate(400, 410)">
    <rect x="-115" y="-22" width="230" height="40" rx="20" fill="#1a1a1a" opacity="0.9"/>
    <rect x="-115" y="-22" width="230" height="40" rx="20" fill="none" stroke="#558B2F" stroke-width="1.5" opacity="0.7"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#bdbdbd" letter-spacing="3">SKELETON SKIN</text>
  </g>
</svg>