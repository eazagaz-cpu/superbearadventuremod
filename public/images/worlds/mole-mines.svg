<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="caveBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="40%" stop-color="#311B92"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="caveFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="caveCeiling" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#311B92"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4FC3F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4FC3F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#69F0AE" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#69F0AE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#69F0AE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#CE93D8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FFA726" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trackMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
    <linearGradient id="cartBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#455A64"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="crystalGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lanternFilter">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cave background -->
  <rect width="800" height="600" fill="url(#caveBg)"/>

  <!-- Ambient cave texture (subtle rock pattern) -->
  <g opacity="0.05" fill="white">
    <circle cx="100" cy="200" r="40"/><circle cx="300" cy="150" r="50"/>
    <circle cx="500" cy="250" r="45"/><circle cx="700" cy="180" r="35"/>
    <circle cx="200" cy="350" r="55"/><circle cx="600" cy="380" r="40"/>
    <circle cx="400" cy="300" r="50"/>
  </g>

  <!-- Cave ceiling -->
  <path d="M0,0 L800,0 L800,100 Q720,70 640,95 Q560,50 480,80 Q400,40 320,75 Q240,45 160,70 Q80,50 0,80Z" fill="url(#caveCeiling)"/>
  <!-- Stalactites -->
  <polygon points="100,75 115,140 85,140" fill="#37474F" opacity="0.8"/>
  <polygon points="108,75 118,125 98,125" fill="#455A64" opacity="0.6"/>
  <polygon points="250,60 262,120 238,120" fill="#37474F" opacity="0.8"/>
  <polygon points="400,50 415,130 385,130" fill="#37474F" opacity="0.9"/>
  <polygon points="405,50 413,110 397,110" fill="#455A64" opacity="0.6"/>
  <polygon points="550,65 562,115 538,115" fill="#37474F" opacity="0.7"/>
  <polygon points="680,80 692,135 668,135" fill="#37474F" opacity="0.8"/>
  <polygon points="160,80 170,110 150,110" fill="#455A64" opacity="0.5"/>
  <polygon points="600,70 608,105 592,105" fill="#455A64" opacity="0.5"/>
  <polygon points="750,90 758,120 742,120" fill="#455A64" opacity="0.6"/>

  <!-- Cave floor -->
  <path d="M0,480 Q80,460 160,475 Q240,455 320,470 Q400,450 480,465 Q560,455 640,470 Q720,460 800,475 L800,600 L0,600Z" fill="url(#caveFloor)"/>
  <!-- Stalagmites -->
  <polygon points="50,480 65,420 80,480" fill="#37474F" opacity="0.7"/>
  <polygon points="200,470 215,415 230,470" fill="#37474F" opacity="0.6"/>
  <polygon points="650,470 662,425 674,470" fill="#37474F" opacity="0.7"/>
  <polygon points="740,475 750,440 760,475" fill="#455A64" opacity="0.6"/>
  <polygon points="350,465 360,435 370,465" fill="#455A64" opacity="0.5"/>

  <!-- Blue crystal cluster (left wall) -->
  <g transform="translate(100, 300)" filter="url(#crystalGlow)">
    <circle cx="0" cy="0" r="40" fill="url(#blueGlow)"/>
    <polygon points="0,-55 12,-15 -12,-15" fill="#4FC3F7" opacity="0.9"/>
    <polygon points="-20,-40 -10,-8 -30,-8" fill="#29B6F6" opacity="0.8"/>
    <polygon points="20,-45 30,-12 10,-12" fill="#81D4FA" opacity="0.85"/>
    <polygon points="-8,-35 0,-5 -16,-5" fill="#B3E5FC" opacity="0.7"/>
    <polygon points="12,-30 20,-5 4,-5" fill="#4FC3F7" opacity="0.75"/>
    <!-- Crystal highlights -->
    <line x1="0" y1="-55" x2="-2" y2="-30" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="-45" x2="18" y2="-25" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Green crystal cluster (right wall) -->
  <g transform="translate(680, 260)" filter="url(#crystalGlow)">
    <circle cx="0" cy="0" r="35" fill="url(#greenGlow)"/>
    <polygon points="0,-50 10,-12 -10,-12" fill="#69F0AE" opacity="0.9"/>
    <polygon points="-18,-38 -8,-8 -28,-8" fill="#00E676" opacity="0.8"/>
    <polygon points="15,-42 25,-10 5,-10" fill="#A5D6A7" opacity="0.85"/>
    <polygon points="8,-30 15,-5 1,-5" fill="#69F0AE" opacity="0.7"/>
    <line x1="0" y1="-50" x2="-1" y2="-28" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="-42" x2="14" y2="-22" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Small purple crystal (ceiling) -->
  <g transform="translate(400, 140) rotate(180)" filter="url(#crystalGlow)">
    <circle cx="0" cy="0" r="25" fill="url(#purpleGlow)"/>
    <polygon points="0,-35 8,-8 -8,-8" fill="#CE93D8" opacity="0.8"/>
    <polygon points="-12,-25 -5,-5 -19,-5" fill="#BA68C8" opacity="0.7"/>
    <polygon points="12,-28 18,-8 6,-8" fill="#E1BEE7" opacity="0.75"/>
  </g>

  <!-- Small blue crystal (floor right) -->
  <g transform="translate(550, 455)" filter="url(#crystalGlow)">
    <circle cx="0" cy="0" r="20" fill="url(#blueGlow)" opacity="0.5"/>
    <polygon points="0,-28 6,-5 -6,-5" fill="#4FC3F7" opacity="0.7"/>
    <polygon points="-10,-20 -5,-3 -15,-3" fill="#29B6F6" opacity="0.6"/>
    <polygon points="8,-22 14,-5 2,-5" fill="#81D4FA" opacity="0.65"/>
  </g>

  <!-- Small green crystals scattered -->
  <g filter="url(#crystalGlow)">
    <circle cx="300" cy="440" r="12" fill="url(#greenGlow)" opacity="0.4"/>
    <polygon points="300,425 305,440 295,440" fill="#69F0AE" opacity="0.6"/>
    <polygon points="290,430 295,442 285,442" fill="#00E676" opacity="0.5"/>
  </g>

  <!-- Mine cart tracks -->
  <g>
    <!-- Track base (perspective) -->
    <line x1="50" y1="490" x2="750" y2="475" stroke="url(#trackMetal)" stroke-width="4"/>
    <line x1="50" y1="500" x2="750" y2="485" stroke="url(#trackMetal)" stroke-width="4"/>
    <!-- Track ties (wooden planks) -->
    <g fill="#5D4037" opacity="0.7">
      <rect x="100" y="488" width="30" height="6" rx="1" transform="rotate(-0.5, 115, 491)"/>
      <rect x="160" y="487" width="30" height="6" rx="1" transform="rotate(-0.5, 175, 490)"/>
      <rect x="220" y="486" width="30" height="6" rx="1" transform="rotate(-0.5, 235, 489)"/>
      <rect x="280" y="485" width="30" height="6" rx="1" transform="rotate(-0.5, 295, 488)"/>
      <rect x="340" y="484" width="30" height="6" rx="1" transform="rotate(-0.5, 355, 487)"/>
      <rect x="400" y="483" width="30" height="6" rx="1" transform="rotate(-0.5, 415, 486)"/>
      <rect x="460" y="482" width="30" height="6" rx="1" transform="rotate(-0.5, 475, 485)"/>
      <rect x="520" y="481" width="30" height="6" rx="1" transform="rotate(-0.5, 535, 484)"/>
      <rect x="580" y="480" width="30" height="6" rx="1" transform="rotate(-0.5, 595, 483)"/>
      <rect x="640" y="479" width="30" height="6" rx="1" transform="rotate(-0.5, 655, 482)"/>
      <rect x="700" y="478" width="30" height="6" rx="1" transform="rotate(-0.5, 715, 481)"/>
    </g>
  </g>

  <!-- Mine cart -->
  <g transform="translate(400, 450)" filter="url(#shadow)">
    <!-- Cart body -->
    <polygon points="-45,-25 -55,15 55,15 45,-25" fill="url(#cartBody)"/>
    <polygon points="-45,-25 -55,15 55,15 45,-25" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <!-- Rivet details -->
    <circle cx="-40" cy="-18" r="2" fill="#90A4AE" opacity="0.6"/>
    <circle cx="40" cy="-18" r="2" fill="#90A4AE" opacity="0.6"/>
    <circle cx="-48" cy="8" r="2" fill="#90A4AE" opacity="0.6"/>
    <circle cx="48" cy="8" r="2" fill="#90A4AE" opacity="0.6"/>
    <!-- Gems inside cart -->
    <polygon points="-15,-18 -8,-5 -22,-5" fill="#4FC3F7" opacity="0.9"/>
    <polygon points="5,-15 12,-3 -2,-3" fill="#69F0AE" opacity="0.9"/>
    <polygon points="20,-12 26,-2 14,-2" fill="#CE93D8" opacity="0.85"/>
    <polygon points="-5,-10 0,0 -10,0" fill="#FFD54F" opacity="0.9"/>
    <polygon points="30,-8 35,0 25,0" fill="#EF5350" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="-30" cy="20" r="10" fill="#455A64" stroke="#78909C" stroke-width="2.5"/>
    <circle cx="-30" cy="20" r="3" fill="#78909C"/>
    <circle cx="30" cy="20" r="10" fill="#455A64" stroke="#78909C" stroke-width="2.5"/>
    <circle cx="30" cy="20" r="3" fill="#78909C"/>
    <!-- Wheel spokes -->
    <g stroke="#607D8B" stroke-width="1" opacity="0.5">
      <line x1="-30" y1="11" x2="-30" y2="29"/><line x1="-21" y1="20" x2="-39" y2="20"/>
      <line x1="30" y1="11" x2="30" y2="29"/><line x1="21" y1="20" x2="39" y2="20"/>
    </g>
  </g>

  <!-- Lantern 1 (hanging from ceiling, left) -->
  <g transform="translate(200, 130)" filter="url(#lanternFilter)">
    <!-- Chain -->
    <line x1="0" y1="-60" x2="0" y2="0" stroke="#78909C" stroke-width="1.5"/>
    <!-- Glow -->
    <circle cx="0" cy="8" r="45" fill="url(#lanternGlow)"/>
    <!-- Lantern body -->
    <rect x="-10" y="-5" width="20" height="30" rx="3" fill="#FF8F00" filter="url(#shadow)"/>
    <rect x="-8" y="-2" width="16" height="24" rx="2" fill="#FFD54F" opacity="0.6"/>
    <!-- Top cap -->
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#5D4037"/>
    <!-- Handle -->
    <path d="M-6,-8 Q0,-15 6,-8" stroke="#5D4037" stroke-width="2" fill="none"/>
    <!-- Flame -->
    <ellipse cx="0" cy="10" rx="4" ry="8" fill="#FFEE58" opacity="0.8"/>
    <ellipse cx="0" cy="8" rx="2" ry="5" fill="white" opacity="0.5"/>
  </g>

  <!-- Lantern 2 (on wall, right) -->
  <g transform="translate(620, 200)" filter="url(#lanternFilter)">
    <line x1="0" y1="-40" x2="0" y2="0" stroke="#78909C" stroke-width="1.5"/>
    <circle cx="0" cy="8" r="35" fill="url(#lanternGlow)"/>
    <rect x="-8" y="-3" width="16" height="22" rx="2.5" fill="#FF8F00" filter="url(#shadow)"/>
    <rect x="-6" y="0" width="12" height="18" rx="2" fill="#FFD54F" opacity="0.5"/>
    <rect x="-10" y="-6" width="20" height="4" rx="2" fill="#5D4037"/>
    <path d="M-5,-6 Q0,-12 5,-6" stroke="#5D4037" stroke-width="1.5" fill="none"/>
    <ellipse cx="0" cy="8" rx="3" ry="6" fill="#FFEE58" opacity="0.7"/>
    <ellipse cx="0" cy="6" rx="1.5" ry="4" fill="white" opacity="0.4"/>
  </g>

  <!-- Lantern 3 (small, distant) -->
  <g transform="translate(450, 180)" opacity="0.6">
    <circle cx="0" cy="0" r="20" fill="url(#lanternGlow)"/>
    <rect x="-5" y="-5" width="10" height="14" rx="2" fill="#FF8F00"/>
    <rect x="-4" y="-3" width="8" height="10" rx="1.5" fill="#FFD54F" opacity="0.5"/>
    <ellipse cx="0" cy="3" rx="2" ry="4" fill="#FFEE58" opacity="0.6"/>
  </g>

  <!-- Cave entrance light (distant tunnel opening) -->
  <g transform="translate(750, 340)">
    <ellipse cx="0" cy="0" rx="40" ry="60" fill="#4A148C"/>
    <ellipse cx="0" cy="0" rx="25" ry="40" fill="#6A1B9A" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="12" ry="22" fill="#7B1FA2" opacity="0.3"/>
  </g>

  <!-- Scattered gems on floor -->
  <g filter="url(#crystalGlow)">
    <polygon points="150,480 157,495 143,495" fill="#4FC3F7" opacity="0.7"/>
    <polygon points="470,475 476,488 464,488" fill="#FFD54F" opacity="0.6"/>
    <polygon points="250,485 255,495 245,495" fill="#CE93D8" opacity="0.5"/>
  </g>

  <!-- Dust/particle effects -->
  <g fill="white" opacity="0.2">
    <circle cx="150" cy="200" r="1.5"/><circle cx="300" cy="250" r="1"/>
    <circle cx="450" cy="300" r="1.5"/><circle cx="550" cy="200" r="1"/>
    <circle cx="350" cy="350" r="1.5"/><circle cx="200" cy="380" r="1"/>
    <circle cx="600" cy="350" r="1.5"/><circle cx="500" cy="400" r="1"/>
    <circle cx="100" cy="400" r="1"/><circle cx="700" cy="350" r="1.5"/>
  </g>

  <!-- Cobwebs in corner -->
  <g opacity="0.1" stroke="white" stroke-width="0.5" fill="none">
    <path d="M0,0 Q30,20 60,0"/>
    <path d="M0,0 Q20,30 0,60"/>
    <path d="M0,0 Q35,35 60,60"/>
    <path d="M0,20 Q30,25 60,20"/>
    <path d="M20,0 Q25,30 20,60"/>
  </g>

  <!-- World name banner -->
  <rect x="265" y="548" width="270" height="42" rx="21" fill="#4A148C" opacity="0.85"/>
  <text x="400" y="576" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="26" fill="#B3E5FC" letter-spacing="2">MOLE MINES</text>
</svg>