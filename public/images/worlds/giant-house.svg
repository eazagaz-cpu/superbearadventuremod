<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Floor -->
  <rect x="0" y="230" width="400" height="70" fill="url(#wood)"/>
  <!-- Giant table legs -->
  <rect x="30" y="30" width="35" height="210" fill="#6D4C41" filter="url(#s)"/>
  <rect x="330" y="30" width="35" height="210" fill="#6D4C41" filter="url(#s)"/>
  <!-- Table top -->
  <rect x="0" y="15" width="400" height="25" fill="#8D6E63" filter="url(#s)"/>
  <!-- Giant cup -->
  <g transform="translate(120, 5)" filter="url(#s)">
    <rect x="-22" y="-12" width="44" height="35" rx="3" fill="#E0E0E0"/>
    <rect x="22" y="-2" width="12" height="20" rx="6" fill="none" stroke="#BDBDBD" stroke-width="3"/>
    <ellipse cx="0" cy="-12" rx="22" ry="5" fill="#EEE"/>
    <ellipse cx="0" cy="-8" rx="16" ry="4" fill="#795548"/>
  </g>
  <!-- Tiny bear -->
  <g transform="translate(200, 215)" filter="url(#s)">
    <circle cx="0" cy="-8" r="7" fill="#8D6E63"/>
    <circle cx="-5" cy="-12" r="2.5" fill="#795548"/>
    <circle cx="5" cy="-12" r="2.5" fill="#795548"/>
    <circle cx="-2" cy="-9" r="1.5" fill="white"/>
    <circle cx="2" cy="-9" r="1.5" fill="white"/>
    <ellipse cx="0" cy="3" rx="5" ry="8" fill="#795548"/>
    <text x="0" y="-22" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="12" fill="#FFC107">!</text>
  </g>
  <!-- Giant pencil -->
  <g transform="translate(310, 240) rotate(-10)" filter="url(#s)">
    <rect x="-50" y="-5" width="100" height="10" rx="2" fill="#FFC107"/>
    <polygon points="50,-5 62,0 50,5" fill="#FFE082"/>
    <polygon points="58,-2 62,0 58,2" fill="#333"/>
    <rect x="-50" y="-5" width="12" height="10" rx="2" fill="#E0E0E0"/>
  </g>
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#EFEBE9">Giant House</text>
</svg>