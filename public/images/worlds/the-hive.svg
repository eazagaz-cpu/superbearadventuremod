<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Honeycomb -->
  <g fill="none" stroke="#FFD54F" stroke-width="1.5" opacity="0.3">
    <polygon points="100,40 120,28 140,40 140,64 120,76 100,64"/>
    <polygon points="140,40 160,28 180,40 180,64 160,76 140,64"/>
    <polygon points="180,40 200,28 220,40 220,64 200,76 180,64"/>
    <polygon points="220,40 240,28 260,40 260,64 240,76 220,64"/>
    <polygon points="260,40 280,28 300,40 300,64 280,76 260,64"/>
    <polygon points="120,76 140,64 160,76 160,100 140,112 120,100"/>
    <polygon points="160,76 180,64 200,76 200,100 180,112 160,100"/>
    <polygon points="200,76 220,64 240,76 240,100 220,112 200,100"/>
    <polygon points="240,76 260,64 280,76 280,100 260,112 240,100"/>
  </g>
  <!-- Filled cells -->
  <polygon points="180,112 200,100 220,112 220,136 200,148 180,136" fill="url(#honey)" opacity="0.7" filter="url(#s)"/>
  <polygon points="200,148 220,136 240,148 240,172 220,184 200,172" fill="url(#honey)" opacity="0.6" filter="url(#s)"/>
  <!-- Bees -->
  <g filter="url(#s)">
    <g transform="translate(150, 160)">
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#FFC107"/>
      <rect x="-6" y="-8" width="3" height="16" rx="1.5" fill="#333" opacity="0.6"/>
      <rect x="2" y="-8" width="3" height="16" rx="1.5" fill="#333" opacity="0.6"/>
      <ellipse cx="-6" cy="-10" rx="8" ry="4" fill="white" opacity="0.4"/>
      <ellipse cx="6" cy="-10" rx="8" ry="4" fill="white" opacity="0.4"/>
    </g>
    <g transform="translate(280, 180)">
      <ellipse cx="0" cy="0" rx="10" ry="6" fill="#FFC107"/>
      <rect x="-5" y="-6" width="2.5" height="12" rx="1" fill="#333" opacity="0.6"/>
      <rect x="2" y="-6" width="2.5" height="12" rx="1" fill="#333" opacity="0.6"/>
      <ellipse cx="-5" cy="-8" rx="6" ry="3" fill="white" opacity="0.4"/>
      <ellipse cx="5" cy="-8" rx="6" ry="3" fill="white" opacity="0.4"/>
    </g>
  </g>
  <!-- Honey drips -->
  <g fill="#FFA000" opacity="0.5">
    <ellipse cx="200" cy="230" rx="5" ry="8"/>
    <ellipse cx="230" cy="240" rx="4" ry="7"/>
    <ellipse cx="170" cy="245" rx="4.5" ry="6"/>
  </g>
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#FFF8E1">The Hive</text>
</svg>