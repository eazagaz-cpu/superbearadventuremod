<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="palmTrunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="sunGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Sun with glow -->
  <circle cx="680" cy="80" r="60" fill="#FFF9C4" opacity="0.3" filter="url(#glow)"/>
  <circle cx="680" cy="80" r="45" fill="#FFF59D" opacity="0.5"/>
  <circle cx="680" cy="80" r="32" fill="#FFD54F" opacity="0.9"/>

  <!-- Clouds -->
  <g opacity="0.8">
    <ellipse cx="120" cy="70" rx="60" ry="22" fill="white"/>
    <ellipse cx="155" cy="58" rx="45" ry="18" fill="white"/>
    <ellipse cx="85" cy="62" rx="35" ry="15" fill="white"/>
    <ellipse cx="350" cy="50" rx="50" ry="18" fill="white" opacity="0.7"/>
    <ellipse cx="380" cy="42" rx="35" ry="14" fill="white" opacity="0.7"/>
    <ellipse cx="550" cy="90" rx="55" ry="20" fill="white" opacity="0.6"/>
    <ellipse cx="580" cy="80" rx="40" ry="16" fill="white" opacity="0.6"/>
  </g>

  <!-- Distant hills -->
  <ellipse cx="200" cy="310" rx="300" ry="120" fill="#A5D6A7"/>
  <ellipse cx="600" cy="320" rx="280" ry="110" fill="#81C784"/>
  <ellipse cx="400" cy="330" rx="250" ry="100" fill="url(#hill2)"/>

  <!-- Ocean -->
  <rect x="0" y="380" width="800" height="120" fill="url(#ocean)" opacity="0.8"/>
  <!-- Ocean waves -->
  <path d="M0,400 Q50,390 100,400 Q150,410 200,400 Q250,390 300,400 Q350,410 400,400 Q450,390 500,400 Q550,410 600,400 Q650,390 700,400 Q750,410 800,400 L800,500 L0,500Z" fill="#039BE5" opacity="0.3"/>
  <path d="M0,420 Q40,412 80,420 Q120,428 160,420 Q200,412 240,420 Q280,428 320,420 Q360,412 400,420 Q440,428 480,420 Q520,412 560,420 Q600,428 640,420 Q680,412 720,420 Q760,428 800,420 L800,500 L0,500Z" fill="#0277BD" opacity="0.2"/>

  <!-- Beach -->
  <path d="M0,460 Q200,430 400,445 Q600,460 800,440 L800,600 L0,600Z" fill="url(#sand)"/>
  <!-- Beach texture dots -->
  <g fill="#FFD54F" opacity="0.5">
    <circle cx="100" cy="500" r="2"/><circle cx="200" cy="520" r="1.5"/><circle cx="300" cy="490" r="2"/>
    <circle cx="450" cy="510" r="1.5"/><circle cx="550" cy="495" r="2"/><circle cx="650" cy="515" r="1.5"/>
    <circle cx="150" cy="530" r="1.5"/><circle cx="350" cy="540" r="2"/><circle cx="500" cy="545" r="1.5"/>
    <circle cx="700" cy="530" r="2"/><circle cx="250" cy="555" r="1.5"/><circle cx="600" cy="550" r="2"/>
  </g>

  <!-- Houses on hill -->
  <!-- House 1 - large -->
  <g filter="url(#shadow)">
    <rect x="180" y="290" width="70" height="55" rx="4" fill="#FFF3E0"/>
    <rect x="180" y="290" width="70" height="55" rx="4" fill="none" stroke="#FFCC80" stroke-width="1"/>
    <polygon points="175,295 215,260 255,295" fill="url(#roof)"/>
    <rect x="203" y="318" width="18" height="27" rx="2" fill="#5D4037"/>
    <circle cx="217" cy="332" r="2" fill="#FFD54F"/>
    <rect x="185" y="305" width="14" height="14" rx="1" fill="#B3E5FC"/>
    <line x1="192" y1="305" x2="192" y2="319" stroke="#90CAF9" stroke-width="1"/>
    <line x1="185" y1="312" x2="199" y2="312" stroke="#90CAF9" stroke-width="1"/>
    <rect x="230" y="305" width="14" height="14" rx="1" fill="#B3E5FC"/>
    <line x1="237" y1="305" x2="237" y2="319" stroke="#90CAF9" stroke-width="1"/>
    <line x1="230" y1="312" x2="244" y2="312" stroke="#90CAF9" stroke-width="1"/>
  </g>

  <!-- House 2 - medium -->
  <g filter="url(#shadow)">
    <rect x="310" y="300" width="55" height="45" rx="4" fill="#FFECB3"/>
    <polygon points="305,304 337,270 370,304" fill="url(#roof)"/>
    <rect x="328" y="322" width="14" height="23" rx="2" fill="#5D4037"/>
    <circle cx="339" cy="334" r="1.5" fill="#FFD54F"/>
    <rect x="314" y="310" width="12" height="12" rx="1" fill="#B3E5FC"/>
    <line x1="320" y1="310" x2="320" y2="322" stroke="#90CAF9" stroke-width="1"/>
    <line x1="314" y1="316" x2="326" y2="316" stroke="#90CAF9" stroke-width="1"/>
  </g>

  <!-- House 3 - small distant -->
  <g filter="url(#softShadow)">
    <rect x="440" y="310" width="45" height="38" rx="3" fill="#FFF8E1"/>
    <polygon points="436,313 462,282 490,313" fill="#E53935"/>
    <rect x="456" y="328" width="12" height="20" rx="2" fill="#5D4037"/>
    <rect x="444" y="318" width="10" height="10" rx="1" fill="#B3E5FC"/>
  </g>

  <!-- Palm tree 1 (left beach) -->
  <g filter="url(#softShadow)">
    <path d="M100,460 Q95,400 105,340" stroke="#8D6E63" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M105,340 Q80,330 50,350" stroke="#2E7D32" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M105,340 Q130,325 160,340" stroke="#2E7D32" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M105,340 Q90,310 75,310" stroke="#388E3C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M105,340 Q120,308 140,310" stroke="#388E3C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M105,340 Q105,305 105,295" stroke="#43A047" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="65" cy="345" rx="20" ry="8" fill="#1B5E20" opacity="0.6"/>
    <ellipse cx="145" cy="338" rx="18" ry="7" fill="#1B5E20" opacity="0.6"/>
    <ellipse cx="82" cy="315" rx="15" ry="6" fill="#2E7D32" opacity="0.5"/>
    <ellipse cx="132" cy="312" rx="15" ry="6" fill="#2E7D32" opacity="0.5"/>
  </g>

  <!-- Palm tree 2 (right beach) -->
  <g filter="url(#softShadow)">
    <path d="M680,465 Q690,410 685,355" stroke="#795548" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M685,355 Q660,342 630,360" stroke="#2E7D32" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M685,355 Q710,340 740,355" stroke="#2E7D32" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M685,355 Q670,325 655,320" stroke="#388E3C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M685,355 Q700,322 720,320" stroke="#388E3C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M685,355 Q685,320 685,310" stroke="#43A047" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="645" cy="356" rx="18" ry="7" fill="#1B5E20" opacity="0.6"/>
    <ellipse cx="725" cy="352" rx="17" ry="6" fill="#1B5E20" opacity="0.6"/>
  </g>

  <!-- Small palm tree 3 (center) -->
  <g filter="url(#softShadow)">
    <path d="M420,470 Q415,430 420,390" stroke="#8D6E63" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M420,390 Q400,382 380,395" stroke="#388E3C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M420,390 Q440,378 460,390" stroke="#388E3C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M420,390 Q420,365 420,355" stroke="#43A047" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="393" cy="392" rx="15" ry="5" fill="#1B5E20" opacity="0.5"/>
    <ellipse cx="447" cy="388" rx="14" ry="5" fill="#1B5E20" opacity="0.5"/>
  </g>

  <!-- Turtle 1 - large, on beach -->
  <g transform="translate(300, 490)" filter="url(#shadow)">
    <ellipse cx="0" cy="5" rx="32" ry="20" fill="#2E7D32"/>
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="#4CAF50"/>
    <!-- Shell pattern -->
    <path d="M-10,-8 L-5,10" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
    <path d="M10,-8 L5,10" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
    <path d="M0,-12 L0,12" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="14" ry="8" fill="none" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>
    <!-- Head -->
    <ellipse cx="-30" cy="2" rx="10" ry="8" fill="#388E3C"/>
    <circle cx="-35" cy="-1" r="2.5" fill="#1B5E20"/>
    <circle cx="-35" cy="-1" r="1" fill="white"/>
    <!-- Smile -->
    <path d="M-36,4 Q-33,7 -30,4" stroke="#1B5E20" stroke-width="1" fill="none"/>
    <!-- Legs -->
    <ellipse cx="-18" cy="18" rx="8" ry="5" fill="#388E3C"/>
    <ellipse cx="18" cy="18" rx="8" ry="5" fill="#388E3C"/>
    <ellipse cx="-15" cy="-12" rx="6" ry="4" fill="#388E3C"/>
    <ellipse cx="15" cy="-12" rx="6" ry="4" fill="#388E3C"/>
  </g>

  <!-- Turtle 2 - small, near water -->
  <g transform="translate(550, 470)" filter="url(#softShadow)">
    <ellipse cx="0" cy="4" rx="22" ry="14" fill="#2E7D32"/>
    <ellipse cx="0" cy="0" rx="18" ry="11" fill="#66BB6A"/>
    <path d="M-6,-5 L-3,7" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>
    <path d="M6,-5 L3,7" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>
    <ellipse cx="20" cy="1" rx="7" ry="5.5" fill="#4CAF50"/>
    <circle cx="24" cy="-1" r="2" fill="#1B5E20"/>
    <circle cx="24" cy="-1" r="0.8" fill="white"/>
    <ellipse cx="-12" cy="12" rx="6" ry="4" fill="#4CAF50"/>
    <ellipse cx="12" cy="12" rx="6" ry="4" fill="#4CAF50"/>
  </g>

  <!-- Turtle 3 - baby, on sand -->
  <g transform="translate(200, 520)" filter="url(#softShadow)">
    <ellipse cx="0" cy="3" rx="14" ry="9" fill="#388E3C"/>
    <ellipse cx="0" cy="0" rx="11" ry="7" fill="#81C784"/>
    <ellipse cx="-13" cy="1" rx="5" ry="4" fill="#4CAF50"/>
    <circle cx="-15" cy="-1" r="1.5" fill="#1B5E20"/>
    <ellipse cx="-8" cy="8" rx="4" ry="3" fill="#4CAF50"/>
    <ellipse cx="8" cy="8" rx="4" ry="3" fill="#4CAF50"/>
  </g>

  <!-- Beach shells and starfish -->
  <g opacity="0.7">
    <!-- Starfish -->
    <g transform="translate(480, 530) rotate(15)">
      <polygon points="0,-10 3,-3 10,-3 4,2 6,10 0,5 -6,10 -4,2 -10,-3 -3,-3" fill="#FF7043"/>
    </g>
    <!-- Shells -->
    <ellipse cx="360" cy="545" rx="6" ry="4" fill="#FFCC80"/>
    <ellipse cx="620" cy="540" rx="5" ry="3.5" fill="#FFE0B2"/>
    <ellipse cx="150" cy="550" rx="5" ry="3" fill="#FFCC80"/>
  </g>

  <!-- Seagulls in sky -->
  <g stroke="#546E7A" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M500,120 Q505,115 510,118 Q515,115 520,120"/>
    <path d="M530,100 Q534,96 538,99 Q542,96 546,100"/>
    <path d="M470,140 Q474,136 478,139 Q482,136 486,140"/>
  </g>

  <!-- Light reflections on water -->
  <g opacity="0.3" fill="white">
    <ellipse cx="200" cy="410" rx="30" ry="2"/>
    <ellipse cx="500" cy="425" rx="25" ry="1.5"/>
    <ellipse cx="350" cy="415" rx="20" ry="1.5"/>
    <ellipse cx="650" cy="405" rx="22" ry="1.5"/>
  </g>

  <!-- World name banner -->
  <rect x="250" y="552" width="300" height="40" rx="20" fill="#1B5E20" opacity="0.85"/>
  <text x="400" y="579" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="26" fill="white" letter-spacing="2">TURTLETOWN</text>
</svg>