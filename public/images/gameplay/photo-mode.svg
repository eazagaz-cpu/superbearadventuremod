<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgPhoto" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="30%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="cameraBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="flareGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#C5E1A5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="apertureGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="photoGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="photoShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="flareBlur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgPhoto)"/>

  <!-- Photo frame border -->
  <rect x="50" y="30" width="700" height="340" rx="6" fill="none" stroke="#fff" stroke-width="4" opacity="0.15"/>
  <rect x="55" y="35" width="690" height="330" rx="5" fill="none" stroke="#fff" stroke-width="1" opacity="0.08"/>

  <!-- Viewfinder corners -->
  <g stroke="#fff" stroke-width="3" opacity="0.7">
    <path d="M80,60 L80,90"/><path d="M80,60 L110,60"/>
    <path d="M720,60 L720,90"/><path d="M720,60 L690,60"/>
    <path d="M80,340 L80,310"/><path d="M80,340 L110,340"/>
    <path d="M720,340 L720,310"/><path d="M720,340 L690,340"/>
  </g>

  <!-- Grid overlay (rule of thirds) -->
  <g stroke="#fff" stroke-width="0.5" opacity="0.12">
    <line x1="277" y1="40" x2="277" y2="360"/>
    <line x1="523" y1="40" x2="523" y2="360"/>
    <line x1="60" y1="147" x2="740" y2="147"/>
    <line x1="60" y1="253" x2="740" y2="253"/>
  </g>
  <text x="730" y="55" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#fff" opacity="0.3">GRID 3x3</text>

  <!-- Central camera icon -->
  <g transform="translate(400, 195)" filter="url(#photoShadow)">
    <!-- Camera body -->
    <rect x="-70" y="-40" width="140" height="85" rx="12" fill="url(#cameraBody)" stroke="#555" stroke-width="1.5"/>
    <!-- Top bump -->
    <rect x="-25" y="-52" width="50" height="16" rx="5" fill="#333" stroke="#444" stroke-width="1"/>
    <!-- Flash -->
    <rect x="8" y="-48" width="14" height="8" rx="2" fill="#558B2F" opacity="0.7"/>

    <!-- Lens rings -->
    <circle cx="0" cy="5" r="32" fill="#333" stroke="#555" stroke-width="2"/>
    <circle cx="0" cy="5" r="28" fill="#222" stroke="#444" stroke-width="1.5"/>
    <!-- Lens glass -->
    <circle cx="0" cy="5" r="24" fill="url(#lensGrad)" opacity="0.8"/>

    <!-- Aperture blades -->
    <g opacity="0.4">
      <path d="M0,-15 L10,-10 L8,0 L-2,-5 Z" fill="url(#apertureGrad)" stroke="#1B5E20" stroke-width="0.5"/>
      <path d="M10,-10 L15,2 L8,10 L8,0 Z" fill="url(#apertureGrad)" stroke="#1B5E20" stroke-width="0.5"/>
      <path d="M15,2 L10,14 L0,12 L8,10 Z" fill="url(#apertureGrad)" stroke="#1B5E20" stroke-width="0.5"/>
      <path d="M10,14 L-2,15 L-8,5 L0,12 Z" fill="url(#apertureGrad)" stroke="#1B5E20" stroke-width="0.5"/>
      <path d="M-2,15 L-15,8 L-10,-2 L-8,5 Z" fill="url(#apertureGrad)" stroke="#1B5E20" stroke-width="0.5"/>
      <path d="M-15,8 L-10,-8 L0,-15 L-10,-2 Z" fill="url(#apertureGrad)" stroke="#1B5E20" stroke-width="0.5"/>
    </g>

    <!-- Lens highlights -->
    <circle cx="0" cy="5" r="8" fill="#0288D1" opacity="0.3"/>
    <circle cx="-6" cy="-2" r="4" fill="#fff" opacity="0.25"/>

    <!-- Shutter button -->
    <circle cx="50" cy="-42" r="8" fill="#558B2F" stroke="#8BC34A" stroke-width="1.5"/>
    <circle cx="50" cy="-42" r="4" fill="#8BC34A"/>

    <!-- Mode dial -->
    <circle cx="-40" cy="-42" r="7" fill="#444" stroke="#555" stroke-width="1"/>
    <line x1="-40" y1="-48" x2="-40" y2="-44" stroke="#8BC34A" stroke-width="1.5"/>

    <!-- Indicator LED -->
    <circle cx="55" cy="-28" r="3" fill="#F44336" opacity="0.7"/>

    <!-- Grip texture -->
    <g opacity="0.15">
      <line x1="48" y1="-20" x2="48" y2="30" stroke="#666" stroke-width="1"/>
      <line x1="52" y1="-20" x2="52" y2="30" stroke="#666" stroke-width="1"/>
      <line x1="56" y1="-18" x2="56" y2="28" stroke="#666" stroke-width="1"/>
      <line x1="60" y1="-15" x2="60" y2="25" stroke="#666" stroke-width="1"/>
    </g>
  </g>

  <!-- Lens flare -->
  <g filter="url(#flareBlur)" opacity="0.35">
    <circle cx="340" cy="160" r="40" fill="url(#flareGrad)"/>
  </g>
  <g opacity="0.15">
    <line x1="330" y1="150" x2="500" y2="240" stroke="#C5E1A5" stroke-width="2"/>
    <line x1="330" y1="155" x2="520" y2="250" stroke="#fff" stroke-width="1"/>
    <circle cx="460" cy="230" r="6" fill="#8BC34A" opacity="0.3"/>
    <circle cx="490" cy="245" r="4" fill="#C5E1A5" opacity="0.2"/>
    <circle cx="350" cy="170" r="8" fill="#fff" opacity="0.15"/>
  </g>

  <!-- PHOTO MODE title -->
  <g transform="translate(400, 30)">
    <rect x="-80" y="-14" width="160" height="28" rx="6" fill="#000" opacity="0.5" stroke="#8BC34A" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#8BC34A" letter-spacing="3">PHOTO MODE</text>
  </g>

  <!-- HUD elements -->
  <text x="100" y="355" font-family="'Courier New', monospace" font-size="11" fill="#8BC34A" opacity="0.5">1920x1080</text>
  <text x="700" y="355" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8BC34A" opacity="0.5">Filter: Vivid</text>

  <!-- Zoom slider -->
  <g transform="translate(100, 375)">
    <rect x="0" y="-6" width="80" height="8" rx="4" fill="#1B5E20" opacity="0.6"/>
    <rect x="0" y="-6" width="40" height="8" rx="4" fill="#558B2F"/>
    <circle cx="40" cy="-2" r="5" fill="#8BC34A"/>
    <text x="95" y="2" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#C5E1A5" opacity="0.6">1.5x</text>
  </g>

  <!-- Brightness -->
  <g transform="translate(630, 375)">
    <circle cx="0" cy="-2" r="4" fill="none" stroke="#8BC34A" stroke-width="1" opacity="0.5"/>
    <g stroke="#8BC34A" stroke-width="0.8" opacity="0.4">
      <line x1="0" y1="-9" x2="0" y2="-11"/><line x1="0" y1="5" x2="0" y2="7"/>
      <line x1="-7" y1="-2" x2="-9" y2="-2"/><line x1="7" y1="-2" x2="9" y2="-2"/>
    </g>
    <text x="18" y="2" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#C5E1A5" opacity="0.6">+0.5</text>
  </g>

  <!-- Thumbnail gallery -->
  <g transform="translate(400, 425)">
    <rect x="-200" y="-18" width="400" height="36" rx="6" fill="#000" opacity="0.5"/>

    <rect x="-185" y="-12" width="42" height="24" rx="3" fill="#33691E" stroke="#558B2F" stroke-width="1"/>
    <polygon points="-175,-2 -170,6 -165,-2" fill="#689F38" opacity="0.6"/>
    <circle cx="-168" cy="-4" r="3" fill="#FFF176" opacity="0.5"/>

    <rect x="-135" y="-12" width="42" height="24" rx="3" fill="#1B5E20" stroke="#558B2F" stroke-width="1"/>
    <circle cx="-114" cy="0" r="6" fill="#81D4FA" opacity="0.4"/>
    <path d="M-128,-4 L-122,4 L-116,-2 L-108,6" fill="none" stroke="#8BC34A" stroke-width="1" opacity="0.5"/>

    <!-- Active thumbnail -->
    <rect x="-85" y="-12" width="42" height="24" rx="3" fill="#2E7D32" stroke="#8BC34A" stroke-width="2"/>
    <polygon points="-70,6 -76,-4 -64,-4" fill="#558B2F" opacity="0.7"/>
    <circle cx="-72" cy="-4" r="3" fill="#FFF176" opacity="0.6"/>
    <rect x="-85" y="14" width="42" height="2" rx="1" fill="#8BC34A"/>

    <rect x="-35" y="-12" width="42" height="24" rx="3" fill="#1B5E20" stroke="#558B2F" stroke-width="1"/>
    <rect x="-28" y="-4" width="12" height="14" rx="2" fill="#5D4037" opacity="0.4"/>
    <circle cx="-8" cy="-2" r="4" fill="#FFC107" opacity="0.3"/>

    <rect x="15" y="-12" width="42" height="24" rx="3" fill="#33691E" stroke="#558B2F" stroke-width="1"/>
    <path d="M25,6 L30,-6 L36,0 L42,6" fill="none" stroke="#A5D6A7" stroke-width="1" opacity="0.5"/>

    <rect x="65" y="-12" width="42" height="24" rx="3" fill="#1B5E20" stroke="#558B2F" stroke-width="1"/>
    <circle cx="86" cy="0" r="7" fill="#81D4FA" opacity="0.3"/>

    <rect x="115" y="-12" width="42" height="24" rx="3" fill="#2E7D32" stroke="#558B2F" stroke-width="1"/>
    <polygon points="136,4 130,-4 142,-4" fill="#689F38" opacity="0.5"/>

    <rect x="165" y="-12" width="20" height="24" rx="3" fill="#1B5E20" stroke="#558B2F" stroke-width="0.5" opacity="0.5"/>

    <text x="195" y="5" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#689F38" opacity="0.7">24</text>
  </g>

  <!-- Center crosshair -->
  <g transform="translate(400, 195)" opacity="0.2">
    <line x1="-15" y1="0" x2="-5" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="5" y1="0" x2="15" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="-15" x2="0" y2="-5" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="5" x2="0" y2="15" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Recording indicator -->
  <g transform="translate(730, 50)">
    <circle cx="0" cy="0" r="5" fill="#F44336" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="-15" y="0" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#F44336" opacity="0.6">REC</text>
  </g>
</svg>