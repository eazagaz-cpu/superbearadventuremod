<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Version timeline -->
  <g filter="url(#s)">
    <!-- Vertical line -->
    <line x1="250" y1="60" x2="250" y2="340" stroke="#8BC34A" stroke-width="3"/>
    <!-- Version entries -->
    <g>
      <circle cx="250" cy="80" r="10" fill="#8BC34A"/>
      <text x="250" y="85" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#1B5E20">11</text>
      <rect x="280" y="65" width="350" height="30" rx="6" fill="#2E7D32"/>
      <text x="295" y="85" font-family="sans-serif" font-weight="600" font-size="13" fill="#C5E1A5">v11.0 - New Arcade World Added</text>
      <rect x="560" y="70" width="60" height="20" rx="10" fill="#8BC34A"/>
      <text x="590" y="84" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#1B5E20">NEW</text>
    </g>
    <g>
      <circle cx="250" cy="140" r="8" fill="#66BB6A"/>
      <rect x="280" y="125" width="350" height="30" rx="6" fill="#2E7D32" opacity="0.8"/>
      <text x="295" y="145" font-family="sans-serif" font-weight="600" font-size="13" fill="#C5E1A5">v10.5 - Bug fixes &amp; optimizations</text>
    </g>
    <g>
      <circle cx="250" cy="200" r="8" fill="#66BB6A" opacity="0.8"/>
      <rect x="280" y="185" width="350" height="30" rx="6" fill="#2E7D32" opacity="0.6"/>
      <text x="295" y="205" font-family="sans-serif" font-weight="600" font-size="13" fill="#A5D6A7">v10.0 - New skins &amp; characters</text>
    </g>
    <g>
      <circle cx="250" cy="260" r="8" fill="#66BB6A" opacity="0.6"/>
      <rect x="280" y="245" width="350" height="30" rx="6" fill="#2E7D32" opacity="0.4"/>
      <text x="295" y="265" font-family="sans-serif" font-weight="600" font-size="13" fill="#A5D6A7" opacity="0.8">v9.5 - Multiplayer improvements</text>
    </g>
    <g>
      <circle cx="250" cy="320" r="8" fill="#66BB6A" opacity="0.4"/>
      <rect x="280" y="305" width="350" height="30" rx="6" fill="#2E7D32" opacity="0.3"/>
      <text x="295" y="325" font-family="sans-serif" font-weight="600" font-size="13" fill="#A5D6A7" opacity="0.6">v9.0 - The Hive world added</text>
    </g>
    <!-- Dots for more -->
    <circle cx="250" cy="355" r="3" fill="#66BB6A" opacity="0.3"/>
    <circle cx="250" cy="365" r="3" fill="#66BB6A" opacity="0.2"/>
    <circle cx="250" cy="375" r="3" fill="#66BB6A" opacity="0.1"/>
  </g>
  <!-- Document icon -->
  <g transform="translate(150, 200)" filter="url(#s)" opacity="0.3">
    <rect x="-20" y="-30" width="40" height="50" rx="3" fill="#C5E1A5"/>
    <rect x="-15" y="-22" width="30" height="3" fill="#558B2F"/>
    <rect x="-15" y="-15" width="25" height="3" fill="#558B2F"/>
    <rect x="-15" y="-8" width="28" height="3" fill="#558B2F"/>
    <path d="M5,-30 L20,-30 L20,-15Z" fill="#A5D6A7"/>
  </g>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#F1F8E9">Version Changelogs</text>
  <text x="400" y="438" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Every Update Documented</text>
</svg>