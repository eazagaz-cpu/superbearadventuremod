<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <filter id="cs"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#4A148C" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#cbg)"/>
  <g opacity="0.04"><circle cx="100" cy="80" r="100" fill="#9C27B0"/><circle cx="700" cy="380" r="80" fill="#9C27B0"/></g>
  <!-- Timeline line -->
  <line x1="140" y1="100" x2="140" y2="380" stroke="#CE93D8" stroke-width="3" opacity="0.5"/>
  <!-- Version entries -->
  <g transform="translate(140, 120)" filter="url(#cs)">
    <circle cx="0" cy="0" r="12" fill="#4CAF50"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="10" fill="white">&#x2713;</text>
    <rect x="30" y="-30" width="560" height="60" rx="12" fill="white"/>
    <text x="50" y="-6" font-family="sans-serif" font-weight="800" font-size="16" fill="#1B5E20">v12.1.5</text>
    <text x="150" y="-6" font-family="sans-serif" font-weight="500" font-size="12" fill="#9E9E9E">April 2026</text>
    <rect x="280" y="-18" width="60" height="22" rx="11" fill="#E8F5E9"/>
    <text x="310" y="-3" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#2E7D32">LATEST</text>
    <text x="50" y="16" font-family="sans-serif" font-weight="500" font-size="12" fill="#616161">Multiplayer invite codes fixed, stability improvements</text>
  </g>
  <g transform="translate(140, 210)" filter="url(#cs)">
    <circle cx="0" cy="0" r="12" fill="#2196F3"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="10" fill="white">&#x2713;</text>
    <rect x="30" y="-30" width="560" height="60" rx="12" fill="white"/>
    <text x="50" y="-6" font-family="sans-serif" font-weight="800" font-size="16" fill="#0D47A1">v12.1.4</text>
    <text x="150" y="-6" font-family="sans-serif" font-weight="500" font-size="12" fill="#9E9E9E">March 2026</text>
    <text x="50" y="16" font-family="sans-serif" font-weight="500" font-size="12" fill="#616161">Save corruption fix, new invite format, copy/paste invites</text>
  </g>
  <g transform="translate(140, 300)" filter="url(#cs)">
    <circle cx="0" cy="0" r="12" fill="#FF9800"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="10" fill="white">&#x2713;</text>
    <rect x="30" y="-30" width="560" height="60" rx="12" fill="white"/>
    <text x="50" y="-6" font-family="sans-serif" font-weight="800" font-size="16" fill="#E65100">v12.1.0</text>
    <text x="150" y="-6" font-family="sans-serif" font-weight="500" font-size="12" fill="#9E9E9E">2025</text>
    <rect x="210" y="-18" width="60" height="22" rx="11" fill="#FFF3E0"/>
    <text x="240" y="-3" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#E65100">MAJOR</text>
    <text x="50" y="16" font-family="sans-serif" font-weight="500" font-size="12" fill="#616161">Emotes, Super Bear Fighters, arcade updates</text>
  </g>
  <!-- Header -->
  <text x="400" y="60" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="26" fill="#4A148C">Version History &amp; Changelogs</text>
</svg>