<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg-um" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="chest-um" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A1887F"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="coin-um" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="coin-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <filter id="s-um"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/></filter>
    <filter id="coin-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Warm golden background -->
  <rect width="800" height="450" fill="url(#bg-um)"/>

  <!-- Radial warm glow -->
  <circle cx="400" cy="250" r="250" fill="#FFE082" opacity="0.15"/>

  <!-- Treasure chest -->
  <g transform="translate(400, 260)" filter="url(#s-um)">
    <!-- Chest body -->
    <rect x="-100" y="0" width="200" height="90" rx="6" fill="url(#chest-um)"/>
    <rect x="-100" y="0" width="200" height="90" rx="6" fill="none" stroke="#8D6E63" stroke-width="2"/>
    <!-- Metal bands -->
    <rect x="-100" y="22" width="200" height="8" rx="2" fill="#FFB300" opacity="0.7"/>
    <rect x="-100" y="60" width="200" height="8" rx="2" fill="#FFB300" opacity="0.7"/>
    <!-- Corner rivets -->
    <circle cx="-90" cy="10" r="4" fill="#FFC107"/>
    <circle cx="90" cy="10" r="4" fill="#FFC107"/>
    <circle cx="-90" cy="80" r="4" fill="#FFC107"/>
    <circle cx="90" cy="80" r="4" fill="#FFC107"/>
    <!-- Chest lid (open, tilted back) -->
    <path d="M-100,0 Q-100,-20 -80,-40 Q0,-75 80,-40 Q100,-20 100,0" fill="#8D6E63" stroke="#A1887F" stroke-width="2"/>
    <path d="M-90,0 Q-90,-15 -72,-33 Q0,-62 72,-33 Q90,-15 90,0" fill="#795548"/>
    <!-- Lock plate -->
    <rect x="-15" y="-8" width="30" height="20" rx="4" fill="#FFB300"/>
    <circle cx="0" cy="3" r="5" fill="#E65100"/>
    <rect x="-2" y="3" width="4" height="8" rx="1" fill="#E65100"/>
  </g>

  <!-- Overflowing coins in chest -->
  <g filter="url(#coin-glow)">
    <circle cx="340" cy="245" r="15" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="340" y="251" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="12" fill="#E65100">$</text>
    <circle cx="370" cy="238" r="15" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="370" y="244" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="12" fill="#E65100">$</text>
    <circle cx="400" cy="235" r="16" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="400" y="241" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="13" fill="#E65100">$</text>
    <circle cx="430" cy="238" r="15" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="430" y="244" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="12" fill="#E65100">$</text>
    <circle cx="460" cy="245" r="15" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="460" y="251" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="12" fill="#E65100">$</text>
  </g>

  <!-- Raining coins (various sizes, scattered) -->
  <g filter="url(#coin-glow)">
    <!-- Large falling coins -->
    <g>
      <circle cx="180" cy="80" r="22" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="2"/>
      <text x="180" y="87" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#E65100">$</text>
      <ellipse cx="172" cy="72" rx="6" ry="3" fill="white" opacity="0.3" transform="rotate(-20,172,72)"/>
    </g>
    <g>
      <circle cx="620" cy="60" r="24" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="2"/>
      <text x="620" y="68" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="20" fill="#E65100">$</text>
      <ellipse cx="612" cy="52" rx="7" ry="3.5" fill="white" opacity="0.3" transform="rotate(-20,612,52)"/>
    </g>
    <g>
      <circle cx="300" cy="130" r="20" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="1.5"/>
      <text x="300" y="137" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="16" fill="#E65100">$</text>
    </g>
    <g>
      <circle cx="520" cy="110" r="20" fill="url(#coin-um)" stroke="#FF8F00" stroke-width="1.5"/>
      <text x="520" y="117" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="16" fill="#E65100">$</text>
    </g>

    <!-- Medium coins -->
    <circle cx="220" cy="170" r="14" fill="url(#coin-shine)" stroke="#FFB300" stroke-width="1.5"/>
    <circle cx="560" cy="155" r="14" fill="url(#coin-shine)" stroke="#FFB300" stroke-width="1.5"/>
    <circle cx="150" cy="200" r="13" fill="url(#coin-shine)" stroke="#FFB300" stroke-width="1.5"/>
    <circle cx="650" cy="180" r="13" fill="url(#coin-shine)" stroke="#FFB300" stroke-width="1.5"/>
    <circle cx="260" cy="50" r="12" fill="url(#coin-shine)" stroke="#FFB300" stroke-width="1"/>
    <circle cx="540" cy="40" r="12" fill="url(#coin-shine)" stroke="#FFB300" stroke-width="1"/>

    <!-- Small coins -->
    <circle cx="130" cy="120" r="9" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
    <circle cx="680" cy="110" r="9" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
    <circle cx="350" cy="60" r="8" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
    <circle cx="450" cy="55" r="8" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
    <circle cx="100" cy="250" r="8" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
    <circle cx="700" cy="240" r="8" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
    <circle cx="200" cy="290" r="7" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
    <circle cx="600" cy="280" r="7" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
  </g>

  <!-- Infinity symbol -->
  <g transform="translate(400, 165)" filter="url(#s-um)">
    <path d="M-35,0 C-35,-25 -15,-25 0,0 C15,25 35,25 35,0 C35,-25 15,-25 0,0 C-15,25 -35,25 -35,0Z" fill="none" stroke="#FF8F00" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Sparkle effects -->
  <g fill="#FFF9C4" opacity="0.6">
    <polygon points="160,50 163,58 171,58 165,63 167,71 160,66 153,71 155,63 149,58 157,58"/>
    <polygon points="650,50 653,58 661,58 655,63 657,71 650,66 643,71 645,63 639,58 647,58"/>
    <polygon points="400,40 402,46 408,46 403,49 405,55 400,51 395,55 397,49 392,46 398,46"/>
    <polygon points="120,310 122,316 128,316 123,319 125,325 120,321 115,325 117,319 112,316 118,316"/>
    <polygon points="680,300 682,306 688,306 683,309 685,315 680,311 675,315 677,309 672,306 678,306"/>
  </g>

  <!-- Title area -->
  <rect x="150" y="370" width="500" height="65" rx="12" fill="white" opacity="0.8"/>
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#E65100">Unlimited Money Mod</text>
  <text x="400" y="423" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#FF8F00">Get Infinite Coins &amp; Resources</text>
</svg>