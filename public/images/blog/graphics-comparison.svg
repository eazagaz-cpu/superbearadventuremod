<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="49.5%" stop-color="#1B5E20"/>
      <stop offset="49.5%" stop-color="#8BC34A"/>
      <stop offset="50.5%" stop-color="#8BC34A"/>
      <stop offset="50.5%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
    <clipPath id="leftClip"><rect x="0" y="0" width="397" height="450"/></clipPath>
    <clipPath id="rightClip"><rect x="403" y="0" width="397" height="450"/></clipPath>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Left side: 2024 (older, simpler) -->
  <g clip-path="url(#leftClip)">
    <rect x="50" y="60" width="340" height="280" rx="8" fill="#2E7D32" opacity="0.5"/>
    <!-- Simple game scene -->
    <rect x="70" y="100" width="300" height="200" fill="#33691E" rx="4"/>
    <!-- Blocky terrain -->
    <rect x="70" y="240" width="300" height="60" fill="#4CAF50"/>
    <!-- Simple bear (blocky) -->
    <rect x="180" y="190" width="30" height="30" fill="#8D6E63"/>
    <rect x="185" y="175" width="20" height="20" fill="#8D6E63"/>
    <rect x="188" y="178" width="5" height="5" fill="white"/>
    <rect x="198" y="178" width="5" height="5" fill="white"/>
    <!-- Simple tree -->
    <rect x="110" y="200" width="8" height="40" fill="#795548"/>
    <rect x="98" y="185" width="32" height="20" fill="#388E3C"/>
    <rect x="103" y="170" width="22" height="20" fill="#4CAF50"/>
    <!-- Simple sky -->
    <rect x="280" y="110" width="20" height="20" fill="#FFD54F"/>
    <!-- FPS counter -->
    <rect x="75" y="105" width="50" height="18" rx="3" fill="#000" opacity="0.5"/>
    <text x="100" y="117" text-anchor="middle" font-family="monospace" font-size="10" fill="#4CAF50">30fps</text>
  </g>
  <!-- Right side: 2026 (newer, detailed) -->
  <g clip-path="url(#rightClip)">
    <rect x="410" y="60" width="340" height="280" rx="8" fill="#2E7D32" opacity="0.5"/>
    <!-- Detailed game scene -->
    <rect x="430" y="100" width="300" height="200" fill="#2E7D32" rx="4"/>
    <!-- Gradient ground -->
    <ellipse cx="580" cy="300" rx="200" ry="60" fill="#4CAF50"/>
    <ellipse cx="520" cy="285" rx="130" ry="40" fill="#66BB6A"/>
    <!-- Detailed bear -->
    <g transform="translate(580, 230)">
      <circle cx="0" cy="0" r="14" fill="#8D6E63"/>
      <circle cx="-9" cy="-10" r="5" fill="#795548"/>
      <circle cx="9" cy="-10" r="5" fill="#795548"/>
      <circle cx="-9" cy="-10" r="3" fill="#BCAAA4"/>
      <circle cx="9" cy="-10" r="3" fill="#BCAAA4"/>
      <circle cx="-4" cy="-2" r="2.5" fill="white"/>
      <circle cx="4" cy="-2" r="2.5" fill="white"/>
      <circle cx="-3" cy="-1" r="1.2" fill="#333"/>
      <circle cx="5" cy="-1" r="1.2" fill="#333"/>
      <ellipse cx="0" cy="4" rx="4" ry="3" fill="#5D4037"/>
      <ellipse cx="0" cy="18" rx="10" ry="14" fill="#795548"/>
    </g>
    <!-- Detailed tree -->
    <g transform="translate(470, 230)">
      <rect x="-3" y="-10" width="6" height="30" fill="#795548"/>
      <polygon points="0,-45 20,-5 -20,-5" fill="#2E7D32"/>
      <polygon points="0,-35 16,-10 -16,-10" fill="#388E3C"/>
      <polygon points="0,-25 12,-8 -12,-8" fill="#43A047"/>
    </g>
    <!-- Sun with rays -->
    <circle cx="680" cy="125" r="15" fill="#FFD54F"/>
    <g stroke="#FFD54F" stroke-width="1.5" opacity="0.5">
      <line x1="680" y1="105" x2="680" y2="100"/>
      <line x1="695" y1="112" x2="700" y2="108"/>
      <line x1="700" y1="125" x2="706" y2="125"/>
      <line x1="695" y1="138" x2="700" y2="142"/>
    </g>
    <!-- Clouds -->
    <ellipse cx="520" cy="118" rx="22" ry="8" fill="white" opacity="0.3"/>
    <ellipse cx="535" cy="114" rx="16" ry="6" fill="white" opacity="0.3"/>
    <!-- Particle effects -->
    <circle cx="560" cy="215" r="2" fill="#C5E1A5" opacity="0.5"/>
    <circle cx="600" cy="205" r="1.5" fill="#C5E1A5" opacity="0.4"/>
    <circle cx="620" cy="220" r="1.8" fill="#C5E1A5" opacity="0.3"/>
    <!-- FPS counter -->
    <rect x="435" y="105" width="50" height="18" rx="3" fill="#000" opacity="0.5"/>
    <text x="460" y="117" text-anchor="middle" font-family="monospace" font-size="10" fill="#8BC34A">60fps</text>
  </g>
  <!-- Divider line -->
  <line x1="400" y1="50" x2="400" y2="350" stroke="#8BC34A" stroke-width="4"/>
  <!-- VS circle -->
  <circle cx="400" cy="200" r="22" fill="#8BC34A" filter="url(#s)"/>
  <text x="400" y="207" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="16" fill="#1B5E20">VS</text>
  <!-- Year labels -->
  <g filter="url(#s)">
    <rect x="140" y="62" width="120" height="35" rx="17" fill="#558B2F"/>
    <text x="200" y="84" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#F1F8E9">2024</text>
    <rect x="540" y="62" width="120" height="35" rx="17" fill="#8BC34A"/>
    <text x="600" y="84" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#1B5E20">2026</text>
  </g>
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#F1F8E9">Graphics Comparison</text>
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Old vs New - Visual Evolution</text>
</svg>