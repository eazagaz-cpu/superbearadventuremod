<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <filter id="cps"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.15"/></filter>
    <clipPath id="leftClip"><rect x="0" y="0" width="400" height="450"/></clipPath>
    <clipPath id="rightClip"><rect x="400" y="0" width="400" height="450"/></clipPath>
  </defs>
  <!-- LEFT SIDE: 2024 (older, simpler) -->
  <g clip-path="url(#leftClip)">
    <rect width="400" height="450" fill="#A5D6A7"/>
    <rect x="0" y="0" width="400" height="160" fill="#90CAF9"/>
    <circle cx="320" cy="50" r="30" fill="#FFF176" opacity="0.7"/>
    <rect x="0" y="160" width="400" height="290" fill="#66BB6A"/>
    <!-- Simple tree -->
    <rect x="80" y="140" width="8" height="50" fill="#5D4037"/>
    <circle cx="84" cy="125" r="25" fill="#388E3C"/>
    <!-- Simple house -->
    <rect x="220" y="175" width="50" height="40" fill="#BCAAA4"/>
    <polygon points="220,175 245,150 270,175" fill="#E57373"/>
    <!-- Simple bear -->
    <circle cx="160" cy="240" r="15" fill="#795548"/>
    <circle cx="160" cy="225" r="10" fill="#795548"/>
    <circle cx="155" cy="222" r="2" fill="#3E2723"/>
    <circle cx="165" cy="222" r="2" fill="#3E2723"/>
  </g>
  <!-- RIGHT SIDE: 2026 (newer, detailed) -->
  <g clip-path="url(#rightClip)">
    <linearGradient id="sky26" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </linearGradient>
    <rect x="400" y="0" width="400" height="160" fill="url(#sky26)"/>
    <circle cx="720" cy="50" r="30" fill="#FFD54F" opacity="0.9"/>
    <circle cx="720" cy="50" r="22" fill="#FFEB3B"/>
    <ellipse cx="520" cy="45" rx="40" ry="12" fill="white" opacity="0.7"/>
    <ellipse cx="540" cy="38" rx="28" ry="10" fill="white" opacity="0.7"/>
    <rect x="400" y="160" width="400" height="290" fill="#43A047"/>
    <ellipse cx="600" cy="160" rx="250" ry="20" fill="#66BB6A"/>
    <!-- Detailed tree -->
    <rect x="478" y="130" width="10" height="55" fill="#4E342E"/>
    <polygon points="483,80 520,145 446,145" fill="#1B5E20"/>
    <polygon points="483,100 512,140 454,140" fill="#2E7D32"/>
    <!-- Detailed house -->
    <g filter="url(#cps)">
      <rect x="620" y="170" width="55" height="45" rx="2" fill="#FFCC80"/>
      <polygon points="615,170 647,138 680,170" fill="#E53935"/>
      <rect x="638" y="190" width="14" height="25" rx="1" fill="#5D4037"/>
      <rect x="625" y="180" width="10" height="10" fill="#B3E5FC" stroke="#90CAF9" stroke-width="0.5"/>
    </g>
    <!-- Detailed bear -->
    <g transform="translate(560, 240)" filter="url(#cps)">
      <ellipse cx="0" cy="0" rx="16" ry="20" fill="#795548"/>
      <ellipse cx="0" cy="3" rx="11" ry="13" fill="#A1887F"/>
      <ellipse cx="0" cy="-18" rx="12" ry="10" fill="#795548"/>
      <circle cx="-8" cy="-22" r="5" fill="#795548"/><circle cx="8" cy="-22" r="5" fill="#795548"/>
      <circle cx="-8" cy="-22" r="3" fill="#A1887F"/><circle cx="8" cy="-22" r="3" fill="#A1887F"/>
      <ellipse cx="0" cy="-15" rx="7" ry="5" fill="#A1887F"/>
      <ellipse cx="0" cy="-17" rx="3" ry="2" fill="#4E342E"/>
      <circle cx="-4" cy="-22" r="1.5" fill="#3E2723"/><circle cx="4" cy="-22" r="1.5" fill="#3E2723"/>
    </g>
    <!-- Flowers -->
    <circle cx="510" cy="260" r="3" fill="#F44336"/><circle cx="510" cy="260" r="1.5" fill="#FFEB3B"/>
    <circle cx="680" cy="250" r="3" fill="#E040FB"/><circle cx="680" cy="250" r="1.5" fill="#FFEB3B"/>
    <!-- Coins -->
    <circle cx="590" cy="200" r="5" fill="#FFD54F" stroke="#FF8F00" stroke-width="1"/>
    <circle cx="610" cy="195" r="5" fill="#FFD54F" stroke="#FF8F00" stroke-width="1"/>
  </g>
  <!-- Center divider -->
  <line x1="400" y1="0" x2="400" y2="450" stroke="white" stroke-width="4"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#9E9E9E" stroke-width="1"/>
  <!-- Year labels -->
  <g filter="url(#cps)">
    <rect x="30" y="20" width="80" height="40" rx="8" fill="#424242" opacity="0.85"/>
    <text x="70" y="46" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="20" fill="white">2024</text>
    <rect x="690" y="20" width="80" height="40" rx="8" fill="#4CAF50" opacity="0.9"/>
    <text x="730" y="46" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="20" fill="white">2026</text>
  </g>
  <!-- Bottom comparison labels -->
  <rect x="0" y="380" width="400" height="70" fill="#424242" opacity="0.7"/>
  <text x="200" y="420" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="white">Basic Graphics &amp; Limited Content</text>
  <rect x="400" y="380" width="400" height="70" fill="#1B5E20" opacity="0.8"/>
  <text x="600" y="420" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="white">Enhanced Worlds &amp; 6 Regions</text>
</svg>