<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Download button -->
  <g transform="translate(400, 180)" filter="url(#s)">
    <!-- APK icon -->
    <rect x="-50" y="-70" width="100" height="120" rx="10" fill="#558B2F"/>
    <rect x="-50" y="-70" width="100" height="120" rx="10" fill="none" stroke="#8BC34A" stroke-width="2"/>
    <!-- Android robot on APK -->
    <g transform="translate(0, -30)">
      <rect x="-20" y="0" width="40" height="30" rx="4" fill="#8BC34A"/>
      <path d="M-20,0 Q0,-20 20,0" fill="#8BC34A"/>
      <circle cx="-8" cy="-5" r="3" fill="white"/>
      <circle cx="8" cy="-5" r="3" fill="white"/>
      <rect x="-25" y="5" width="6" height="20" rx="3" fill="#8BC34A"/>
      <rect x="19" y="5" width="6" height="20" rx="3" fill="#8BC34A"/>
      <rect x="-12" y="30" width="8" height="15" rx="3" fill="#8BC34A"/>
      <rect x="4" y="30" width="8" height="15" rx="3" fill="#8BC34A"/>
      <line x1="-12" y1="-20" x2="-18" y2="-28" stroke="#8BC34A" stroke-width="2"/>
      <line x1="12" y1="-20" x2="18" y2="-28" stroke="#8BC34A" stroke-width="2"/>
    </g>
    <text x="0" y="40" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="#C5E1A5">APK</text>
  </g>
  <!-- Download arrow -->
  <g transform="translate(400, 290)" filter="url(#s)">
    <polygon points="0,30 -25,0 -10,0 -10,-30 10,-30 10,0 25,0" fill="#8BC34A"/>
  </g>
  <!-- Download button bar -->
  <g transform="translate(400, 350)" filter="url(#s)">
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="#8BC34A"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#1B5E20">DOWNLOAD MOD APK</text>
  </g>
  <!-- File size badge -->
  <rect x="500" y="100" width="100" height="30" rx="15" fill="#2E7D32" filter="url(#s)"/>
  <text x="550" y="120" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="13" fill="#C5E1A5">150 MB</text>
  <!-- Version badge -->
  <rect x="200" y="100" width="100" height="30" rx="15" fill="#2E7D32" filter="url(#s)"/>
  <text x="250" y="120" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="13" fill="#C5E1A5">v11.0.1</text>
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Safe &amp; Verified Download</text>
</svg>