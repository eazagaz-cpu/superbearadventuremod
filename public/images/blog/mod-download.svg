<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <filter id="ms"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1B5E20" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#mbg)"/>
  <g opacity="0.04"><circle cx="150" cy="100" r="120" fill="#4CAF50"/><circle cx="650" cy="350" r="100" fill="#4CAF50"/></g>
  <!-- Phone mockup -->
  <g transform="translate(400, 200)" filter="url(#ms)">
    <rect x="-90" y="-150" width="180" height="300" rx="20" fill="#1a1a2e"/>
    <rect x="-78" y="-132" width="156" height="264" rx="4" fill="#E8F5E9"/>
    <!-- App screen -->
    <rect x="-78" y="-132" width="156" height="200" fill="#66BB6A"/>
    <rect x="-78" y="-132" width="156" height="80" fill="#4FC3F7"/>
    <circle cx="40" cy="-100" r="15" fill="#FFD54F" opacity="0.8"/>
    <rect x="-78" y="-52" width="156" height="120" fill="#43A047"/>
    <!-- Bear -->
    <ellipse cx="0" cy="-20" rx="14" ry="12" fill="#795548"/>
    <ellipse cx="0" cy="-17" rx="8" ry="6" fill="#A1887F"/>
    <circle cx="-4" cy="-22" r="2" fill="#3E2723"/><circle cx="4" cy="-22" r="2" fill="#3E2723"/>
    <!-- Coins -->
    <circle cx="-30" cy="-35" r="5" fill="#FFD54F"/><circle cx="-18" cy="-42" r="5" fill="#FFD54F"/>
    <!-- Download progress -->
    <rect x="-60" y="80" width="120" height="8" rx="4" fill="#E0E0E0"/>
    <rect x="-60" y="80" width="90" height="8" rx="4" fill="#4CAF50"/>
    <text x="0" y="105" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#2E7D32">75% Downloaded</text>
    <text x="0" y="125" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="8" fill="#757575">182 MB</text>
  </g>
  <!-- Download arrow -->
  <g transform="translate(400, 395)">
    <rect x="-100" y="-22" width="200" height="44" rx="22" fill="#4CAF50"/>
    <text x="-10" y="6" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="15" fill="white">Download APK</text>
    <path d="M60,-6 L60,6 L70,0 Z" fill="white"/>
  </g>
  <!-- Version badge -->
  <g transform="translate(560, 80)">
    <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#FF5722"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="12" fill="white">v12.1.5</text>
  </g>
  <!-- Free badge -->
  <g transform="translate(240, 100)">
    <rect x="-30" y="-14" width="60" height="28" rx="14" fill="#FFD54F"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="12" fill="#E65100">FREE</text>
  </g>
</svg>