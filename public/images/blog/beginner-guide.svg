<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <filter id="gs"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#006064" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#gbg)"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="60" rx="60" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="170" cy="50" rx="40" ry="15" fill="white" opacity="0.8"/>
  <ellipse cx="600" cy="45" rx="50" ry="16" fill="white" opacity="0.7"/>
  <circle cx="680" cy="55" r="30" fill="#FFD54F" opacity="0.8"/>
  <!-- Ground -->
  <rect x="0" y="280" width="800" height="170" fill="#66BB6A"/>
  <ellipse cx="400" cy="280" rx="450" ry="30" fill="#81C784"/>
  <!-- Path -->
  <path d="M50,450 Q200,350 400,320 Q600,290 750,380" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="1" opacity="0.7"/>
  <!-- Bear with movement arrows -->
  <g transform="translate(400, 310)" filter="url(#gs)">
    <ellipse cx="0" cy="30" rx="30" ry="8" fill="#2E7D32" opacity="0.2"/>
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="#795548"/>
    <ellipse cx="0" cy="5" rx="16" ry="18" fill="#A1887F"/>
    <ellipse cx="0" cy="-25" rx="18" ry="15" fill="#795548"/>
    <circle cx="-12" cy="-30" r="7" fill="#795548"/><circle cx="12" cy="-30" r="7" fill="#795548"/>
    <circle cx="-12" cy="-30" r="4.5" fill="#A1887F"/><circle cx="12" cy="-30" r="4.5" fill="#A1887F"/>
    <ellipse cx="0" cy="-21" rx="10" ry="8" fill="#A1887F"/>
    <ellipse cx="0" cy="-24" rx="4" ry="3" fill="#4E342E"/>
    <circle cx="-6" cy="-30" r="2.5" fill="#3E2723"/><circle cx="6" cy="-30" r="2.5" fill="#3E2723"/>
    <circle cx="-5" cy="-31" r="1" fill="white"/><circle cx="7" cy="-31" r="1" fill="white"/>
  </g>
  <!-- Control hints -->
  <g transform="translate(200, 340)" filter="url(#gs)">
    <rect x="-35" y="-18" width="70" height="36" rx="10" fill="white" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="18" fill="#424242">WASD</text>
  </g>
  <g transform="translate(600, 300)" filter="url(#gs)">
    <rect x="-35" y="-18" width="70" height="36" rx="10" fill="white" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="14" fill="#424242">JUMP</text>
  </g>
  <!-- Arrow showing direction -->
  <g transform="translate(500, 310)" opacity="0.6">
    <path d="M0,0 L30,-10 L25,0 L40,0 L25,0 L30,10 Z" fill="#FF5722"/>
  </g>
  <!-- Coins trail -->
  <circle cx="480" cy="290" r="6" fill="#FFD54F" stroke="#FF8F00" stroke-width="1"/>
  <circle cx="510" cy="285" r="6" fill="#FFD54F" stroke="#FF8F00" stroke-width="1"/>
  <circle cx="540" cy="282" r="6" fill="#FFD54F" stroke="#FF8F00" stroke-width="1"/>
  <!-- Title -->
  <g transform="translate(400, 420)">
    <rect x="-130" y="-18" width="260" height="36" rx="18" fill="white" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="16" fill="#1B5E20">Beginner's Guide</text>
  </g>
</svg>