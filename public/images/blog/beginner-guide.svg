<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Game controller -->
  <g transform="translate(400, 180)" filter="url(#s)">
    <rect x="-120" y="-50" width="240" height="100" rx="50" fill="#37474F"/>
    <rect x="-120" y="-50" width="240" height="100" rx="50" fill="none" stroke="#546E7A" stroke-width="2"/>
    <!-- D-pad -->
    <rect x="-80" y="-12" width="40" height="12" rx="2" fill="#616161"/>
    <rect x="-66" y="-25" width="12" height="40" rx="2" fill="#616161"/>
    <!-- Buttons -->
    <circle cx="65" cy="-15" r="10" fill="#8BC34A"/>
    <circle cx="85" cy="0" r="10" fill="#EF5350"/>
    <circle cx="65" cy="15" r="10" fill="#42A5F5"/>
    <circle cx="45" cy="0" r="10" fill="#FFC107"/>
    <!-- Analog sticks -->
    <circle cx="-40" cy="20" r="14" fill="#424242" stroke="#555" stroke-width="2"/>
    <circle cx="25" cy="20" r="14" fill="#424242" stroke="#555" stroke-width="2"/>
    <!-- Center buttons -->
    <rect x="-12" y="-8" width="10" height="6" rx="2" fill="#555"/>
    <rect x="2" y="-8" width="10" height="6" rx="2" fill="#555"/>
  </g>
  <!-- START button highlight -->
  <g transform="translate(400, 270)" filter="url(#s)">
    <rect x="-55" y="-18" width="110" height="36" rx="18" fill="#8BC34A"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#1B5E20">START</text>
  </g>
  <!-- Arrow pointing to start -->
  <g opacity="0.6">
    <line x1="300" y1="280" x2="340" y2="265" stroke="#C5E1A5" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="500" y1="280" x2="460" y2="265" stroke="#C5E1A5" stroke-width="2" stroke-dasharray="4,4"/>
  </g>
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#F1F8E9">Beginner's Guide</text>
  <text x="400" y="400" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#A5D6A7">Tips &amp; Tricks for New Players</text>
</svg>