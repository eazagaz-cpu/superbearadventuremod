<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a148c"/>
      <stop offset="100%" style="stop-color:#6a1b9a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Left: old APK box -->
  <rect x="40" y="120" width="160" height="200" rx="12" fill="#1a0033" stroke="#ce93d8" stroke-width="2"/>
  <text x="120" y="195" font-family="Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#ce93d8">OFFICIAL</text>
  <text x="120" y="218" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#fff">v12.1.5</text>
  <text x="120" y="265" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="#ce93d8">🐻</text>
  <!-- Arrow -->
  <text x="232" y="230" font-family="Arial,sans-serif" font-size="36" fill="#fff">→</text>
  <!-- Right: mod APK box -->
  <rect x="275" y="120" width="160" height="200" rx="12" fill="#1a0033" stroke="#ab47bc" stroke-width="2"/>
  <text x="355" y="195" font-family="Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#ab47bc">MOD APK</text>
  <text x="355" y="218" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#fff">v12.1.5</text>
  <text x="355" y="265" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="#ab47bc">🐻⭐</text>
  <!-- Data preserved badge -->
  <rect x="80" y="345" width="340" height="40" rx="8" fill="#4a148c" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="250" y="369" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="#ce93d8">💾 Save Data Preserved</text>
  <!-- Right panel -->
  <rect x="480" y="80" width="300" height="290" rx="12" fill="#0d0020" opacity="0.8"/>
  <text x="630" y="125" font-family="Arial,sans-serif" font-size="20" font-weight="900" text-anchor="middle" fill="#fff">Install Without</text>
  <text x="630" y="150" font-family="Arial,sans-serif" font-size="20" font-weight="900" text-anchor="middle" fill="#ce93d8">Losing Progress</text>
  <text x="500" y="185" font-family="Arial,sans-serif" font-size="13" fill="#ddd">1. Download new APK</text>
  <text x="500" y="208" font-family="Arial,sans-serif" font-size="13" fill="#ddd">2. Do NOT uninstall first</text>
  <text x="500" y="231" font-family="Arial,sans-serif" font-size="13" fill="#ddd">3. Tap APK → Install</text>
  <text x="500" y="254" font-family="Arial,sans-serif" font-size="13" fill="#ddd">4. Android asks "Update app?"</text>
  <text x="500" y="277" font-family="Arial,sans-serif" font-size="13" fill="#ddd">5. Tap OK → done</text>
  <rect x="490" y="300" width="280" height="38" rx="8" fill="#6a1b9a" opacity="0.5"/>
  <text x="630" y="324" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#e1bee7">Coins, worlds, unlocks all stay</text>
  <text x="400" y="415" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#666">superbearadventuremod.io</text>
</svg>
