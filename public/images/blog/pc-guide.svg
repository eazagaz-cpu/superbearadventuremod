<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg-pc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
    <linearGradient id="monitor-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#455A64"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="screen-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <filter id="s-pc"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/></filter>
    <filter id="s-pc-sm"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/></filter>
  </defs>

  <!-- Light blue-purple gradient background -->
  <rect width="800" height="450" fill="url(#bg-pc)"/>

  <!-- Desk surface -->
  <rect x="50" y="340" width="700" height="110" rx="0" fill="#BCAAA4" opacity="0.2"/>
  <line x1="50" y1="340" x2="750" y2="340" stroke="#A1887F" stroke-width="2" opacity="0.3"/>

  <!-- Monitor -->
  <g transform="translate(400, 175)" filter="url(#s-pc)">
    <!-- Monitor bezel -->
    <rect x="-195" y="-130" width="390" height="250" rx="14" fill="url(#monitor-body)"/>
    <rect x="-195" y="-130" width="390" height="250" rx="14" fill="none" stroke="#546E7A" stroke-width="1"/>
    <!-- Screen -->
    <rect x="-178" y="-115" width="356" height="215" rx="4" fill="url(#screen-bg)"/>

    <!-- Game scene on screen -->
    <!-- Sky with clouds -->
    <rect x="-178" y="-115" width="356" height="100" fill="#64B5F6" rx="4"/>
    <g fill="white" opacity="0.8">
      <ellipse cx="-100" cy="-90" rx="30" ry="10"/>
      <ellipse cx="-80" cy="-90" rx="20" ry="14"/>
      <ellipse cx="80" cy="-75" rx="25" ry="9"/>
      <ellipse cx="95" cy="-78" rx="18" ry="11"/>
    </g>
    <!-- Sun -->
    <circle cx="140" cy="-85" r="20" fill="#FFD54F" opacity="0.9"/>
    <circle cx="140" cy="-85" r="16" fill="#FFF176"/>

    <!-- Green hills -->
    <ellipse cx="-60" cy="20" rx="120" ry="60" fill="#66BB6A"/>
    <ellipse cx="80" cy="30" rx="130" ry="55" fill="#4CAF50"/>
    <ellipse cx="0" cy="50" rx="180" ry="50" fill="#43A047"/>

    <!-- Trees -->
    <g>
      <rect x="-120" y="-15" width="6" height="20" fill="#795548"/>
      <polygon points="-117,-15 -108,-35 -126,-35" fill="#388E3C"/>
      <polygon points="-117,-25 -106,-45 -128,-45" fill="#43A047"/>
    </g>
    <g>
      <rect x="100" y="-5" width="6" height="18" fill="#795548"/>
      <polygon points="103,-5 112,-22 94,-22" fill="#388E3C"/>
      <polygon points="103,-14 114,-32 92,-32" fill="#43A047"/>
    </g>

    <!-- Bear character on screen -->
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-12" r="16" fill="#8D6E63"/>
      <circle cx="-10" cy="-22" r="6" fill="#795548"/>
      <circle cx="10" cy="-22" r="6" fill="#795548"/>
      <circle cx="-10" cy="-22" r="3.5" fill="#BCAAA4"/>
      <circle cx="10" cy="-22" r="3.5" fill="#BCAAA4"/>
      <circle cx="-5" cy="-14" r="3" fill="white"/>
      <circle cx="5" cy="-14" r="3" fill="white"/>
      <circle cx="-4" cy="-13" r="1.8" fill="#333"/>
      <circle cx="6" cy="-13" r="1.8" fill="#333"/>
      <ellipse cx="0" cy="-5" rx="4" ry="2.5" fill="#5D4037"/>
      <ellipse cx="0" cy="12" rx="14" ry="18" fill="#795548"/>
      <ellipse cx="0" cy="14" rx="9" ry="11" fill="#BCAAA4"/>
    </g>

    <!-- HUD elements on screen -->
    <g opacity="0.7">
      <!-- Coin counter -->
      <circle cx="-155" cy="-98" r="7" fill="#FFC107"/>
      <text x="-155" y="-95" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="7" fill="#E65100">$</text>
      <text x="-138" y="-94" font-family="sans-serif" font-weight="700" font-size="10" fill="white">999</text>
      <!-- Health bar -->
      <rect x="-160" y="-82" width="60" height="6" rx="3" fill="white" opacity="0.3"/>
      <rect x="-160" y="-82" width="45" height="6" rx="3" fill="#F44336"/>
    </g>

    <!-- Monitor stand -->
    <rect x="-30" y="120" width="60" height="25" fill="#455A64"/>
    <ellipse cx="0" cy="147" rx="60" ry="8" fill="#546E7A"/>

    <!-- Power LED -->
    <circle cx="0" cy="110" r="3" fill="#4CAF50"/>
  </g>

  <!-- Keyboard -->
  <g transform="translate(400, 370)" filter="url(#s-pc-sm)">
    <rect x="-120" y="-12" width="240" height="40" rx="6" fill="#546E7A"/>
    <rect x="-120" y="-12" width="240" height="40" rx="6" fill="none" stroke="#607D8B" stroke-width="1"/>
    <!-- Key rows -->
    <g fill="#78909C" opacity="0.6">
      <rect x="-110" y="-6" width="14" height="10" rx="2"/>
      <rect x="-92" y="-6" width="14" height="10" rx="2"/>
      <rect x="-74" y="-6" width="14" height="10" rx="2"/>
      <rect x="-56" y="-6" width="14" height="10" rx="2"/>
      <rect x="-38" y="-6" width="14" height="10" rx="2"/>
      <rect x="-20" y="-6" width="14" height="10" rx="2"/>
      <rect x="-2" y="-6" width="14" height="10" rx="2"/>
      <rect x="16" y="-6" width="14" height="10" rx="2"/>
      <rect x="34" y="-6" width="14" height="10" rx="2"/>
      <rect x="52" y="-6" width="14" height="10" rx="2"/>
      <rect x="70" y="-6" width="14" height="10" rx="2"/>
      <rect x="88" y="-6" width="14" height="10" rx="2"/>
    </g>
    <!-- WASD highlighted -->
    <g>
      <rect x="-92" y="8" width="14" height="10" rx="2" fill="#4CAF50" opacity="0.8"/>
      <text x="-85" y="16" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="7" fill="white">W</text>
      <rect x="-110" y="8" width="14" height="10" rx="2" fill="#78909C" opacity="0.6"/>
      <rect x="-74" y="8" width="14" height="10" rx="2" fill="#78909C" opacity="0.6"/>
      <rect x="-56" y="8" width="14" height="10" rx="2" fill="#78909C" opacity="0.6"/>
      <rect x="-38" y="8" width="14" height="10" rx="2" fill="#78909C" opacity="0.6"/>
      <rect x="-20" y="8" width="14" height="10" rx="2" fill="#78909C" opacity="0.6"/>
      <rect x="-2" y="8" width="14" height="10" rx="2" fill="#78909C" opacity="0.6"/>
      <rect x="16" y="8" width="44" height="10" rx="2" fill="#78909C" opacity="0.6"/>
      <rect x="64" y="8" width="14" height="10" rx="2" fill="#78909C" opacity="0.6"/>
      <rect x="82" y="8" width="14" height="10" rx="2" fill="#78909C" opacity="0.6"/>
    </g>
  </g>

  <!-- Mouse -->
  <g transform="translate(580, 365)" filter="url(#s-pc-sm)">
    <ellipse cx="0" cy="0" rx="18" ry="24" fill="#546E7A"/>
    <line x1="0" y1="-20" x2="0" y2="-6" stroke="#607D8B" stroke-width="1"/>
    <circle cx="0" cy="-14" r="3" fill="#78909C"/>
  </g>

  <!-- Title area -->
  <rect x="150" y="383" width="500" height="55" rx="12" fill="white" opacity="0.8"/>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#1565C0">Play on PC Guide</text>
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#42A5F5">Emulator Setup &amp; Configuration</text>
</svg>