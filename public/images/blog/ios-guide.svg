<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg-ios" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <linearGradient id="iphone-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="5%" stop-color="#F5F5F5"/>
      <stop offset="95%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <linearGradient id="ios-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="50%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <filter id="s-ios"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.15"/></filter>
    <filter id="s-ios-sm"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Light purple-blue background -->
  <rect width="800" height="450" fill="url(#bg-ios)"/>

  <!-- Subtle circles decoration -->
  <circle cx="650" cy="100" r="120" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0.15"/>
  <circle cx="650" cy="100" r="80" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0.12"/>
  <circle cx="150" cy="350" r="100" fill="none" stroke="#9FA8DA" stroke-width="1" opacity="0.15"/>
  <circle cx="150" cy="350" r="60" fill="none" stroke="#9FA8DA" stroke-width="1" opacity="0.12"/>

  <!-- iPhone device -->
  <g transform="translate(400, 195)" filter="url(#s-ios)">
    <!-- Phone body (silver/white) -->
    <rect x="-85" y="-165" width="170" height="330" rx="26" fill="url(#iphone-body)"/>
    <rect x="-85" y="-165" width="170" height="330" rx="26" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>

    <!-- Side button (right) -->
    <rect x="85" y="-60" width="3" height="35" rx="1.5" fill="#BDBDBD"/>
    <!-- Volume buttons (left) -->
    <rect x="-88" y="-70" width="3" height="22" rx="1.5" fill="#BDBDBD"/>
    <rect x="-88" y="-40" width="3" height="22" rx="1.5" fill="#BDBDBD"/>

    <!-- Screen -->
    <rect x="-76" y="-150" width="152" height="300" rx="18" fill="url(#ios-screen)"/>

    <!-- Dynamic Island -->
    <rect x="-24" y="-143" width="48" height="16" rx="8" fill="#111"/>

    <!-- Game scene on screen -->
    <!-- Sky area -->
    <rect x="-76" y="-150" width="152" height="130" rx="18" fill="#64B5F6"/>
    <!-- Clouds -->
    <g fill="white" opacity="0.7">
      <ellipse cx="-35" cy="-115" rx="22" ry="7"/>
      <ellipse cx="-20" cy="-117" rx="15" ry="10"/>
      <ellipse cx="35" cy="-100" rx="18" ry="6"/>
      <ellipse cx="45" cy="-102" rx="12" ry="8"/>
    </g>
    <!-- Sun -->
    <circle cx="55" cy="-120" r="14" fill="#FFD54F"/>
    <circle cx="55" cy="-120" r="10" fill="#FFF176"/>

    <!-- Green landscape -->
    <ellipse cx="-20" cy="20" rx="90" ry="50" fill="#66BB6A"/>
    <ellipse cx="30" cy="30" rx="80" ry="45" fill="#4CAF50"/>
    <!-- Flowers -->
    <g opacity="0.7">
      <circle cx="-40" cy="5" r="3" fill="#F48FB1"/>
      <circle cx="-50" cy="15" r="2.5" fill="#FFD54F"/>
      <circle cx="45" cy="10" r="3" fill="#E1BEE7"/>
      <circle cx="55" cy="20" r="2.5" fill="#FFF176"/>
    </g>

    <!-- Bear character on screen -->
    <g transform="translate(0, -15)">
      <circle cx="0" cy="0" r="18" fill="#8D6E63"/>
      <circle cx="-12" cy="-12" r="7" fill="#795548"/>
      <circle cx="12" cy="-12" r="7" fill="#795548"/>
      <circle cx="-12" cy="-12" r="4" fill="#BCAAA4"/>
      <circle cx="12" cy="-12" r="4" fill="#BCAAA4"/>
      <circle cx="-6" cy="-3" r="4" fill="white"/>
      <circle cx="6" cy="-3" r="4" fill="white"/>
      <circle cx="-5" cy="-2" r="2.2" fill="#333"/>
      <circle cx="7" cy="-2" r="2.2" fill="#333"/>
      <ellipse cx="0" cy="6" rx="5" ry="3" fill="#5D4037"/>
      <path d="M-5,10 Q0,15 5,10" fill="none" stroke="#5D4037" stroke-width="1.2"/>
    </g>

    <!-- Touch controls overlay -->
    <g opacity="0.25">
      <circle cx="-40" cy="105" r="20" fill="white" stroke="white" stroke-width="1"/>
      <!-- D-pad lines -->
      <line x1="-40" y1="90" x2="-40" y2="120" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <line x1="-55" y1="105" x2="-25" y2="105" stroke="white" stroke-width="1.5" opacity="0.6"/>
      <!-- Action button -->
      <circle cx="40" cy="100" r="12" fill="#4CAF50" opacity="0.5"/>
      <circle cx="55" cy="85" r="10" fill="#F44336" opacity="0.4"/>
    </g>

    <!-- Home indicator -->
    <rect x="-24" y="140" width="48" height="4" rx="2" fill="#999"/>
  </g>

  <!-- Apple logo decoration (left side) -->
  <g transform="translate(150, 160)" filter="url(#s-ios-sm)">
    <circle cx="0" cy="0" r="45" fill="white" opacity="0.7"/>
    <!-- Simplified apple shape -->
    <path d="M0,-25 C8,-30 15,-25 15,-18 C15,-8 8,5 0,15 C-8,5 -15,-8 -15,-18 C-15,-25 -8,-30 0,-25Z" fill="#333" opacity="0.6"/>
    <path d="M0,-25 C0,-30 5,-35 8,-33" fill="none" stroke="#333" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <text x="0" y="55" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="13" fill="#616161">iOS</text>
  </g>

  <!-- Download arrow (right side) -->
  <g transform="translate(650, 165)" filter="url(#s-ios-sm)">
    <circle cx="0" cy="0" r="40" fill="white" opacity="0.7"/>
    <rect x="-4" y="-18" width="8" height="22" rx="2" fill="#5C6BC0" opacity="0.7"/>
    <polygon points="0,14 -12,2 12,2" fill="#5C6BC0" opacity="0.7"/>
    <line x1="-14" y1="20" x2="14" y2="20" stroke="#5C6BC0" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#616161">Install</text>
  </g>

  <!-- Step indicators -->
  <g transform="translate(155, 260)" filter="url(#s-ios-sm)">
    <circle cx="0" cy="0" r="14" fill="#7C4DFF"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="white">1</text>
    <text x="25" y="5" font-family="sans-serif" font-weight="500" font-size="11" fill="#616161">Download</text>
  </g>
  <g transform="translate(155, 295)" filter="url(#s-ios-sm)">
    <circle cx="0" cy="0" r="14" fill="#7C4DFF"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="white">2</text>
    <text x="25" y="5" font-family="sans-serif" font-weight="500" font-size="11" fill="#616161">Install</text>
  </g>
  <g transform="translate(155, 330)" filter="url(#s-ios-sm)">
    <circle cx="0" cy="0" r="14" fill="#7C4DFF"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="white">3</text>
    <text x="25" y="5" font-family="sans-serif" font-weight="500" font-size="11" fill="#616161">Play!</text>
  </g>

  <!-- Title area -->
  <rect x="150" y="378" width="500" height="60" rx="12" fill="white" opacity="0.8"/>
  <text x="400" y="406" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#5C6BC0">iOS Installation Guide</text>
  <text x="400" y="428" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#7C4DFF">iPhone &amp; iPad Setup</text>
</svg>