<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg-ov" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <filter id="s-ov"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/></filter>
    <filter id="s-ov-sm"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Light grey background -->
  <rect width="800" height="450" fill="url(#bg-ov)"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.04" stroke="#607D8B" stroke-width="1">
    <line x1="0" y1="0" x2="450" y2="450"/>
    <line x1="100" y1="0" x2="550" y2="450"/>
    <line x1="200" y1="0" x2="650" y2="450"/>
    <line x1="300" y1="0" x2="750" y2="450"/>
    <line x1="400" y1="0" x2="800" y2="400"/>
    <line x1="500" y1="0" x2="800" y2="300"/>
    <line x1="600" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Timeline line -->
  <line x1="110" y1="215" x2="690" y2="215" stroke="#B0BEC5" stroke-width="3"/>

  <!-- Arrows on timeline -->
  <polygon points="690,215 680,208 680,222" fill="#B0BEC5"/>

  <!-- Version Card 1: v10 (oldest, faded) -->
  <g transform="translate(160, 130)" filter="url(#s-ov)">
    <rect x="-65" y="-70" width="130" height="140" rx="12" fill="white"/>
    <rect x="-65" y="-70" width="130" height="36" rx="12" fill="#90A4AE"/>
    <rect x="-65" y="-46" width="130" height="12" fill="#90A4AE"/>
    <!-- Version number -->
    <text x="0" y="-44" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="white">v10.0</text>
    <!-- Mini app icon -->
    <rect x="-22" y="-18" width="44" height="44" rx="10" fill="#C8E6C9"/>
    <circle cx="0" cy="4" r="12" fill="#8D6E63" opacity="0.5"/>
    <circle cx="-4" cy="0" r="2" fill="white" opacity="0.5"/>
    <circle cx="4" cy="0" r="2" fill="white" opacity="0.5"/>
    <!-- Info -->
    <text x="0" y="44" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="9" fill="#90A4AE">Mar 2025</text>
    <text x="0" y="58" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="8" fill="#B0BEC5">68 MB</text>
    <!-- Timeline connector -->
    <line x1="0" y1="70" x2="0" y2="85" stroke="#B0BEC5" stroke-width="2"/>
    <circle cx="0" cy="85" r="8" fill="#B0BEC5"/>
    <circle cx="0" cy="85" r="4" fill="white"/>
  </g>

  <!-- Version Card 2: v11 (middle) -->
  <g transform="translate(400, 120)" filter="url(#s-ov)">
    <rect x="-70" y="-75" width="140" height="150" rx="12" fill="white"/>
    <rect x="-70" y="-75" width="140" height="38" rx="12" fill="#66BB6A"/>
    <rect x="-70" y="-49" width="140" height="12" fill="#66BB6A"/>
    <!-- Version number -->
    <text x="0" y="-47" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="20" fill="white">v11.0</text>
    <!-- Mini app icon -->
    <rect x="-24" y="-18" width="48" height="48" rx="11" fill="#E8F5E9"/>
    <circle cx="0" cy="6" r="14" fill="#8D6E63"/>
    <circle cx="-5" cy="2" r="2.5" fill="white"/>
    <circle cx="5" cy="2" r="2.5" fill="white"/>
    <circle cx="-5" cy="2" r="1.3" fill="#333"/>
    <circle cx="5" cy="2" r="1.3" fill="#333"/>
    <ellipse cx="0" cy="10" rx="3.5" ry="2" fill="#5D4037"/>
    <!-- Info -->
    <text x="0" y="50" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="10" fill="#66BB6A">Sep 2025</text>
    <text x="0" y="64" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="9" fill="#81C784">72 MB</text>
    <!-- Timeline connector -->
    <line x1="0" y1="75" x2="0" y2="95" stroke="#66BB6A" stroke-width="2"/>
    <circle cx="0" cy="95" r="8" fill="#66BB6A"/>
    <circle cx="0" cy="95" r="4" fill="white"/>
  </g>

  <!-- Version Card 3: v12 (latest, prominent) -->
  <g transform="translate(640, 108)" filter="url(#s-ov)">
    <!-- Glow effect for latest -->
    <rect x="-78" y="-83" width="156" height="168" rx="14" fill="#4CAF50" opacity="0.1"/>
    <rect x="-75" y="-80" width="150" height="162" rx="12" fill="white"/>
    <rect x="-75" y="-80" width="150" height="42" rx="12" fill="#4CAF50"/>
    <rect x="-75" y="-50" width="150" height="12" fill="#4CAF50"/>
    <!-- LATEST badge -->
    <rect x="30" y="-95" width="52" height="18" rx="9" fill="#FF5722"/>
    <text x="56" y="-82" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="9" fill="white">LATEST</text>
    <!-- Version number -->
    <text x="0" y="-49" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="22" fill="white">v12.0</text>
    <!-- Mini app icon -->
    <rect x="-26" y="-18" width="52" height="52" rx="12" fill="#E8F5E9"/>
    <circle cx="0" cy="8" r="16" fill="#8D6E63"/>
    <circle cx="-6" cy="3" r="3" fill="white"/>
    <circle cx="6" cy="3" r="3" fill="white"/>
    <circle cx="-6" cy="3" r="1.5" fill="#333"/>
    <circle cx="6" cy="3" r="1.5" fill="#333"/>
    <ellipse cx="0" cy="12" rx="4" ry="2.5" fill="#5D4037"/>
    <path d="M-5,16 Q0,20 5,16" fill="none" stroke="#5D4037" stroke-width="1"/>
    <!-- Sparkle -->
    <polygon points="30,-15 32,-10 37,-10 33,-7 34,-2 30,-5 26,-2 27,-7 23,-10 28,-10" fill="#FFC107" opacity="0.7"/>
    <!-- Info -->
    <text x="0" y="52" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="10" fill="#4CAF50">Jun 2026</text>
    <text x="0" y="67" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="9" fill="#66BB6A">75 MB</text>
    <!-- Timeline connector -->
    <line x1="0" y1="82" x2="0" y2="107" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="0" cy="107" r="10" fill="#4CAF50"/>
    <circle cx="0" cy="107" r="5" fill="white"/>
    <!-- Checkmark in circle -->
    <path d="M-3,107 L-1,110 L4,104" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Archive icon (top left) -->
  <g transform="translate(70, 60)" filter="url(#s-ov-sm)">
    <rect x="-20" y="-16" width="40" height="32" rx="4" fill="white"/>
    <rect x="-20" y="-16" width="40" height="12" rx="4" fill="#78909C"/>
    <rect x="-7" y="2" width="14" height="8" rx="2" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <text x="0" y="55" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="11" fill="#78909C">Archive</text>
  </g>

  <!-- Download count badge -->
  <g transform="translate(730, 60)" filter="url(#s-ov-sm)">
    <rect x="-28" y="-12" width="56" height="24" rx="12" fill="#4CAF50" opacity="0.15"/>
    <!-- Download icon -->
    <rect x="-18" y="-4" width="4" height="8" rx="1" fill="#4CAF50"/>
    <polygon points="-16,6 -10,6 -16,6 -13,10" fill="#4CAF50"/>
    <text x="2" y="4" font-family="sans-serif" font-weight="600" font-size="10" fill="#4CAF50">APK</text>
  </g>

  <!-- Title area -->
  <rect x="100" y="310" width="600" height="65" rx="12" fill="white" opacity="0.85" filter="url(#s-ov-sm)"/>
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#455A64">Old Versions Archive</text>
  <text x="400" y="363" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#78909C">Download Previous APK Versions</text>
</svg>