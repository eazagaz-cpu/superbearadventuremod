<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg-am" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#F3E5AB"/>
    </linearGradient>
    <linearGradient id="map-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F0E68C"/>
    </linearGradient>
    <filter id="s-am"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/></filter>
    <filter id="paper-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#FFF8E1" surfaceScale="1.5" result="texture">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="texture" operator="arithmetic" k1="0.3" k2="0.7" k3="0" k4="0"/>
    </filter>
  </defs>

  <!-- Warm parchment background -->
  <rect width="800" height="450" fill="url(#bg-am)"/>

  <!-- Map paper -->
  <g filter="url(#s-am)">
    <rect x="80" y="30" width="640" height="340" rx="6" fill="url(#map-paper)"/>
    <!-- Aged edges -->
    <rect x="80" y="30" width="640" height="340" rx="6" fill="none" stroke="#D4A017" stroke-width="2"/>
    <!-- Curled corners effect -->
    <path d="M80,30 Q85,35 90,30" fill="#E6C200" opacity="0.3"/>
    <path d="M720,30 Q715,35 710,30" fill="#E6C200" opacity="0.3"/>
  </g>

  <!-- Compass rose (top right) -->
  <g transform="translate(640, 90)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#A0522D" stroke-width="1" opacity="0.6"/>
    <polygon points="0,-24 4,-8 0,0 -4,-8" fill="#A0522D" opacity="0.7"/>
    <polygon points="0,24 4,8 0,0 -4,8" fill="#D2B48C" opacity="0.7"/>
    <polygon points="-24,0 -8,4 0,0 -8,-4" fill="#D2B48C" opacity="0.7"/>
    <polygon points="24,0 8,4 0,0 8,-4" fill="#A0522D" opacity="0.7"/>
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="10" fill="#8B4513" font-weight="700">N</text>
    <text x="0" y="40" text-anchor="middle" font-family="serif" font-size="8" fill="#8B4513">S</text>
    <text x="32" y="4" text-anchor="middle" font-family="serif" font-size="8" fill="#8B4513">E</text>
    <text x="-32" y="4" text-anchor="middle" font-family="serif" font-size="8" fill="#8B4513">W</text>
  </g>

  <!-- Dotted adventure path -->
  <path d="M150,280 Q180,240 220,250 Q280,270 320,220 Q350,180 400,190 Q450,200 480,160 Q510,130 560,150 Q600,165 640,120"
        fill="none" stroke="#8B4513" stroke-width="3" stroke-dasharray="8,6" opacity="0.7"/>

  <!-- Mission marker 1: Village -->
  <g transform="translate(150, 275)">
    <circle cx="0" cy="0" r="16" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="white">1</text>
    <!-- Small house icon -->
    <g transform="translate(20, -20)" opacity="0.7">
      <rect x="-8" y="-4" width="16" height="12" fill="#8D6E63"/>
      <polygon points="-10,-4 0,-12 10,-4" fill="#D32F2F"/>
    </g>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#5D4037" font-style="italic">Turtletown</text>
  </g>

  <!-- Mission marker 2: Forest -->
  <g transform="translate(310, 218)">
    <circle cx="0" cy="0" r="16" fill="#FF9800" stroke="#E65100" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="white">2</text>
    <!-- Tree icons -->
    <g transform="translate(-25, -18)" opacity="0.6">
      <polygon points="0,-10 6,2 -6,2" fill="#4CAF50"/>
      <rect x="-1.5" y="2" width="3" height="5" fill="#795548"/>
    </g>
    <g transform="translate(-15, -22)" opacity="0.6">
      <polygon points="0,-10 6,2 -6,2" fill="#66BB6A"/>
      <rect x="-1.5" y="2" width="3" height="5" fill="#795548"/>
    </g>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#5D4037" font-style="italic">Giant House</text>
  </g>

  <!-- Mission marker 3: Desert -->
  <g transform="translate(470, 158)">
    <circle cx="0" cy="0" r="16" fill="#FF5722" stroke="#BF360C" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="white">3</text>
    <!-- Pyramid icon -->
    <g transform="translate(20, -15)" opacity="0.6">
      <polygon points="0,-12 12,4 -12,4" fill="#FFB74D"/>
    </g>
    <text x="0" y="30" text-anchor="middle" font-family="serif" font-size="10" fill="#5D4037" font-style="italic">Desert</text>
  </g>

  <!-- Mission marker 4: Snow -->
  <g transform="translate(640, 115)">
    <circle cx="0" cy="0" r="18" fill="#E91E63" stroke="#AD1457" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="14" fill="white">4</text>
    <!-- Star for final -->
    <polygon points="0,-28 4,-22 10,-22 5,-18 7,-12 0,-16 -7,-12 -5,-18 -10,-22 -4,-22" fill="#FFC107" opacity="0.8"/>
    <text x="0" y="32" text-anchor="middle" font-family="serif" font-size="10" fill="#5D4037" font-style="italic">Snow Valley</text>
  </g>

  <!-- Decorative map elements -->
  <!-- Mountains -->
  <g opacity="0.25" fill="#8B4513">
    <polygon points="530,90 550,60 570,90"/>
    <polygon points="555,90 575,55 595,90"/>
  </g>

  <!-- Water waves -->
  <g opacity="0.2" fill="none" stroke="#1565C0" stroke-width="1.5">
    <path d="M200,160 Q210,155 220,160 Q230,165 240,160"/>
    <path d="M210,170 Q220,165 230,170 Q240,175 250,170"/>
  </g>

  <!-- Small bear icon on path -->
  <g transform="translate(380, 200)">
    <circle cx="0" cy="0" r="10" fill="#8D6E63"/>
    <circle cx="-3" cy="-3" r="2" fill="white"/>
    <circle cx="3" cy="-3" r="2" fill="white"/>
    <circle cx="-3" cy="-3" r="1" fill="#333"/>
    <circle cx="3" cy="-3" r="1" fill="#333"/>
    <ellipse cx="0" cy="3" rx="3" ry="2" fill="#5D4037"/>
  </g>

  <!-- Legend box -->
  <g transform="translate(130, 80)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="#FFF9C4" stroke="#D4A017" stroke-width="1"/>
    <text x="60" y="18" text-anchor="middle" font-family="serif" font-weight="700" font-size="11" fill="#5D4037">LEGEND</text>
    <line x1="10" y1="24" x2="110" y2="24" stroke="#D4A017" stroke-width="0.5"/>
    <circle cx="22" cy="38" r="6" fill="#4CAF50"/><text x="36" y="42" font-family="sans-serif" font-size="9" fill="#5D4037">Easy</text>
    <circle cx="22" cy="54" r="6" fill="#FF9800"/><text x="36" y="58" font-family="sans-serif" font-size="9" fill="#5D4037">Medium</text>
    <circle cx="22" cy="70" r="6" fill="#E91E63"/><text x="36" y="74" font-family="sans-serif" font-size="9" fill="#5D4037">Hard</text>
  </g>

  <!-- Title area -->
  <rect x="150" y="375" width="500" height="65" rx="12" fill="white" opacity="0.8"/>
  <text x="400" y="405" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#795548">All Missions Guide</text>
  <text x="400" y="428" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#8D6E63">Complete Walkthrough &amp; Map</text>
</svg>