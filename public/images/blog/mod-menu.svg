<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg-mm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
    <linearGradient id="phone-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <linearGradient id="menu-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F5F5F5" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="s-mm"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.15"/></filter>
    <filter id="menu-shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/></filter>
  </defs>

  <!-- Light purple/blue background -->
  <rect width="800" height="450" fill="url(#bg-mm)"/>

  <!-- Background grid pattern -->
  <g opacity="0.06" stroke="#5C6BC0" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="450"/><line x1="40" y1="0" x2="40" y2="450"/>
    <line x1="80" y1="0" x2="80" y2="450"/><line x1="120" y1="0" x2="120" y2="450"/>
    <line x1="160" y1="0" x2="160" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="240" y1="0" x2="240" y2="450"/><line x1="280" y1="0" x2="280" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/><line x1="360" y1="0" x2="360" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/><line x1="440" y1="0" x2="440" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/><line x1="520" y1="0" x2="520" y2="450"/>
    <line x1="560" y1="0" x2="560" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/><line x1="680" y1="0" x2="680" y2="450"/>
    <line x1="720" y1="0" x2="720" y2="450"/><line x1="760" y1="0" x2="760" y2="450"/>
    <line x1="800" y1="0" x2="800" y2="450"/>
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
  </g>

  <!-- Phone device -->
  <g transform="translate(310, 195)" filter="url(#s-mm)">
    <!-- Phone body -->
    <rect x="-95" y="-165" width="190" height="340" rx="22" fill="#37474F"/>
    <rect x="-95" y="-165" width="190" height="340" rx="22" fill="none" stroke="#455A64" stroke-width="1"/>
    <!-- Screen -->
    <rect x="-82" y="-148" width="164" height="300" rx="6" fill="url(#phone-screen)"/>
    <!-- Game scene on screen -->
    <rect x="-82" y="-148" width="164" height="300" rx="6" fill="#81C784"/>
    <!-- Sky -->
    <rect x="-82" y="-148" width="164" height="120" rx="6" fill="#90CAF9" opacity="0.5"/>
    <!-- Clouds -->
    <g fill="white" opacity="0.6">
      <ellipse cx="-40" cy="-120" rx="20" ry="8"/>
      <ellipse cx="-28" cy="-120" rx="14" ry="10"/>
      <ellipse cx="30" cy="-110" rx="18" ry="7"/>
    </g>
    <!-- Hills -->
    <ellipse cx="-20" cy="30" rx="80" ry="50" fill="#66BB6A"/>
    <ellipse cx="50" cy="40" rx="60" ry="40" fill="#4CAF50"/>
    <!-- Bear character -->
    <circle cx="0" cy="0" r="12" fill="#8D6E63"/>
    <circle cx="-4" cy="-4" r="2" fill="white"/>
    <circle cx="4" cy="-4" r="2" fill="white"/>
    <!-- Notch -->
    <rect x="-22" y="-162" width="44" height="16" rx="8" fill="#37474F"/>
    <!-- Home bar -->
    <rect x="-25" y="142" width="50" height="4" rx="2" fill="#546E7A"/>
  </g>

  <!-- Floating mod menu panel (overlapping phone, shifted right) -->
  <g transform="translate(450, 115)" filter="url(#menu-shadow)">
    <rect x="0" y="0" width="220" height="250" rx="14" fill="url(#menu-bg)"/>
    <rect x="0" y="0" width="220" height="250" rx="14" fill="none" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Menu header -->
    <rect x="0" y="0" width="220" height="42" rx="14" fill="#7C4DFF"/>
    <rect x="0" y="20" width="220" height="22" fill="#7C4DFF"/>
    <!-- Gear icon -->
    <circle cx="24" cy="21" r="10" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
    <circle cx="24" cy="21" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <text x="120" y="26" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="white">MOD MENU</text>

    <!-- Toggle items -->
    <!-- Item 1: ON -->
    <g transform="translate(16, 56)">
      <circle cx="8" cy="6" r="8" fill="#E8F5E9"/>
      <text x="8" y="10" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#4CAF50">$</text>
      <text x="28" y="10" font-family="sans-serif" font-weight="600" font-size="12" fill="#333">Unlimited Coins</text>
      <rect x="155" y="-2" width="36" height="18" rx="9" fill="#4CAF50"/>
      <circle cx="181" cy="7" r="6.5" fill="white"/>
    </g>

    <!-- Item 2: ON -->
    <g transform="translate(16, 92)">
      <circle cx="8" cy="6" r="8" fill="#E8F5E9"/>
      <text x="8" y="10" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#4CAF50">U</text>
      <text x="28" y="10" font-family="sans-serif" font-weight="600" font-size="12" fill="#333">All Skins Unlocked</text>
      <rect x="155" y="-2" width="36" height="18" rx="9" fill="#4CAF50"/>
      <circle cx="181" cy="7" r="6.5" fill="white"/>
    </g>

    <!-- Item 3: ON -->
    <g transform="translate(16, 128)">
      <circle cx="8" cy="6" r="8" fill="#E8F5E9"/>
      <text x="8" y="10" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#4CAF50">X</text>
      <text x="28" y="10" font-family="sans-serif" font-weight="600" font-size="12" fill="#333">No Ads</text>
      <rect x="155" y="-2" width="36" height="18" rx="9" fill="#4CAF50"/>
      <circle cx="181" cy="7" r="6.5" fill="white"/>
    </g>

    <!-- Item 4: OFF -->
    <g transform="translate(16, 164)">
      <circle cx="8" cy="6" r="8" fill="#FAFAFA"/>
      <text x="8" y="10" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#BDBDBD">G</text>
      <text x="28" y="10" font-family="sans-serif" font-weight="600" font-size="12" fill="#999">God Mode</text>
      <rect x="155" y="-2" width="36" height="18" rx="9" fill="#E0E0E0"/>
      <circle cx="165" cy="7" r="6.5" fill="white"/>
    </g>

    <!-- Item 5: OFF -->
    <g transform="translate(16, 200)">
      <circle cx="8" cy="6" r="8" fill="#FAFAFA"/>
      <text x="8" y="10" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#BDBDBD">S</text>
      <text x="28" y="10" font-family="sans-serif" font-weight="600" font-size="12" fill="#999">Speed Hack</text>
      <rect x="155" y="-2" width="36" height="18" rx="9" fill="#E0E0E0"/>
      <circle cx="165" cy="7" r="6.5" fill="white"/>
    </g>
  </g>

  <!-- Decorative floating icons -->
  <g opacity="0.15">
    <circle cx="130" cy="100" r="20" fill="#7C4DFF"/>
    <text x="130" y="107" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="18" fill="white">+</text>
    <circle cx="150" cy="300" r="16" fill="#4CAF50"/>
    <rect x="105" y="180" width="30" height="30" rx="8" fill="#FF9800"/>
  </g>

  <!-- Title area -->
  <rect x="100" y="375" width="600" height="65" rx="12" fill="white" opacity="0.8"/>
  <text x="400" y="405" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#5C6BC0">Mod Menu Features</text>
  <text x="400" y="428" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#7C4DFF">All Mod Options Explained</text>
</svg>