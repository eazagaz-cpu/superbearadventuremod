<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4E342E"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFA726" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3E2723" stop-opacity="0"/>
    </radialGradient>
    <filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- Cave walls -->
  <path d="M0,100 Q100,80 200,120 Q300,60 400,100 Q500,70 600,110 Q700,80 800,90 L800,0 L0,0Z" fill="#5D4037"/>
  <path d="M0,380 Q150,350 300,370 Q450,340 600,360 Q700,350 800,380 L800,450 L0,450Z" fill="#5D4037"/>
  <!-- Stalactites -->
  <polygon points="150,100 160,160 140,160" fill="#6D4C41"/>
  <polygon points="350,90 358,140 342,140" fill="#6D4C41"/>
  <polygon points="550,100 558,155 542,155" fill="#6D4C41"/>
  <!-- Mine cart on tracks -->
  <g transform="translate(400, 300)" filter="url(#s)">
    <!-- Tracks -->
    <line x1="-200" y1="30" x2="200" y2="30" stroke="#795548" stroke-width="4"/>
    <line x1="-200" y1="38" x2="200" y2="38" stroke="#795548" stroke-width="4"/>
    <!-- Ties -->
    <rect x="-160" y="28" width="8" height="12" fill="#6D4C41"/>
    <rect x="-100" y="28" width="8" height="12" fill="#6D4C41"/>
    <rect x="-40" y="28" width="8" height="12" fill="#6D4C41"/>
    <rect x="20" y="28" width="8" height="12" fill="#6D4C41"/>
    <rect x="80" y="28" width="8" height="12" fill="#6D4C41"/>
    <rect x="140" y="28" width="8" height="12" fill="#6D4C41"/>
    <!-- Cart body -->
    <polygon points="-40,-10 -50,25 50,25 40,-10" fill="#757575"/>
    <polygon points="-40,-10 -50,25 50,25 40,-10" fill="none" stroke="#9E9E9E" stroke-width="1.5"/>
    <!-- Gems in cart -->
    <polygon points="-15,-5 -8,8 -22,8" fill="#4FC3F7"/>
    <polygon points="5,0 12,10 -2,10" fill="#66BB6A"/>
    <polygon points="20,-3 27,8 13,8" fill="#EF5350"/>
    <!-- Wheels -->
    <circle cx="-30" cy="30" r="8" fill="#616161" stroke="#9E9E9E" stroke-width="2"/>
    <circle cx="30" cy="30" r="8" fill="#616161" stroke="#9E9E9E" stroke-width="2"/>
  </g>
  <!-- Gems on walls -->
  <g filter="url(#s)">
    <polygon points="120,200 130,215 110,215" fill="#4FC3F7" opacity="0.8"/>
    <polygon points="650,180 660,195 640,195" fill="#E040FB" opacity="0.7"/>
    <polygon points="250,350 258,362 242,362" fill="#FFD54F" opacity="0.8"/>
    <polygon points="580,340 588,352 572,352" fill="#66BB6A" opacity="0.7"/>
  </g>
  <!-- Lantern glow -->
  <circle cx="400" cy="200" r="60" fill="#FFA726" opacity="0.08"/>
  <circle cx="400" cy="200" r="30" fill="#FFB74D" opacity="0.15"/>
  <!-- Lantern -->
  <g transform="translate(400, 200)" filter="url(#s)">
    <rect x="-8" y="-20" width="16" height="25" rx="3" fill="#FF8F00"/>
    <rect x="-6" y="-17" width="12" height="19" rx="2" fill="#FFD54F" opacity="0.6"/>
    <rect x="-4" y="-22" width="8" height="4" rx="2" fill="#795548"/>
  </g>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="28" fill="#EFEBE9">Mole Mines Guide</text>
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="14" fill="#BCAAA4">Underground Adventure</text>
</svg>