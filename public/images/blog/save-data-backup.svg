<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Phone icon -->
  <rect x="60" y="100" width="150" height="250" rx="18" fill="#0a1a3a" stroke="#42a5f5" stroke-width="2"/>
  <rect x="75" y="125" width="120" height="190" rx="4" fill="#1a2a4a"/>
  <text x="135" y="215" font-family="Arial,sans-serif" font-size="40" text-anchor="middle">💾</text>
  <text x="135" y="248" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="#90caf9">SAVE DATA</text>
  <circle cx="135" cy="325" r="12" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <!-- Arrow with cloud -->
  <text x="232" y="230" font-family="Arial,sans-serif" font-size="30" fill="#42a5f5">☁</text>
  <text x="237" y="265" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" fill="#42a5f5">backup</text>
  <!-- Right panel -->
  <rect x="310" y="80" width="460" height="290" rx="12" fill="#0a1020" opacity="0.8"/>
  <text x="540" y="125" font-family="Arial,sans-serif" font-size="26" font-weight="900" text-anchor="middle" fill="#fff">Save Data Backup</text>
  <text x="540" y="152" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="#42a5f5">Android • Before Every Update</text>
  <rect x="325" y="165" width="430" height="1.5" fill="#42a5f5" opacity="0.4"/>
  <text x="330" y="192" font-family="Arial,sans-serif" font-size="13" fill="#ddd">Method A: Google Drive sync (automatic)</text>
  <text x="330" y="215" font-family="Arial,sans-serif" font-size="13" fill="#ddd">Method B: Manual file copy to SD card</text>
  <text x="330" y="238" font-family="Arial,sans-serif" font-size="13" fill="#ddd">Method C: Titanium Backup (root users)</text>
  <text x="330" y="261" font-family="Arial,sans-serif" font-size="13" fill="#ddd">Save path: /Android/data/com.earthkwak...</text>
  <text x="330" y="284" font-family="Arial,sans-serif" font-size="13" fill="#ddd">Restore: copy back, reinstall, launch</text>
  <rect x="325" y="305" width="430" height="40" rx="8" fill="#1565c0" opacity="0.3"/>
  <text x="540" y="329" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#90caf9">Always backup before updating or reinstalling</text>
  <text x="400" y="415" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#555">superbearadventuremod.io</text>
</svg>
