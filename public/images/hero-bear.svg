<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 840" width="640" height="840">
  <defs>
    <linearGradient id="hsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="hgrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <linearGradient id="hpath" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D7CCC8"/>
      <stop offset="100%" stop-color="#BCAAA4"/>
    </linearGradient>
    <filter id="hs"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1B5E20" flood-opacity="0.2"/></filter>
    <filter id="hglow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Sky -->
  <rect width="640" height="840" fill="url(#hsky)"/>
  <!-- Clouds -->
  <g opacity="0.8">
    <ellipse cx="120" cy="80" rx="70" ry="22" fill="white"/><ellipse cx="140" cy="70" rx="50" ry="18" fill="white"/>
    <ellipse cx="450" cy="50" rx="60" ry="20" fill="white"/><ellipse cx="470" cy="42" rx="40" ry="15" fill="white"/>
    <ellipse cx="300" cy="120" rx="45" ry="14" fill="white" opacity="0.6"/>
  </g>
  <!-- Sun -->
  <circle cx="540" cy="80" r="50" fill="#FFD54F" opacity="0.9"/>
  <circle cx="540" cy="80" r="35" fill="#FFEB3B"/>
  <!-- Mountains background -->
  <polygon points="0,400 150,220 300,350 400,200 550,300 640,250 640,400" fill="#81C784" opacity="0.5"/>
  <polygon points="0,420 100,280 250,380 350,260 500,340 640,280 640,420" fill="#66BB6A" opacity="0.6"/>
  <!-- Main ground -->
  <rect x="0" y="380" width="640" height="460" fill="url(#hgrass)"/>
  <!-- Path -->
  <path d="M200,840 Q220,700 300,600 Q380,520 320,450 Q280,400 340,380" fill="url(#hpath)" stroke="#A1887F" stroke-width="1" opacity="0.8"/>
  <!-- Trees -->
  <g filter="url(#hs)">
    <rect x="78" y="340" width="8" height="50" fill="#5D4037"/>
    <polygon points="82,280 115,355 49,355" fill="#2E7D32"/>
    <polygon points="82,310 108,345 56,345" fill="#388E3C"/>
    <rect x="518" y="350" width="8" height="45" fill="#5D4037"/>
    <polygon points="522,295 555,365 489,365" fill="#2E7D32"/>
    <polygon points="522,320 548,355 496,355" fill="#388E3C"/>
    <rect x="450" y="360" width="6" height="35" fill="#5D4037"/>
    <polygon points="453,320 478,370 428,370" fill="#1B5E20"/>
  </g>
  <!-- Houses -->
  <g filter="url(#hs)">
    <rect x="150" y="360" width="50" height="40" rx="2" fill="#FFCC80"/>
    <polygon points="145,360 175,330 205,360" fill="#E53935"/>
    <rect x="168" y="380" width="14" height="20" rx="1" fill="#5D4037"/>
    <rect x="155" y="370" width="10" height="10" rx="1" fill="#B3E5FC" stroke="#90CAF9" stroke-width="1"/>
    <rect x="500" y="370" width="40" height="35" rx="2" fill="#FFE0B2"/>
    <polygon points="496,370 520,345 544,370" fill="#D32F2F"/>
    <rect x="513" y="385" width="12" height="20" rx="1" fill="#5D4037"/>
  </g>
  <!-- Flowers -->
  <g>
    <circle cx="250" cy="430" r="4" fill="#F44336"/><circle cx="250" cy="430" r="2" fill="#FFEB3B"/>
    <circle cx="380" cy="410" r="4" fill="#E040FB"/><circle cx="380" cy="410" r="2" fill="#FFEB3B"/>
    <circle cx="130" cy="450" r="3" fill="#FF5722"/><circle cx="130" cy="450" r="1.5" fill="#FFF176"/>
    <circle cx="490" cy="440" r="4" fill="#2196F3"/><circle cx="490" cy="440" r="2" fill="#FFF176"/>
    <circle cx="350" cy="460" r="3" fill="#F44336"/><circle cx="350" cy="460" r="1.5" fill="#FFEB3B"/>
  </g>
  <!-- Coins floating -->
  <g filter="url(#hglow)">
    <circle cx="280" cy="300" r="10" fill="#FFD54F" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="350" cy="270" r="10" fill="#FFD54F" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="310" cy="250" r="10" fill="#FFD54F" stroke="#FF8F00" stroke-width="1.5"/>
    <circle cx="390" cy="290" r="8" fill="#FFD54F" stroke="#FF8F00" stroke-width="1.5"/>
  </g>
  <!-- Main Bear Character (Baaren) - Large and centered -->
  <g transform="translate(320, 520)" filter="url(#hs)">
    <!-- Shadow on ground -->
    <ellipse cx="0" cy="100" rx="45" ry="12" fill="#1B5E20" opacity="0.2"/>
    <!-- Feet -->
    <ellipse cx="-22" cy="90" rx="18" ry="10" fill="#5D4037"/>
    <ellipse cx="22" cy="90" rx="18" ry="10" fill="#5D4037"/>
    <ellipse cx="-22" cy="88" rx="14" ry="7" fill="#6D4C41"/>
    <ellipse cx="22" cy="88" rx="14" ry="7" fill="#6D4C41"/>
    <!-- Body -->
    <ellipse cx="0" cy="35" rx="42" ry="55" fill="#795548"/>
    <ellipse cx="0" cy="40" rx="32" ry="38" fill="#A1887F"/>
    <!-- Arms -->
    <ellipse cx="-48" cy="25" rx="14" ry="28" fill="#795548" transform="rotate(-15 -48 25)"/>
    <ellipse cx="48" cy="25" rx="14" ry="28" fill="#795548" transform="rotate(15 48 25)"/>
    <!-- Head -->
    <ellipse cx="0" cy="-35" rx="38" ry="32" fill="#795548"/>
    <!-- Ears -->
    <circle cx="-28" cy="-58" r="14" fill="#795548"/>
    <circle cx="28" cy="-58" r="14" fill="#795548"/>
    <circle cx="-28" cy="-58" r="9" fill="#A1887F"/>
    <circle cx="28" cy="-58" r="9" fill="#A1887F"/>
    <!-- Face -->
    <ellipse cx="0" cy="-28" rx="22" ry="18" fill="#A1887F"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-32" rx="8" ry="5.5" fill="#4E342E"/>
    <ellipse cx="-2" cy="-34" rx="2.5" ry="1.5" fill="#6D4C41" opacity="0.5"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-42" r="5" fill="#3E2723"/>
    <circle cx="12" cy="-42" r="5" fill="#3E2723"/>
    <circle cx="-10" cy="-44" r="2" fill="white"/>
    <circle cx="14" cy="-44" r="2" fill="white"/>
    <!-- Mouth -->
    <path d="M-8,-22 Q0,-16 8,-22" stroke="#4E342E" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Belly detail -->
    <ellipse cx="0" cy="50" rx="18" ry="14" fill="#BCAAA4" opacity="0.4"/>
  </g>
  <!-- Turtle friend -->
  <g transform="translate(450, 600)" filter="url(#hs)">
    <ellipse cx="0" cy="5" rx="22" ry="14" fill="#2E7D32"/>
    <ellipse cx="0" cy="0" rx="17" ry="10" fill="#4CAF50"/>
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#2E7D32" stroke-width="1"/>
    <line x1="-3" y1="-8" x2="-3" y2="5" stroke="#2E7D32" stroke-width="1"/>
    <line x1="3" y1="-8" x2="3" y2="5" stroke="#2E7D32" stroke-width="1"/>
    <circle cx="-20" cy="2" r="5" fill="#388E3C"/>
    <circle cx="-22" cy="0" r="1.5" fill="#1B5E20"/>
    <circle cx="16" cy="8" r="3.5" fill="#388E3C"/>
    <circle cx="-12" cy="10" r="3.5" fill="#388E3C"/>
  </g>
  <!-- HUD overlay - coins counter -->
  <g transform="translate(30, 30)">
    <rect x="0" y="0" width="130" height="40" rx="20" fill="black" opacity="0.4"/>
    <circle cx="25" cy="20" r="12" fill="#FFD54F" stroke="#FF8F00" stroke-width="1.5"/>
    <text x="25" y="25" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="12" fill="#E65100">$</text>
    <text x="80" y="26" text-anchor="middle" font-family="monospace" font-weight="900" font-size="16" fill="white">999,999</text>
  </g>
  <!-- HUD - health -->
  <g transform="translate(480, 30)">
    <rect x="0" y="0" width="130" height="40" rx="20" fill="black" opacity="0.4"/>
    <text x="25" y="27" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#E53935">&#x2764;</text>
    <rect x="45" y="14" width="70" height="12" rx="6" fill="#424242"/>
    <rect x="45" y="14" width="65" height="12" rx="6" fill="#4CAF50"/>
  </g>
</svg>