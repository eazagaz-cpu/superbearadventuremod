<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <radialGradient id="spotG" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C8E6C9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="furGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D7CCC8"/>
      <stop offset="100%" stop-color="#BCAAA4"/>
    </linearGradient>
    <filter id="bearShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#33691E" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="bowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#hbg)"/>
  <circle cx="600" cy="280" r="400" fill="url(#spotG)"/>
  <!-- Decorative sparkles -->
  <g fill="#8BC34A" opacity="0.3">
    <polygon points="150,100 155,115 170,115 158,125 162,140 150,130 138,140 142,125 130,115 145,115" />
    <polygon points="1050,80 1055,95 1070,95 1058,105 1062,120 1050,110 1038,120 1042,105 1030,95 1045,95" />
    <polygon points="900,520 905,535 920,535 908,545 912,560 900,550 888,560 892,545 880,535 895,535" />
    <polygon points="250,480 255,495 270,495 258,505 262,520 250,510 238,520 242,505 230,495 245,495" />
  </g>
  <!-- Bear body group -->
  <g transform="translate(600, 310)" filter="url(#bearShadow)">
    <!-- Body -->
    <ellipse cx="0" cy="80" rx="130" ry="150" fill="url(#furGrad)"/>
    <!-- Belly -->
    <ellipse cx="0" cy="90" rx="85" ry="100" fill="url(#bellyGrad)"/>
    <!-- Left arm -->
    <ellipse cx="-120" cy="60" rx="45" ry="70" fill="#795548" transform="rotate(-15, -120, 60)"/>
    <ellipse cx="-135" cy="115" rx="28" ry="22" fill="#6D4C41"/>
    <!-- Right arm (waving) -->
    <ellipse cx="130" cy="0" rx="45" ry="70" fill="#795548" transform="rotate(25, 130, 0)"/>
    <ellipse cx="160" cy="-55" rx="28" ry="22" fill="#6D4C41" transform="rotate(25, 160, -55)"/>
    <!-- Left leg -->
    <ellipse cx="-55" cy="220" rx="45" ry="35" fill="#5D4037"/>
    <!-- Right leg -->
    <ellipse cx="55" cy="220" rx="45" ry="35" fill="#5D4037"/>
    <!-- Feet pads -->
    <ellipse cx="-55" cy="225" rx="28" ry="18" fill="#8D6E63"/>
    <ellipse cx="55" cy="225" rx="28" ry="18" fill="#8D6E63"/>
    <!-- Head -->
    <circle cx="0" cy="-80" r="100" fill="url(#furGrad)"/>
    <!-- Inner face -->
    <circle cx="0" cy="-65" r="60" fill="#A1887F" opacity="0.3"/>
    <!-- Ears -->
    <circle cx="-72" cy="-155" r="38" fill="#795548"/>
    <circle cx="72" cy="-155" r="38" fill="#795548"/>
    <circle cx="-72" cy="-155" r="22" fill="#BCAAA4"/>
    <circle cx="72" cy="-155" r="22" fill="#BCAAA4"/>
    <!-- Eyes -->
    <ellipse cx="-30" cy="-95" rx="18" ry="20" fill="white"/>
    <ellipse cx="30" cy="-95" rx="18" ry="20" fill="white"/>
    <circle cx="-25" cy="-92" r="10" fill="#2E7D32"/>
    <circle cx="35" cy="-92" r="10" fill="#2E7D32"/>
    <circle cx="-23" cy="-94" r="4" fill="white"/>
    <circle cx="37" cy="-94" r="4" fill="white"/>
    <!-- Eyebrows (friendly) -->
    <path d="M-48 -118 Q-30 -128 -12 -118" fill="none" stroke="#4E342E" stroke-width="3" stroke-linecap="round"/>
    <path d="M12 -118 Q30 -128 48 -118" fill="none" stroke="#4E342E" stroke-width="3" stroke-linecap="round"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-65" rx="22" ry="16" fill="#5D4037"/>
    <ellipse cx="-4" cy="-68" rx="8" ry="5" fill="#795548" opacity="0.5"/>
    <!-- Mouth (big smile) -->
    <path d="M-25 -48 Q0 -25 25 -48" fill="none" stroke="#4E342E" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Cheek blush -->
    <ellipse cx="-55" cy="-65" rx="18" ry="12" fill="#EF9A9A" opacity="0.4"/>
    <ellipse cx="55" cy="-65" rx="18" ry="12" fill="#EF9A9A" opacity="0.4"/>
    <!-- Red bow tie -->
    <g transform="translate(0, -5)">
      <polygon points="-40,-15 0,0 -40,15" fill="url(#bowGrad)"/>
      <polygon points="40,-15 0,0 40,15" fill="url(#bowGrad)"/>
      <circle cx="0" cy="0" r="10" fill="#E53935"/>
      <circle cx="0" cy="0" r="6" fill="#EF5350"/>
    </g>
  </g>
  <!-- Title -->
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="36" fill="#33691E">SUPER BEAR ADVENTURE</text>
</svg>