<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Shield -->
  <g transform="translate(200, 140)" filter="url(#s)">
    <path d="M0,-70 L65,-45 L65,20 L0,70 L-65,20 L-65,-45Z" fill="#558B2F" stroke="#8BC34A" stroke-width="3"/>
    <path d="M0,-55 L50,-35 L50,15 L0,55 L-50,15 L-50,-35Z" fill="#4CAF50"/>
    <!-- AD text with strike -->
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="36" fill="#F44336" opacity="0.6">AD</text>
    <!-- Strike through -->
    <line x1="-40" y1="30" x2="40" y2="-25" stroke="#F44336" stroke-width="5" stroke-linecap="round"/>
    <!-- Checkmark overlay -->
    <g transform="translate(25, -25)">
      <circle cx="0" cy="0" r="16" fill="#8BC34A"/>
      <path d="M-7,0 L-2,5 L7,-4" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <text x="200" y="245" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="18" fill="#F1F8E9">No Ads</text>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="12" fill="#A5D6A7">Ad-Free Gaming Experience</text>
</svg>