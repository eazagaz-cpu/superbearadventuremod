<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="apkIcon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="btnGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <filter id="apkShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg3)" rx="12"/>

  <!-- Subtle radial decoration -->
  <circle cx="400" cy="200" r="200" fill="#558B2F" opacity="0.15"/>
  <circle cx="400" cy="200" r="150" fill="#558B2F" opacity="0.1"/>

  <!-- Title -->
  <rect x="275" y="16" width="250" height="40" rx="20" fill="#fff" opacity="0.15"/>
  <text x="400" y="43" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">STEP 3: INSTALL APK</text>

  <!-- APK File Icon -->
  <g filter="url(#apkShadow)">
    <!-- File body -->
    <path d="M340,90 L440,90 L470,120 L470,285 Q470,293 462,293 L338,293 Q330,293 330,285 L330,98 Q330,90 338,90 Z" fill="url(#apkIcon)"/>
    <!-- Folded corner -->
    <path d="M440,90 L440,120 L470,120 Z" fill="#81C784"/>
    <path d="M440,90 L440,120 L470,120 Z" fill="#000" opacity="0.1"/>

    <!-- Android robot icon on file -->
    <g transform="translate(400, 170)">
      <!-- Head -->
      <path d="M-20,-25 Q-20,-40 0,-40 Q20,-40 20,-25 Z" fill="#1B5E20"/>
      <!-- Antennae -->
      <line x1="-12" y1="-40" x2="-18" y2="-52" stroke="#1B5E20" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="12" y1="-40" x2="18" y2="-52" stroke="#1B5E20" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Eyes -->
      <circle cx="-8" cy="-32" r="2.5" fill="#fff"/>
      <circle cx="8" cy="-32" r="2.5" fill="#fff"/>
      <!-- Body -->
      <rect x="-20" y="-23" width="40" height="35" rx="4" fill="#1B5E20"/>
      <!-- Arms -->
      <rect x="-28" y="-20" width="6" height="25" rx="3" fill="#1B5E20"/>
      <rect x="22" y="-20" width="6" height="25" rx="3" fill="#1B5E20"/>
      <!-- Legs -->
      <rect x="-14" y="13" width="6" height="15" rx="3" fill="#1B5E20"/>
      <rect x="8" y="13" width="6" height="15" rx="3" fill="#1B5E20"/>
    </g>

    <!-- APK label -->
    <rect x="355" y="225" width="90" height="28" rx="6" fill="#1B5E20" opacity="0.8"/>
    <text x="400" y="244" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">.APK</text>
  </g>

  <!-- Tap/finger indicator -->
  <g transform="translate(490, 195)">
    <circle cx="0" cy="0" r="35" fill="#A5D6A7" opacity="0.1"/>
    <circle cx="0" cy="0" r="25" fill="#A5D6A7" opacity="0.15"/>
    <circle cx="0" cy="0" r="15" fill="#A5D6A7" opacity="0.2"/>
    <ellipse cx="0" cy="-5" rx="14" ry="18" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
    <ellipse cx="0" cy="-20" rx="10" ry="6" fill="#FFE0B2"/>
  </g>

  <!-- File name label -->
  <rect x="220" y="305" width="360" height="36" rx="8" fill="#fff" opacity="0.1"/>
  <text x="400" y="329" font-family="'Courier New', monospace" font-size="13" fill="#C8E6C9" text-anchor="middle" font-weight="500">SuperBearAdventure-Mod.apk</text>

  <!-- Install button -->
  <g filter="url(#glow3)">
    <rect x="310" y="355" width="180" height="48" rx="24" fill="url(#btnGrad3)"/>
    <rect x="310" y="355" width="180" height="24" rx="12" fill="#fff" opacity="0.1"/>
    <text x="400" y="385" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#fff" text-anchor="middle" font-weight="700" letter-spacing="1">INSTALL</text>
  </g>

  <!-- Checkmark badge -->
  <g transform="translate(520, 365)">
    <circle cx="0" cy="14" r="20" fill="#2E7D32"/>
    <circle cx="0" cy="14" r="17" fill="#43A047"/>
    <polyline points="-8,14 -3,20 10,6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Left info panel -->
  <g transform="translate(50, 115)">
    <rect x="0" y="0" width="140" height="100" rx="12" fill="#fff" opacity="0.07"/>
    <text x="70" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#81C784" text-anchor="middle" font-weight="600">VERSION</text>
    <text x="70" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">v3.2</text>
    <line x1="20" y1="58" x2="120" y2="58" stroke="#558B2F" stroke-width="0.5"/>
    <text x="70" y="76" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#81C784" text-anchor="middle" font-weight="600">SIZE</text>
    <text x="70" y="94" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">45 MB</text>
  </g>

  <!-- Right info panel -->
  <g transform="translate(610, 115)">
    <rect x="0" y="0" width="140" height="100" rx="12" fill="#fff" opacity="0.07"/>
    <text x="70" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#81C784" text-anchor="middle" font-weight="600">ANDROID</text>
    <text x="70" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">5.0+</text>
    <line x1="20" y1="58" x2="120" y2="58" stroke="#558B2F" stroke-width="0.5"/>
    <text x="70" y="76" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#81C784" text-anchor="middle" font-weight="600">STATUS</text>
    <text x="70" y="94" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#A5D6A7" text-anchor="middle" font-weight="700">Safe</text>
  </g>

  <!-- Decorative corners -->
  <circle cx="70" cy="400" r="15" fill="#66BB6A" opacity="0.12"/>
  <circle cx="730" cy="60" r="20" fill="#558B2F" opacity="0.15"/>
</svg>