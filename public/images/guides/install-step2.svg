<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="phoneBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="toggleOn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#7CB342"/>
    </linearGradient>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg2)" rx="12"/>

  <!-- Background dots -->
  <g opacity="0.04">
    <circle cx="50" cy="50" r="3" fill="#fff"/>
    <circle cx="100" cy="50" r="3" fill="#fff"/>
    <circle cx="150" cy="50" r="3" fill="#fff"/>
    <circle cx="650" cy="50" r="3" fill="#fff"/>
    <circle cx="700" cy="50" r="3" fill="#fff"/>
    <circle cx="750" cy="50" r="3" fill="#fff"/>
    <circle cx="50" cy="100" r="3" fill="#fff"/>
    <circle cx="100" cy="100" r="3" fill="#fff"/>
    <circle cx="700" cy="100" r="3" fill="#fff"/>
    <circle cx="750" cy="100" r="3" fill="#fff"/>
    <circle cx="50" cy="350" r="3" fill="#fff"/>
    <circle cx="100" cy="350" r="3" fill="#fff"/>
    <circle cx="700" cy="350" r="3" fill="#fff"/>
    <circle cx="750" cy="350" r="3" fill="#fff"/>
    <circle cx="50" cy="400" r="3" fill="#fff"/>
    <circle cx="100" cy="400" r="3" fill="#fff"/>
    <circle cx="700" cy="400" r="3" fill="#fff"/>
    <circle cx="750" cy="400" r="3" fill="#fff"/>
  </g>

  <!-- Title -->
  <rect x="220" y="16" width="360" height="40" rx="20" fill="#fff" opacity="0.15"/>
  <text x="400" y="43" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">STEP 2: ENABLE INSTALLATION</text>

  <!-- Phone mockup -->
  <g filter="url(#phoneShadow)">
    <rect x="285" y="65" width="230" height="380" rx="24" fill="url(#phoneBody)"/>
    <rect x="291" y="71" width="218" height="368" rx="20" fill="#1a1a1a"/>
    <rect x="298" y="90" width="204" height="330" rx="4" fill="url(#screenBg)"/>

    <!-- Status bar -->
    <rect x="298" y="90" width="204" height="24" fill="#E8F5E9"/>
    <text x="310" y="106" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#558B2F" font-weight="600">9:41</text>
    <rect x="472" y="96" width="18" height="9" rx="2" fill="#558B2F"/>
    <rect x="490" y="98" width="2" height="5" rx="1" fill="#558B2F"/>

    <!-- Settings header -->
    <rect x="298" y="114" width="204" height="36" fill="#558B2F"/>
    <polygon points="312,132 320,124 320,128 330,128 330,136 320,136 320,140" fill="#fff"/>
    <circle cx="350" cy="132" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
    <circle cx="350" cy="132" r="3" fill="#fff"/>
    <line x1="350" y1="121" x2="350" y2="125" stroke="#fff" stroke-width="2"/>
    <line x1="350" y1="139" x2="350" y2="143" stroke="#fff" stroke-width="2"/>
    <line x1="339" y1="132" x2="343" y2="132" stroke="#fff" stroke-width="2"/>
    <line x1="357" y1="132" x2="361" y2="132" stroke="#fff" stroke-width="2"/>
    <text x="370" y="136" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#fff" font-weight="600">Settings</text>

    <!-- Security section header -->
    <rect x="298" y="155" width="204" height="26" fill="#F1F8E9"/>
    <path d="M316,161 L316,172 Q316,178 322,180 Q328,178 328,172 L328,161 Z" fill="#558B2F" opacity="0.7"/>
    <text x="336" y="173" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#558B2F" font-weight="700">SECURITY</text>

    <!-- Item 1 - Screen Lock -->
    <rect x="298" y="182" width="204" height="44" fill="#FAFAFA"/>
    <line x1="310" y1="226" x2="490" y2="226" stroke="#E0E0E0" stroke-width="0.5"/>
    <text x="316" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#757575" font-weight="500">Screen Lock</text>
    <text x="316" y="216" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#BDBDBD">PIN enabled</text>
    <rect x="460" y="196" width="30" height="16" rx="8" fill="#BDBDBD"/>
    <circle cx="469" cy="204" r="6" fill="#fff"/>

    <!-- Item 2 - HIGHLIGHTED Unknown Sources -->
    <rect x="298" y="227" width="204" height="52" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
    <text x="316" y="248" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#1B5E20" font-weight="700">Install Unknown Apps</text>
    <text x="316" y="263" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#558B2F">Allow from this source</text>
    <rect x="455" y="243" width="34" height="18" rx="9" fill="url(#toggleOn)" filter="url(#glow2)"/>
    <circle cx="480" cy="252" r="7" fill="#fff"/>
    <polyline points="476,252 479,255 484,249" fill="none" stroke="#558B2F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Item 3 - Play Protect -->
    <rect x="298" y="280" width="204" height="44" fill="#FAFAFA"/>
    <line x1="310" y1="324" x2="490" y2="324" stroke="#E0E0E0" stroke-width="0.5"/>
    <text x="316" y="298" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#757575" font-weight="500">Google Play Protect</text>
    <text x="316" y="314" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#BDBDBD">Scan apps for threats</text>
    <rect x="460" y="294" width="30" height="16" rx="8" fill="#BDBDBD"/>
    <circle cx="469" cy="302" r="6" fill="#fff"/>

    <!-- Item 4 - Encryption -->
    <rect x="298" y="325" width="204" height="44" fill="#FAFAFA"/>
    <text x="316" y="343" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#757575" font-weight="500">Encryption</text>
    <text x="316" y="359" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#BDBDBD">Device is encrypted</text>
    <rect x="472" y="339" width="10" height="8" rx="2" fill="#BDBDBD"/>
    <path d="M474,339 L474,335 Q474,331 477,331 Q480,331 480,335 L480,339" fill="none" stroke="#BDBDBD" stroke-width="1.5"/>

    <!-- Navigation bar -->
    <rect x="298" y="400" width="204" height="20" fill="#EEEEEE"/>
    <rect x="380" y="408" width="40" height="4" rx="2" fill="#BDBDBD"/>
  </g>

  <!-- Pointer hand -->
  <g transform="translate(520, 235)">
    <circle cx="0" cy="18" r="22" fill="#558B2F" opacity="0.2"/>
    <path d="M-5,30 L-5,10 Q-5,5 0,5 Q5,5 5,10 L5,18 L10,15 Q14,13 16,17 L16,20 L20,18 Q24,16 25,20 L25,24 L28,22 Q32,20 33,24 L33,40 Q33,50 23,50 L5,50 Q-5,50 -5,40 Z" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
  </g>

  <!-- Left info panel -->
  <g transform="translate(60, 180)">
    <rect x="0" y="0" width="160" height="80" rx="12" fill="#fff" opacity="0.08"/>
    <path d="M30,20 L30,45 Q30,60 80,65 Q130,60 130,45 L130,20 Z" fill="none" stroke="#66BB6A" stroke-width="1.5" opacity="0.5"/>
    <text x="80" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#A5D6A7" text-anchor="middle" font-weight="600">Required for</text>
    <text x="80" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#A5D6A7" text-anchor="middle" font-weight="600">APK Installation</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="80" cy="80" r="20" fill="#66BB6A" opacity="0.1"/>
  <circle cx="720" cy="100" r="30" fill="#558B2F" opacity="0.15"/>
  <circle cx="700" cy="380" r="20" fill="#66BB6A" opacity="0.1"/>
</svg>