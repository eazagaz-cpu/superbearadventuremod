<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#1a2428"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E3D1F"/>
      <stop offset="100%" stop-color="#1a2810"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="33%" stop-color="#2196F3"/>
      <stop offset="66%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <linearGradient id="modGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="vsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle accent lines -->
  <g opacity="0.03">
    <line x1="400" y1="0" x2="400" y2="450" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="225" x2="800" y2="225" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#78909C" letter-spacing="3">CHOOSE YOUR VERSION</text>

  <!-- LEFT CARD - Official Play Store -->
  <g filter="cardShadow">
    <rect x="60" y="58" width="280" height="340" rx="16" fill="url(#leftCard)" stroke="#37474F" stroke-width="1"/>
  </g>

  <!-- Official badge -->
  <rect x="140" y="70" width="120" height="24" rx="12" fill="#1565C0" opacity="0.3"/>
  <text x="200" y="87" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#42A5F5" letter-spacing="1.5">OFFICIAL</text>

  <!-- Play Store icon -->
  <g transform="translate(200, 160)">
    <rect x="-42" y="-42" width="84" height="84" rx="18" fill="#fff" opacity="0.05"/>
    <rect x="-42" y="-42" width="84" height="84" rx="18" fill="none" stroke="#455A64" stroke-width="1.5"/>
    <polygon points="-18,-28 -18,28 28,0" fill="url(#playGrad)"/>
    <polygon points="-18,-28 -18,28 28,0" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Play Store label -->
  <text x="200" y="236" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ECEFF1">Google Play Store</text>
  <text x="200" y="256" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#78909C">Standard Version</text>

  <!-- Features list left -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#90A4AE">
    <circle cx="105" cy="280" r="3" fill="#4CAF50"/>
    <text x="118" y="284">Auto-updates</text>
    <circle cx="105" cy="302" r="3" fill="#4CAF50"/>
    <text x="118" y="306">Google Play Protect</text>
    <circle cx="105" cy="324" r="3" fill="#4CAF50"/>
    <text x="118" y="328">Basic features only</text>
    <circle cx="105" cy="346" r="3" fill="#EF5350"/>
    <text x="118" y="350">Ads included</text>
  </g>

  <!-- Free tag -->
  <rect x="155" y="365" width="90" height="30" rx="6" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="1"/>
  <text x="200" y="385" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#42A5F5">FREE</text>

  <!-- CENTER VS DIVIDER -->
  <line x1="400" y1="68" x2="400" y2="155" stroke="#455A64" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="280" x2="400" y2="398" stroke="#455A64" stroke-width="1" stroke-dasharray="4,4"/>

  <g filter="glow">
    <circle cx="400" cy="218" r="36" fill="url(#vsGrad)"/>
  </g>
  <circle cx="400" cy="218" r="36" fill="none" stroke="#FFB74D" stroke-width="1.5" opacity="0.5"/>
  <text x="400" y="226" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="900" fill="#fff">VS</text>

  <!-- RIGHT CARD - Mod Version -->
  <g filter="cardShadow">
    <rect x="460" y="58" width="280" height="340" rx="16" fill="url(#rightCard)" stroke="#558B2F" stroke-width="1"/>
  </g>

  <!-- Modded badge -->
  <rect x="540" y="70" width="120" height="24" rx="12" fill="#558B2F" opacity="0.3"/>
  <text x="600" y="87" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#A5D6A7" letter-spacing="1.5">MODDED</text>

  <!-- Mod icon - Bear with star -->
  <g transform="translate(600, 160)">
    <rect x="-42" y="-42" width="84" height="84" rx="18" fill="#558B2F" opacity="0.15"/>
    <rect x="-42" y="-42" width="84" height="84" rx="18" fill="none" stroke="#558B2F" stroke-width="1.5"/>
    <!-- Bear face -->
    <circle cx="0" cy="2" r="24" fill="#8D6E63"/>
    <circle cx="-18" cy="-18" r="10" fill="#8D6E63"/>
    <circle cx="18" cy="-18" r="10" fill="#8D6E63"/>
    <circle cx="-18" cy="-18" r="6" fill="#A1887F"/>
    <circle cx="18" cy="-18" r="6" fill="#A1887F"/>
    <ellipse cx="0" cy="8" rx="14" ry="10" fill="#A1887F"/>
    <circle cx="-8" cy="-2" r="3.5" fill="#3E2723"/>
    <circle cx="8" cy="-2" r="3.5" fill="#3E2723"/>
    <circle cx="-7" cy="-3" r="1.2" fill="#fff"/>
    <circle cx="9" cy="-3" r="1.2" fill="#fff"/>
    <ellipse cx="0" cy="5" rx="4" ry="3" fill="#4E342E"/>
    <path d="M-4,9 Q0,13 4,9" fill="none" stroke="#4E342E" stroke-width="1.2"/>
    <!-- Star badge -->
    <g transform="translate(22, -8)">
      <polygon points="0,-12 3,-4 11,-4 5,1 7,9 0,5 -7,9 -5,1 -11,-4 -3,-4" fill="#FFD54F" stroke="#FF8F00" stroke-width="0.5"/>
    </g>
  </g>

  <!-- Mod label -->
  <text x="600" y="236" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#E8F5E9">Mod APK Version</text>
  <text x="600" y="256" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#81C784">Enhanced Edition</text>

  <!-- Features list right -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#A5D6A7">
    <circle cx="505" cy="280" r="3" fill="#66BB6A"/>
    <text x="518" y="284">All items unlocked</text>
    <circle cx="505" cy="302" r="3" fill="#66BB6A"/>
    <text x="518" y="306">Unlimited coins</text>
    <circle cx="505" cy="324" r="3" fill="#66BB6A"/>
    <text x="518" y="328">Premium skins free</text>
    <circle cx="505" cy="346" r="3" fill="#66BB6A"/>
    <text x="518" y="350">No advertisements</text>
  </g>

  <!-- Premium Features tag -->
  <rect x="527" y="365" width="146" height="30" rx="6" fill="#558B2F" opacity="0.3" stroke="#558B2F" stroke-width="1"/>
  <text x="600" y="385" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#A5D6A7">PREMIUM FEATURES</text>

  <!-- Bottom accent -->
  <rect x="0" y="440" width="400" height="10" fill="#1565C0" opacity="0.08"/>
  <rect x="400" y="440" width="400" height="10" fill="#558B2F" opacity="0.08"/>
</svg>