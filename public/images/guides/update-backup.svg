<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="progressFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#8BC34A"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <circle cx="100" cy="50" r="120" fill="#33691E" opacity="0.2"/>
  <circle cx="700" cy="400" r="140" fill="#1B5E20" opacity="0.25"/>
  <circle cx="400" cy="225" r="200" fill="#2E7D32" opacity="0.08"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#fff" font-weight="bold" letter-spacing="0.5">Save Data Backup Guide</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#A5D6A7">Protect Your Game Progress Before Updating</text>

  <!-- Central sync/backup loop -->
  <g transform="translate(400,225)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#558B2F" stroke-width="2" opacity="0.3" stroke-dasharray="6,4"/>

    <!-- Circular arrows -->
    <path d="M10,-98 A100,100 0 0,1 88,-48" fill="none" stroke="#7CB342" stroke-width="4" stroke-linecap="round"/>
    <polygon points="92,-44 82,-54 78,-40" fill="#7CB342"/>

    <path d="M95,-30 A100,100 0 0,1 30,96" fill="none" stroke="#8BC34A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="26,100 38,96 30,86" fill="#8BC34A"/>

    <path d="M15,99 A100,100 0 0,1 -90,44" fill="none" stroke="#7CB342" stroke-width="4" stroke-linecap="round"/>
    <polygon points="-94,40 -84,50 -80,36" fill="#7CB342"/>

    <path d="M-96,28 A100,100 0 0,1 -20,-98" fill="none" stroke="#8BC34A" stroke-width="4" stroke-linecap="round"/>
    <polygon points="-16,-102 -26,-92 -12,-88" fill="#8BC34A"/>

    <!-- Center icon - shield with check -->
    <rect x="-28" y="-28" width="56" height="56" rx="14" fill="#33691E" filter="url(#shadow)"/>
    <path d="M0,-16 L-14,-6 L-14,8 Q-14,20 0,24 Q14,20 14,8 L14,-6 Z" fill="#558B2F" stroke="#7CB342" stroke-width="1.5"/>
    <polyline points="-6,4 -2,10 8,-2" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Cloud upload icon - top -->
  <g transform="translate(400,100)" filter="url(#shadow)">
    <rect x="-45" y="-30" width="90" height="60" rx="12" fill="url(#cardBg)" stroke="#558B2F" stroke-width="1.5"/>
    <path d="M-18,12 Q-25,12 -25,5 Q-25,-2 -18,-2 Q-16,-10 -8,-10 Q-2,-14 5,-10 Q10,-12 15,-8 Q22,-8 22,-1 Q26,-1 26,5 Q26,12 20,12 Z" fill="#7CB342" opacity="0.9"/>
    <line x1="0" y1="8" x2="0" y2="-2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <polyline points="-4,2 0,-3 4,2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#C5E1A5" font-weight="bold">CLOUD</text>
  </g>

  <!-- Game controller icon - left -->
  <g transform="translate(248,225)" filter="url(#shadow)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="url(#cardBg)" stroke="#558B2F" stroke-width="1.5"/>
    <rect x="-22" y="-12" width="44" height="24" rx="12" fill="#558B2F"/>
    <rect x="-18" y="-4" width="4" height="10" rx="1" fill="#C5E1A5"/>
    <rect x="-21" y="-1" width="10" height="4" rx="1" fill="#C5E1A5"/>
    <circle cx="10" cy="-3" r="3" fill="#8BC34A"/>
    <circle cx="16" cy="1" r="3" fill="#7CB342"/>
    <circle cx="-8" cy="6" r="3" fill="#33691E"/>
    <circle cx="4" cy="6" r="3" fill="#33691E"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#C5E1A5" font-weight="bold">SAVE DATA</text>
  </g>

  <!-- Folder with files - right -->
  <g transform="translate(552,225)" filter="url(#shadow)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="url(#cardBg)" stroke="#558B2F" stroke-width="1.5"/>
    <path d="M-20,-10 L-8,-10 L-4,-16 L16,-16 L20,-10 L20,10 L-20,10 Z" fill="#558B2F"/>
    <rect x="-20" y="-8" width="40" height="18" rx="2" fill="#7CB342"/>
    <rect x="-14" y="-3" width="20" height="2" rx="1" fill="#C5E1A5"/>
    <rect x="-14" y="2" width="14" height="2" rx="1" fill="#C5E1A5" opacity="0.7"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#C5E1A5" font-weight="bold">FILES</text>
  </g>

  <!-- Progress bar section - bottom -->
  <g transform="translate(400,350)" filter="url(#shadow)">
    <rect x="-50" y="-35" width="100" height="70" rx="12" fill="url(#cardBg)" stroke="#558B2F" stroke-width="1.5"/>
    <rect x="-30" y="-10" width="60" height="10" rx="5" fill="#1B5E20"/>
    <rect x="-30" y="-10" width="48" height="10" rx="5" fill="url(#progressFill)"/>
    <text x="0" y="-13" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#C5E1A5">80%</text>
    <circle cx="0" cy="12" r="8" fill="#558B2F"/>
    <polyline points="-4,12 -1,16 5,8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#C5E1A5" font-weight="bold">PROGRESS</text>
  </g>

  <!-- Status card - top right -->
  <g filter="url(#shadow)">
    <rect x="610" y="80" width="160" height="80" rx="10" fill="#1B5E20" opacity="0.9"/>
    <rect x="610" y="80" width="160" height="80" rx="10" fill="none" stroke="#558B2F" stroke-width="1"/>
    <circle cx="640" cy="105" r="12" fill="#558B2F"/>
    <polyline points="634,105 638,110 648,98" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="658" y="102" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="bold">Backup</text>
    <text x="658" y="116" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#8BC34A" font-weight="bold">Complete!</text>
    <line x1="625" y1="130" x2="755" y2="130" stroke="#558B2F" stroke-width="0.5" opacity="0.5"/>
    <text x="690" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#A5D6A7">All data saved safely</text>
  </g>

  <!-- Tips card - bottom left -->
  <g filter="url(#shadow)">
    <rect x="30" y="340" width="160" height="85" rx="10" fill="#1B5E20" opacity="0.9"/>
    <rect x="30" y="340" width="160" height="85" rx="10" fill="none" stroke="#558B2F" stroke-width="1"/>
    <text x="110" y="362" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#8BC34A" font-weight="bold">Quick Tips</text>
    <line x1="45" y1="370" x2="175" y2="370" stroke="#558B2F" stroke-width="0.5" opacity="0.5"/>
    <circle cx="50" cy="385" r="3" fill="#7CB342"/>
    <text x="58" y="388" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#C5E1A5">Backup before updating</text>
    <circle cx="50" cy="402" r="3" fill="#7CB342"/>
    <text x="58" y="405" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#C5E1A5">Keep multiple copies</text>
    <circle cx="50" cy="419" r="3" fill="#7CB342"/>
    <text x="58" y="422" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#C5E1A5">Use cloud + local storage</text>
  </g>

  <text x="400" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#C5E1A5" font-weight="bold" letter-spacing="1">Update &amp; Backup Guide</text>
</svg>