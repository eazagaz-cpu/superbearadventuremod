<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="keyNormal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a4e"/>
      <stop offset="100%" stop-color="#2a2a3e"/>
    </linearGradient>
    <linearGradient id="keyGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6DA536"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="keyOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="keyBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <filter id="keyShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#E8F5E9" letter-spacing="1">KEYBOARD CONTROLS - SUPER BEAR ADVENTURE</text>
  <text x="400" y="53" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#78909C">Emulator Key Mapping Guide</text>

  <!-- Keyboard base -->
  <rect x="50" y="80" width="500" height="260" rx="12" fill="#1a1a28" stroke="#2a2a3e" stroke-width="2"/>
  <rect x="55" y="85" width="490" height="250" rx="10" fill="#141422" stroke="#222238" stroke-width="1"/>

  <!-- Row 1: Number row -->
  <g filter="keyShadow" font-family="'Segoe UI', Arial, sans-serif" font-size="11" text-anchor="middle">
    <rect x="70" y="100" width="34" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="87" y="119" fill="#888">Esc</text>
    <rect x="110" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="124" y="119" fill="#888">1</text>
    <rect x="142" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="156" y="119" fill="#888">2</text>
    <rect x="174" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="188" y="119" fill="#888">3</text>
    <rect x="206" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="220" y="119" fill="#888">4</text>
    <rect x="238" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="252" y="119" fill="#888">5</text>
    <rect x="270" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="284" y="119" fill="#888">6</text>
    <rect x="302" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="316" y="119" fill="#888">7</text>
    <rect x="334" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="348" y="119" fill="#888">8</text>
    <rect x="366" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="380" y="119" fill="#888">9</text>
    <rect x="398" y="100" width="28" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="412" y="119" fill="#888">0</text>
    <rect x="430" y="100" width="100" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="480" y="119" fill="#888" font-size="9">Backspace</text>
  </g>

  <!-- Row 2: QWERTY -->
  <g filter="keyShadow" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">
    <rect x="70" y="133" width="44" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="92" y="153" fill="#888" font-size="10" font-weight="400">Tab</text>
    <rect x="118" y="133" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="133" y="153" fill="#888">Q</text>

    <!-- W - MOVEMENT (Forward) -->
    <rect x="152" y="133" width="30" height="30" rx="5" fill="url(#keyGreen)" stroke="#8BC34A" stroke-width="1.5"/>
    <text x="167" y="152" fill="#fff" font-size="14">W</text>

    <!-- E - ACTION (Interact) -->
    <rect x="186" y="133" width="30" height="30" rx="5" fill="url(#keyOrange)" stroke="#FFB74D" stroke-width="1.5"/>
    <text x="201" y="152" fill="#fff" font-size="14">E</text>

    <rect x="220" y="133" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="235" y="153" fill="#888">R</text>
    <rect x="254" y="133" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="269" y="153" fill="#888">T</text>
    <rect x="288" y="133" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="303" y="153" fill="#888">Y</text>
    <rect x="322" y="133" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="337" y="153" fill="#888">U</text>
    <rect x="356" y="133" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="371" y="153" fill="#888">I</text>
    <rect x="390" y="133" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="405" y="153" fill="#888">O</text>
    <rect x="424" y="133" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="439" y="153" fill="#888">P</text>
    <rect x="458" y="133" width="72" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="494" y="153" fill="#888" font-size="10" font-weight="400">Enter</text>
  </g>

  <!-- Row 3: ASDF -->
  <g filter="keyShadow" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">
    <rect x="70" y="168" width="52" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="96" y="188" fill="#888" font-size="9" font-weight="400">Caps</text>

    <!-- A - MOVEMENT (Left) -->
    <rect x="126" y="168" width="30" height="30" rx="5" fill="url(#keyGreen)" stroke="#8BC34A" stroke-width="1.5"/>
    <text x="141" y="187" fill="#fff" font-size="14">A</text>

    <!-- S - MOVEMENT (Back) -->
    <rect x="160" y="168" width="30" height="30" rx="5" fill="url(#keyGreen)" stroke="#8BC34A" stroke-width="1.5"/>
    <text x="175" y="187" fill="#fff" font-size="14">S</text>

    <!-- D - MOVEMENT (Right) -->
    <rect x="194" y="168" width="30" height="30" rx="5" fill="url(#keyGreen)" stroke="#8BC34A" stroke-width="1.5"/>
    <text x="209" y="187" fill="#fff" font-size="14">D</text>

    <rect x="228" y="168" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="243" y="188" fill="#888">F</text>
    <rect x="262" y="168" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="277" y="188" fill="#888">G</text>
    <rect x="296" y="168" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="311" y="188" fill="#888">H</text>
    <rect x="330" y="168" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="345" y="188" fill="#888">J</text>
    <rect x="364" y="168" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="379" y="188" fill="#888">K</text>
    <rect x="398" y="168" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="413" y="188" fill="#888">L</text>
    <rect x="432" y="168" width="98" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="481" y="188" fill="#888" font-size="9">;</text>
  </g>

  <!-- Row 4: ZXCV -->
  <g filter="keyShadow" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">
    <rect x="70" y="203" width="68" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="104" y="223" fill="#888" font-size="10" font-weight="400">Shift</text>
    <rect x="142" y="203" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="157" y="223" fill="#888">Z</text>
    <rect x="176" y="203" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="191" y="223" fill="#888">X</text>
    <rect x="210" y="203" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="225" y="223" fill="#888">C</text>
    <rect x="244" y="203" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="259" y="223" fill="#888">V</text>
    <rect x="278" y="203" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="293" y="223" fill="#888">B</text>
    <rect x="312" y="203" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="327" y="223" fill="#888">N</text>
    <rect x="346" y="203" width="30" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="361" y="223" fill="#888">M</text>
    <rect x="380" y="203" width="150" height="30" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="455" y="223" fill="#888" font-size="10" font-weight="400">Shift</text>
  </g>

  <!-- Row 5: Space bar -->
  <g filter="keyShadow" font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="238" width="44" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="92" y="257" fill="#888" font-size="9">Ctrl</text>
    <rect x="118" y="238" width="38" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="137" y="257" fill="#888" font-size="9">Alt</text>

    <!-- SPACE - JUMP -->
    <rect x="160" y="238" width="236" height="28" rx="5" fill="url(#keyBlue)" stroke="#42A5F5" stroke-width="1.5"/>
    <text x="278" y="257" fill="#fff" font-size="12" font-weight="700">SPACE - JUMP</text>

    <rect x="400" y="238" width="38" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="419" y="257" fill="#888" font-size="9">Alt</text>
    <rect x="442" y="238" width="88" height="28" rx="4" fill="url(#keyNormal)" stroke="#4a4a5e" stroke-width="0.5"/>
    <text x="486" y="257" fill="#888" font-size="9">Ctrl</text>
  </g>

  <!-- LABEL ARROWS -->

  <!-- W = Forward arrow up -->
  <g filter="glow">
    <line x1="167" y1="130" x2="167" y2="100" stroke="#8BC34A" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="163,102 167,92 171,102" fill="#8BC34A"/>
  </g>
  <rect x="137" y="72" width="60" height="18" rx="4" fill="#558B2F" opacity="0.3"/>
  <text x="167" y="86" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#C8E6C9">Forward</text>

  <!-- A = Left arrow -->
  <g filter="glow">
    <line x1="124" y1="183" x2="90" y2="183" stroke="#8BC34A" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="92,179 82,183 92,187" fill="#8BC34A"/>
  </g>
  <rect x="56" y="287" width="36" height="18" rx="4" fill="#558B2F" opacity="0.3"/>
  <text x="74" y="300" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#C8E6C9">Left</text>

  <!-- S = Back arrow down -->
  <line x1="175" y1="200" x2="175" y2="285" stroke="#8BC34A" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="171,283 175,293 179,283" fill="#8BC34A"/>
  <rect x="150" y="296" width="50" height="18" rx="4" fill="#558B2F" opacity="0.3"/>
  <text x="175" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#C8E6C9">Back</text>

  <!-- D = Right arrow -->
  <line x1="226" y1="183" x2="258" y2="183" stroke="#8BC34A" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="256,179 266,183 256,187" fill="#8BC34A"/>
  <rect x="268" y="174" width="42" height="18" rx="4" fill="#558B2F" opacity="0.3"/>
  <text x="289" y="188" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#C8E6C9">Right</text>

  <!-- E = Interact arrow -->
  <line x1="218" y1="145" x2="275" y2="120" stroke="#FFB74D" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="268" y="102" width="68" height="18" rx="4" fill="#E65100" opacity="0.3"/>
  <text x="302" y="116" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#FFE0B2">Interact</text>

  <!-- MOUSE SECTION -->
  <g transform="translate(650, 185)">
    <!-- Mouse body -->
    <ellipse cx="0" cy="0" rx="38" ry="55" fill="#2a2a3e" stroke="#4a4a5e" stroke-width="2"/>
    <!-- Scroll wheel -->
    <rect x="-5" y="-32" width="10" height="16" rx="5" fill="#3a3a4e" stroke="#558B2F" stroke-width="1.5"/>
    <!-- Center divider -->
    <line x1="0" y1="-14" x2="0" y2="28" stroke="#3a3a4e" stroke-width="1"/>
    <!-- Left button glow -->
    <path d="M-36,-8 Q-38,-46 0,-53 L0,-14 Q-18,-14 -36,-8Z" fill="#558B2F" opacity="0.15" stroke="#558B2F" stroke-width="0.5"/>
    <!-- Outer glow ring -->
    <ellipse cx="0" cy="0" rx="38" ry="55" fill="none" stroke="#558B2F" stroke-width="1" opacity="0.3"/>
    <!-- Direction arrows -->
    <g stroke="#558B2F" stroke-width="1.2" fill="#558B2F" opacity="0.6">
      <line x1="0" y1="-65" x2="0" y2="-75"/>
      <polygon points="-4,-73 0,-80 4,-73"/>
      <line x1="0" y1="63" x2="0" y2="73"/>
      <polygon points="-4,71 0,78 4,71"/>
      <line x1="-46" y1="0" x2="-56" y2="0"/>
      <polygon points="-54,-4 -61,0 -54,4"/>
      <line x1="46" y1="0" x2="56" y2="0"/>
      <polygon points="54,-4 61,0 54,4"/>
    </g>
  </g>

  <text x="650" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#C8E6C9">MOUSE</text>

  <rect x="598" y="262" width="104" height="22" rx="4" fill="#558B2F" opacity="0.2"/>
  <text x="650" y="278" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#A5D6A7">Camera Control</text>

  <!-- Legend -->
  <g transform="translate(580, 330)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#78909C" letter-spacing="1">LEGEND</text>
    <rect x="0" y="10" width="14" height="14" rx="3" fill="url(#keyGreen)"/>
    <text x="20" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#A5D6A7">Movement</text>
    <rect x="88" y="10" width="14" height="14" rx="3" fill="url(#keyOrange)"/>
    <text x="108" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFE0B2">Action</text>
    <rect x="0" y="30" width="14" height="14" rx="3" fill="url(#keyBlue)"/>
    <text x="20" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#90CAF9">Jump</text>
    <rect x="88" y="30" width="14" height="14" rx="3" fill="#558B2F" opacity="0.3" stroke="#558B2F" stroke-width="1"/>
    <text x="108" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#A5D6A7">Camera</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="430" width="800" height="20" fill="#558B2F" opacity="0.05"/>
  <text x="400" y="444" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4a5a3a">superbearadventuremod.io</text>
</svg>