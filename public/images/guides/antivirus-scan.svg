<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3A1B"/>
      <stop offset="100%" stop-color="#0D1F0D"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6DA536"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#558B2F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#558B2F" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="800" y2="450" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="800" y2="350" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="800" y2="250" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="700" y2="450" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="500" y2="450" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="0" y2="450" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="0" y2="350" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="0" y2="250" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="800" y1="100" x2="100" y2="450" stroke="#558B2F" stroke-width="0.5"/>
    <line x1="800" y1="200" x2="300" y2="450" stroke="#558B2F" stroke-width="0.5"/>
  </g>

  <!-- Glow behind shield -->
  <ellipse cx="400" cy="170" rx="120" ry="130" fill="url(#glowGrad)"/>

  <!-- Shield shape -->
  <g filter="glow" transform="translate(400, 160)">
    <path d="M0-100 C-65-90-90-60-90-28 C-90,28-65,70,0,100 C65,70,90,28,90-28 C90-60,65-90,0-100Z" fill="url(#shieldGrad)" stroke="#7CB342" stroke-width="3"/>
    <!-- Inner shield highlight -->
    <path d="M0-80 C-52-73-72-48-72-22 C-72,20-52,55,0,78 C52,55,72,20,72-22 C72-48,52-73,0-80Z" fill="none" stroke="#8BC34A" stroke-width="1.5" opacity="0.4"/>
    <!-- Large checkmark -->
    <polyline points="-32,5 -10,30 38,-26" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Scan Complete text -->
  <text x="400" y="305" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#E8F5E9" letter-spacing="1">Scan Complete - No Threats Found</text>

  <!-- Progress bar background -->
  <rect x="200" y="330" width="400" height="14" rx="7" fill="#1A3A1A" stroke="#2E5A2E" stroke-width="1"/>
  <!-- Progress bar fill 100% -->
  <rect x="200" y="330" width="400" height="14" rx="7" fill="url(#progressGrad)"/>
  <!-- Progress percentage -->
  <text x="612" y="342" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#A5D6A7">100%</text>

  <!-- Crossed-out virus icon top-left -->
  <g transform="translate(120, 105)" opacity="0.5">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#EF5350" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#EF5350" opacity="0.5"/>
    <line x1="0" y1="-20" x2="0" y2="-14" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="14" y1="-14" x2="18" y2="-18" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="20" y1="0" x2="14" y2="0" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="-22" y1="-22" x2="22" y2="22" stroke="#FF1744" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="-22" x2="-22" y2="22" stroke="#FF1744" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Crossed-out virus icon top-right -->
  <g transform="translate(680, 105)" opacity="0.5">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#EF5350" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#EF5350" opacity="0.5"/>
    <line x1="0" y1="-20" x2="0" y2="-14" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="-14" y1="-14" x2="-18" y2="-18" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="-20" y1="0" x2="-14" y2="0" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="-22" y1="-22" x2="22" y2="22" stroke="#FF1744" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="-22" x2="-22" y2="22" stroke="#FF1744" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Crossed-out virus icon bottom-left -->
  <g transform="translate(105, 360)" opacity="0.4">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#EF5350" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#EF5350" opacity="0.5"/>
    <line x1="0" y1="-16" x2="0" y2="-10" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="10" y1="10" x2="14" y2="14" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="-10" y1="10" x2="-14" y2="14" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="-18" y1="-18" x2="18" y2="18" stroke="#FF1744" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="-18" x2="-18" y2="18" stroke="#FF1744" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Crossed-out virus icon bottom-right -->
  <g transform="translate(700, 375)" opacity="0.4">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#EF5350" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#EF5350" opacity="0.5"/>
    <line x1="16" y1="0" x2="10" y2="0" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="-10" y1="-10" x2="-14" y2="-14" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="10" y1="-10" x2="14" y2="-14" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="-18" y1="-18" x2="18" y2="18" stroke="#FF1744" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="-18" x2="-18" y2="18" stroke="#FF1744" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Verified Safe badge -->
  <g transform="translate(400, 405)">
    <rect x="-88" y="-14" width="176" height="28" rx="14" fill="#2E7D32" opacity="0.3"/>
    <circle cx="-66" cy="0" r="6" fill="#66BB6A"/>
    <path d="M-69,-1 L-67,2 L-63,-3" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <text x="5" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#A5D6A7">VERIFIED SAFE</text>
  </g>
</svg>