<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#7CB342"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="700" cy="80" r="120" fill="#2E7D32" opacity="0.3"/>
  <circle cx="100" cy="400" r="100" fill="#1B5E20" opacity="0.4"/>

  <!-- Monitor body -->
  <rect x="130" y="40" width="540" height="340" rx="12" fill="#2d2d3a" filter="url(#shadow)"/>
  <rect x="130" y="40" width="540" height="340" rx="12" fill="none" stroke="#444" stroke-width="2"/>

  <!-- Monitor bezel -->
  <rect x="142" y="52" width="516" height="300" rx="4" fill="url(#screen)"/>

  <!-- Monitor stand -->
  <rect x="350" y="380" width="100" height="20" rx="3" fill="#2d2d3a"/>
  <rect x="320" y="400" width="160" height="10" rx="5" fill="#3a3a4a"/>

  <!-- Emulator sidebar -->
  <rect x="142" y="52" width="50" height="300" fill="#0f0f1a" opacity="0.9"/>

  <!-- Sidebar icons -->
  <rect x="152" y="65" width="30" height="30" rx="6" fill="#558B2F" opacity="0.8"/>
  <polygon points="162,73 175,80 162,87" fill="#fff"/>

  <rect x="152" y="105" width="30" height="30" rx="6" fill="#3a3a5a"/>
  <rect x="160" y="113" width="14" height="14" rx="2" fill="#888"/>

  <rect x="152" y="145" width="30" height="30" rx="6" fill="#3a3a5a"/>
  <circle cx="167" cy="160" r="7" fill="none" stroke="#888" stroke-width="2"/>

  <rect x="152" y="185" width="30" height="30" rx="6" fill="#3a3a5a"/>
  <path d="M160,200 L167,193 L174,200" fill="none" stroke="#888" stroke-width="2"/>
  <line x1="167" y1="193" x2="167" y2="207" stroke="#888" stroke-width="2"/>

  <rect x="152" y="225" width="30" height="30" rx="6" fill="#3a3a5a"/>
  <rect x="159" y="233" width="16" height="3" rx="1" fill="#888"/>
  <rect x="159" y="239" width="16" height="3" rx="1" fill="#888"/>
  <rect x="159" y="245" width="16" height="3" rx="1" fill="#888"/>

  <!-- Game content area -->
  <rect x="200" y="60" width="450" height="284" rx="2" fill="#0a1628"/>

  <!-- LDPlayer title bar -->
  <rect x="200" y="60" width="450" height="32" fill="#1a1a30"/>
  <circle cx="215" cy="76" r="5" fill="#558B2F"/>
  <text x="232" y="80" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#7CB342" font-weight="bold">LDPlayer</text>
  <text x="300" y="80" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#666">- Super Bear Adventure</text>

  <!-- Window controls -->
  <line x1="620" y1="72" x2="630" y2="82" stroke="#666" stroke-width="1.5"/>
  <line x1="630" y1="72" x2="620" y2="82" stroke="#666" stroke-width="1.5"/>
  <rect x="596" y="72" width="12" height="1.5" fill="#666"/>
  <rect x="596" y="78" width="12" height="6" fill="none" stroke="#666" stroke-width="1.5" rx="1"/>

  <!-- Game scene inside emulator -->
  <rect x="200" y="92" width="450" height="150" fill="#1e3a5f"/>
  <circle cx="250" cy="110" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="320" cy="125" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="410" cy="105" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="500" cy="130" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="580" cy="115" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="350" cy="140" r="1" fill="#fff" opacity="0.4"/>

  <!-- Ground -->
  <rect x="200" y="242" width="450" height="102" fill="#33691E"/>
  <rect x="200" y="242" width="450" height="15" fill="#558B2F"/>

  <!-- Mountains -->
  <polygon points="200,242 280,170 360,242" fill="#2E7D32" opacity="0.6"/>
  <polygon points="300,242 400,150 500,242" fill="#388E3C" opacity="0.5"/>
  <polygon points="450,242 550,180 650,242" fill="#2E7D32" opacity="0.6"/>

  <!-- Bear character -->
  <ellipse cx="400" cy="228" rx="20" ry="8" fill="#1B5E20" opacity="0.3"/>
  <rect x="384" y="200" width="32" height="30" rx="8" fill="#8D6E63"/>
  <circle cx="400" cy="196" r="16" fill="#A1887F"/>
  <circle cx="388" cy="186" r="6" fill="#8D6E63"/>
  <circle cx="412" cy="186" r="6" fill="#8D6E63"/>
  <circle cx="388" cy="186" r="3" fill="#BCAAA4"/>
  <circle cx="412" cy="186" r="3" fill="#BCAAA4"/>
  <circle cx="394" cy="193" r="2.5" fill="#3E2723"/>
  <circle cx="406" cy="193" r="2.5" fill="#3E2723"/>
  <circle cx="395" cy="192" r="1" fill="#fff"/>
  <circle cx="407" cy="192" r="1" fill="#fff"/>
  <ellipse cx="400" cy="200" rx="4" ry="2.5" fill="#3E2723"/>

  <!-- HUD elements -->
  <rect x="210" y="98" width="80" height="20" rx="10" fill="#000" opacity="0.5"/>
  <circle cx="224" cy="108" r="6" fill="#FFD600"/>
  <text x="234" y="112" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#FFD600" font-weight="bold">1,250</text>

  <rect x="210" y="124" width="70" height="8" rx="4" fill="#333"/>
  <rect x="210" y="124" width="50" height="8" rx="4" fill="url(#accent)"/>

  <!-- Android nav bar -->
  <rect x="200" y="330" width="450" height="14" fill="#0a0a15"/>
  <polygon points="380,334 380,340 386,337" fill="#666" transform="rotate(180,383,337)"/>
  <circle cx="420" cy="337" r="4" fill="none" stroke="#666" stroke-width="1.2"/>
  <rect x="448" y="334" width="10" height="6" rx="1" fill="none" stroke="#666" stroke-width="1.2"/>

  <!-- LDPlayer logo area -->
  <rect x="50" y="390" width="60" height="40" rx="8" fill="#558B2F" filter="url(#glow)" opacity="0.9"/>
  <polygon points="70,398 70,422 90,410" fill="#fff"/>

  <!-- Decorative elements -->
  <circle cx="730" cy="380" r="40" fill="#33691E" opacity="0.3"/>
  <circle cx="60" cy="60" r="30" fill="#33691E" opacity="0.2"/>

  <text x="400" y="432" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#C5E1A5" font-weight="bold" letter-spacing="1">LDPlayer Emulator Setup Guide</text>
</svg>